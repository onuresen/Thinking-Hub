name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate-package-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '\r\n' < VERSION)"
          test "$GITHUB_REF_NAME" = "v$version"
          grep -Fq "## [$version] - " CHANGELOG.md
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Chromium
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run full test suite
        working-directory: tests
        run: npm test

      - name: Build release archive and checksum
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '\r\n' < VERSION)"
          archive="thinking-hub-v${version}.zip"
          git archive --format=zip --prefix="thinking-hub-v${version}/" --output="$archive" "$GITHUB_SHA"
          sha256sum "$archive" > "$archive.sha256"

      - name: Publish immutable GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '\r\n' < VERSION)"
          archive="thinking-hub-v${version}.zip"
          gh release create "$GITHUB_REF_NAME" "$archive" "$archive.sha256" \
            --verify-tag \
            --title="Thinking Hub $GITHUB_REF_NAME" \
            --generate-notes
