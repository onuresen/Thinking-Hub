<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Portfolio Hub</title>
    <script src="hub-storage.js"></script>
    <script src="hub-utils.js"></script>
    <script src="hub-links.js"></script>
    <script src="hub-toast.js"></script>
    <script src="hub-data.js"></script>
    <script src="hub-bootstrap.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            overflow: hidden;
        }

        /* ── Sidebar ───────────────────────────── */
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 14px;
            gap: 10px;
        }

        .sidebar-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 14px;
        }

        /* ── Sidebar search ─────────────────────── */
        .sidebar-search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .sidebar-search {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 6px 28px 6px 10px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 12px;
            outline: none;
            transition: border-color 0.15s;
        }
        .sidebar-search:focus { border-color: var(--accent); }
        .sidebar-search::placeholder { color: var(--text3); }
        .sidebar-search-clear {
            position: absolute; right: 8px;
            background: none; border: none; color: var(--text3);
            cursor: pointer; font-size: 14px; line-height: 1;
            display: none;
        }
        .sidebar-search-clear.visible { display: block; }
        .sidebar-search-clear:hover { color: var(--text); }

        /* ── Stats bar ──────────────────────────────── */
        .stats-bar {
            display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
            padding: 10px 16px 0;
        }
        .stats-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
        .stat-pill {
            display: flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface2);
            font-size: 11px; font-family: var(--font-mono);
            cursor: pointer; transition: all 0.13s;
        }
        .stat-pill:hover { border-color: var(--text2); }
        .stat-pill.sp-dimmed { opacity: 0.38; }
        .stat-pill .sp-count { font-weight: 700; }
        .stat-pill .sp-label { color: var(--text3); font-size: 10px; }
        /* Radar ring pills */
        .stat-pill.sp-adopt  { border-color: var(--accent);       background: var(--accent-dim); }
        .stat-pill.sp-adopt .sp-count  { color: var(--accent); }
        .stat-pill.sp-trial  { border-color: #38bdf8;             background: rgba(56,189,248,0.08); }
        .stat-pill.sp-trial .sp-count  { color: #38bdf8; }
        .stat-pill.sp-assess { border-color: var(--accent-super); background: rgba(245,158,11,0.08); }
        .stat-pill.sp-assess .sp-count { color: var(--accent-super); }
        .stat-pill.sp-hold   { border-color: var(--accent-nope);  background: rgba(239,68,68,0.07); }
        .stat-pill.sp-hold .sp-count   { color: var(--accent-nope); }
        .stat-pill.sp-total .sp-count  { color: var(--text); }
        /* Status stage pills */
        .stat-pill.sp-piloting { border-color: #38bdf8;             background: rgba(56,189,248,0.08); }
        .stat-pill.sp-piloting .sp-count  { color: #38bdf8; }
        .stat-pill.sp-using    { border-color: var(--accent);       background: var(--accent-dim); }
        .stat-pill.sp-using .sp-count    { color: var(--accent); }

        /* Category grouping */
        .tool-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 2px;
        }

        .cat-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .cat-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.15);
            user-select: none;
        }

        .cat-title {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 1.6px;
            text-transform: uppercase;
            color: var(--text3);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cat-count {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text3);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 1px 7px;
        }

        .cat-drop-hint {
            font-size: 10px;
            color: var(--text3);
            opacity: 0.85;
            margin-left: 6px;
            display: none;
        }

        .cat-header.drag-over .cat-drop-hint {
            display: inline;
        }

        .cat-items {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-left: 2px;
        }

        /* Tool row */
        .tool-item {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent;
        }

        .tool-item.active {
            background: var(--accent-dim);
            border-color: var(--accent);
        }

        .tool-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .tool-item.dragging {
            opacity: 0.35;
        }

        .tool-item.drag-over {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-dim);
        }

        .drag-handle {
            width: 16px;
            text-align: center;
            color: var(--text3);
            opacity: 0.6;
            cursor: grab;
            user-select: none;
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1;
            flex-shrink: 0;
        }

        .tool-item:hover .drag-handle {
            opacity: 1;
        }

        .tool-icon {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            background: var(--surface3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .tool-name {
            font-size: 12.5px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        /* ── Status dot (list: icon only, detail: full pill) ── */
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .status-exploring { background: var(--text3); }
        .status-piloting  { background: #38bdf8; }
        .status-using     { background: var(--accent); }
        .status-retired   { background: var(--border); }

        /* ── Ring badge ─────────────────────── */
        .ring-badge {
            font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 2px 5px; border-radius: 4px; flex-shrink: 0; white-space: nowrap;
        }
        .ring-adopt   { background: var(--accent-dim);         color: var(--accent); }
        .ring-trial   { background: rgba(56,189,248,0.12);     color: #38bdf8; }
        .ring-assess  { background: rgba(245,158,11,0.12);     color: var(--accent-super); }
        .ring-hold    { background: rgba(239,68,68,0.10);      color: var(--accent-nope); }

        /* ── Ring selector in detail ─────────── */
        .ring-pill-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
        .ring-pill-btn {
            flex: 1; padding: 6px 4px; border-radius: var(--r-sm); border: 1px solid var(--border);
            background: var(--surface2); color: var(--text2); font-size: 11px; font-weight: 600;
            cursor: pointer; text-align: center; transition: all 0.15s;
        }
        .ring-pill-btn:hover { border-color: var(--accent); color: var(--text); }
        .ring-pill-btn.active-adopt   { background: var(--accent-dim);       color: var(--accent);       border-color: var(--accent); }
        .ring-pill-btn.active-trial   { background: rgba(56,189,248,0.12);   color: #38bdf8;             border-color: #38bdf8; }
        .ring-pill-btn.active-assess  { background: rgba(245,158,11,0.12);   color: var(--accent-super); border-color: var(--accent-super); }
        .ring-pill-btn.active-hold    { background: rgba(239,68,68,0.10);    color: var(--accent-nope);  border-color: var(--accent-nope); }
        .ring-pill-btn.active-sor { background: rgba(34,197,94,0.12); color: #22c55e; border-color: #22c55e; }
        .ring-pill-btn.active-soe { background: rgba(56,189,248,0.12); color: #38bdf8; border-color: #38bdf8; }
        .ring-pill-btn.active-soi { background: rgba(245,158,11,0.12); color: var(--accent-super); border-color: var(--accent-super); }

        /* ── Main ───────────────────────────── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            height: 52px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }

        .topbar-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 14px;
            flex: 1;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field-label {
            font-size: 10px;
            font-family: var(--font-mono);
            color: var(--text3);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .field-hint {
            font-size: 11px;
            color: var(--text3);
            opacity: 0.8;
        }

        /* ── Compare split view ─────────────────────── */
        .compare-split {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0;
            flex: 1; overflow: hidden;
        }
        .compare-col {
            overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 14px;
        }
        .compare-col + .compare-col { border-left: 1px solid var(--border); }
        .compare-col-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
        }
        .compare-col-icon {
            width: 36px; height: 36px; border-radius: 10px; background: var(--surface3);
            display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0;
        }
        .compare-col-name {
            font-family: var(--font-display); font-weight: 800; font-size: 15px; flex: 1;
        }
        .compare-row {
            display: flex; flex-direction: column; gap: 3px;
            padding: 10px 12px; border-radius: var(--r-sm);
            background: var(--surface2); border: 1px solid var(--border);
        }
        .compare-row-label {
            font-size: 9px; font-family: var(--font-mono); letter-spacing: 1px;
            text-transform: uppercase; color: var(--text3);
        }
        .compare-row-value {
            font-size: 13px; color: var(--text); line-height: 1.45;
        }
        .compare-row-empty { color: var(--text3); font-style: italic; font-size: 12px; }
        .compare-picker-label {
            font-size: 10px; font-family: var(--font-mono); letter-spacing: 1px;
            text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
        }

        /* ── Mobile drawer ──────────────────────────────────────── */
        .sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 99; }
        .sidebar-backdrop.open { display: block; }
        .mob-nav-btn { display: none; background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 18px; padding: 6px 10px; border-radius: var(--r-sm); flex-shrink: 0; line-height: 1; transition: background 0.1s; }
        .mob-nav-btn:hover { background: var(--surface2); }

        @media (max-width: 640px) {
            .sidebar {
                position: fixed; left: 0; top: 0; bottom: 0; height: 100%;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.22s cubic-bezier(.4,0,.2,1);
                box-shadow: 6px 0 32px rgba(0,0,0,0.45);
                width: 240px; min-width: 240px;
            }
            .sidebar.open { transform: translateX(0); }
            .mob-nav-btn { display: flex; align-items: center; }
            .topbar { padding: 0 8px; gap: 6px; }
        }

        .tp-tab-bar { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 3px; gap: 2px; margin: 0 16px 10px; width: fit-content; }
        .tp-tab { padding: 6px 14px; border: none; background: none; border-radius: 6px; font-size: 12.5px; font-weight: 600; color: var(--text3); cursor: pointer; }
        .tp-tab:hover { color: var(--text); }
        .tp-tab.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,.2); }

        .tp-matrix { display: grid; grid-template-columns: 120px repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden; }
        .tp-matrix-cell { background: var(--surface); padding: 8px; min-height: 64px; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 6px; }
        .tp-matrix-head { background: var(--surface2); padding: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text3); display: flex; align-items: center; }
        .tp-matrix-row-label { background: var(--surface2); padding: 8px; font-size: 12px; font-weight: 700; color: var(--text2); display: flex; align-items: center; }
        .tp-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid; }
        .tp-chip-gray   { background: var(--node-gray);   border-color: var(--border-gray); }
        .tp-chip-blue   { background: var(--node-blue);   border-color: var(--border-blue); }
        .tp-chip-green  { background: var(--node-green);  border-color: var(--border-green); }
        .tp-chip-yellow { background: var(--node-yellow); border-color: var(--border-yellow); }
        .tp-chip-purple { background: var(--node-purple); border-color: var(--border-purple); }
        .tp-chip-red    { background: var(--node-red);    border-color: var(--border-red); }

        .soi-map-hint { font-size: 12px; color: var(--text3); margin: 10px 0; }
        .soi-map-wrap { position: relative; height: 500px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); }
        .soi-map-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
        .soi-pole-label { position: absolute; font-size: 13px; font-weight: 700; text-align: center; width: 160px; pointer-events: none; }
        .soi-pole-label .cap { display: block; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; font-weight: 800; }
        .soi-pole-label .def { display: block; font-weight: 500; color: var(--text3); font-size: 12px; margin-top: 2px; }
        .soi-map-dot { width: 17px; height: 17px; border-radius: 50%; position: absolute; transform: translate(-50%,-50%); cursor: pointer; box-shadow: 0 0 0 2px var(--surface), 0 2px 6px rgba(0,0,0,.3); transition: transform .1s; }
        .soi-map-dot:hover { transform: translate(-50%,-50%) scale(1.5); z-index: 6; }

        .tp-popover-backdrop { position: fixed; inset: 0; z-index: 50; background: transparent; }
        .tp-popover { position: absolute; z-index: 51; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--r-sm); box-shadow: 0 8px 24px rgba(0,0,0,.35); padding: 12px; width: 220px; }
        .tp-popover-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        .tp-popover-row { margin-bottom: 8px; }
        .tp-popover-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--text3); margin-bottom: 4px; }
        .tp-mastery-dots { display: flex; gap: 6px; }
        .tp-mastery-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface2); cursor: pointer; }
        .tp-mastery-dot.filled { background: var(--accent); border-color: var(--accent); }
        .tp-popover-link { font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: none; display: block; margin-top: 8px; }
    </style>
</head>

<body>
    <div class="sidebar-backdrop" id="tp-backdrop" onclick="closeSidebar()"></div>
    <div class="sidebar">
        <div class="sidebar-title">Tool Portfolio</div>
        <button class="btn btn-primary" onclick="createTool()">＋ Add Tool</button>
        <div class="sidebar-search-wrap">
            <input class="sidebar-search" id="sidebar-search" type="text" placeholder="Filter tools…" oninput="onSearchInput()" />
            <button class="sidebar-search-clear" id="search-clear" onclick="clearSearch()">✕</button>
        </div>
        <div class="tool-list" id="tool-list"></div>
    </div>

    <div class="main">
        <div class="topbar">
            <button class="mob-nav-btn" onclick="toggleSidebar()" aria-label="Open tool list">☰</button>
            <div class="topbar-title" id="topbar-title">Select a tool</div>
            <button class="btn btn-ghost" id="compare-btn" onclick="toggleCompare()" style="display:none;font-size:12px">⇄ Compare</button>
        </div>
        <div class="tp-tab-bar">
            <button class="tp-tab active" data-view="list" onclick="switchTpView('list')">📋 List</button>
            <button class="tp-tab" data-view="matrix" onclick="switchTpView('matrix')">▦ Matrix</button>
            <button class="tp-tab" data-view="map" onclick="switchTpView('map')">🔺 SoR·SoE·SoI Map</button>
        </div>
        <div class="stats-bar" id="stats-bar"></div>

        <div class="content" id="content">
            <div class="empty">Select a tool or add a new one.</div>
        </div>
        <div id="matrix-view" style="display:none;padding:0 16px 16px;"></div>
        <div id="map-view" style="display:none;padding:0 16px 16px;"></div>
    </div>

    <script>
        const STORAGE_KEY = 'tool-portfolio-v1';
        let tools = [];
        let currentId = null;
        let compareMode = false;
        let compareId = null;

        // Drag state
        let dragId = null;
        let dragCat = null;

        let tpView = 'list';
        function switchTpView(view) {
            tpView = view;
            document.getElementById('content').style.display = view === 'list' ? '' : 'none';
            document.getElementById('matrix-view').style.display = view === 'matrix' ? '' : 'none';
            document.getElementById('map-view').style.display = view === 'map' ? '' : 'none';
            document.querySelectorAll('.tp-tab').forEach(b => b.classList.toggle('active', b.dataset.view === view));
            if (view === 'matrix') renderMatrix();
            if (view === 'map') renderSoiMap();
        }

        function normCat(s) {
            const v = (s || '').trim();
            return v ? v : 'OTHER';
        }

        const FRESHNESS_BUCKETS = [
            { key: 'today',     label: 'Today' },
            { key: 'week',      label: 'This week' },
            { key: 'month',     label: 'This month' },
            { key: 'stale',     label: 'Stale' },
            { key: 'forgotten', label: 'Forgotten' }
        ];
        const MASTERY_LABELS = ['Novice', 'Comfortable', 'Skilled', 'Power-user'];

        // Pure function: ISO timestamp or null -> bucket key. No DOM/state access, so it's
        // directly testable from the devtools console (see Step 5).
        function getFreshnessBucket(lastUsedAt) {
            if (!lastUsedAt) return 'forgotten';
            const days = (Date.now() - new Date(lastUsedAt).getTime()) / 86400000;
            if (days < 1) return 'today';
            if (days <= 7) return 'week';
            if (days <= 30) return 'month';
            if (days <= 90) return 'stale';
            return 'forgotten';
        }

        const CATEGORY_PALETTE = ['gray', 'blue', 'green', 'yellow', 'purple', 'red'];
        function categoryPaletteKey(category) {
            const s = normCat(category);
            let hash = 0;
            for (let i = 0; i < s.length; i++) hash = (hash * 31 + s.charCodeAt(i)) >>> 0;
            return CATEGORY_PALETTE[hash % CATEGORY_PALETTE.length];
        }

        function renderMatrix() {
            const el = document.getElementById('matrix-view');
            if (!tools.length) {
                el.innerHTML = '<div class="empty">No tools yet — add one from the List tab.</div>';
                return;
            }

            let html = '<div class="tp-matrix">';
            html += '<div class="tp-matrix-head"></div>';
            MASTERY_LABELS.forEach(label => {
                html += `<div class="tp-matrix-head">${escapeHtml(label)}</div>`;
            });

            FRESHNESS_BUCKETS.forEach(bucket => {
                html += `<div class="tp-matrix-row-label">${escapeHtml(bucket.label)}</div>`;
                for (let masteryCol = 0; masteryCol < 4; masteryCol++) {
                    const cellTools = tools.filter(t =>
                        getFreshnessBucket(t.lastUsedAt) === bucket.key && (t.mastery ?? 0) === masteryCol
                    );
                    html += '<div class="tp-matrix-cell">';
                    cellTools.forEach(t => {
                        const palette = categoryPaletteKey(t.category);
                        html += `<span class="tp-chip tp-chip-${palette}" data-tool-id="${escapeAttr(t.id)}" onclick="openChipPopover('${escapeAttr(t.id)}', this)">${escapeHtml(t.icon || '🛠')} ${escapeHtml(t.name)}</span>`;
                    });
                    html += '</div>';
                }
            });
            html += '</div>';
            el.innerHTML = html;
        }

        // SoR/SoE/SoI weights come from the 3 checkboxes: each checked pole gets an equal
        // share (1 checked -> sits at that vertex, 2 -> the edge midpoint between them,
        // 3 -> centroid). Barycentric placement + conic-gradient dot adapted directly from
        // PortaLogic's SoR/SoE/SoI map (Vibe_Coding/PortaLogic/portable-logic-v2.html).
        const SOI_TRI = { r: { x: 70, y: 430 }, e: { x: 570, y: 430 }, i: { x: 320, y: 40 } };
        const SOI_COLOR = { r: '#22c55e', e: '#38bdf8', i: 'var(--accent-super)' };

        function soiWeights(t) {
            const on = [t.sor && 'r', t.soe && 'e', t.soi && 'i'].filter(Boolean);
            if (!on.length) return null;
            const share = 1 / on.length;
            return { r: on.includes('r') ? share : 0, e: on.includes('e') ? share : 0, i: on.includes('i') ? share : 0 };
        }

        function soiPos(w) {
            return {
                x: w.r * SOI_TRI.r.x + w.e * SOI_TRI.e.x + w.i * SOI_TRI.i.x,
                y: w.r * SOI_TRI.r.y + w.e * SOI_TRI.e.y + w.i * SOI_TRI.i.y,
            };
        }

        function renderSoiMap() {
            const el = document.getElementById('map-view');
            if (!tools.length) {
                el.innerHTML = '<div class="empty">No tools yet — add one from the List tab.</div>';
                return;
            }

            const placed = tools.map(t => ({ t, w: soiWeights(t) })).filter(x => x.w);
            const unplaced = tools.length - placed.length;

            // Tools with an identical sor/soe/soi combo share one barycentric point and
            // would otherwise render exactly on top of each other (e.g. every SoE-only
            // tool lands on the SoE vertex) — group them and spread each group into a
            // small ring around that point so every tool stays individually visible/clickable.
            const groups = new Map();
            placed.forEach(p => {
                const key = `${p.w.r}|${p.w.e}|${p.w.i}`;
                if (!groups.has(key)) groups.set(key, []);
                groups.get(key).push(p);
            });

            const poles = [
                { key: 'r', pos: SOI_TRI.r, cap: 'SoR', def: 'System of Record', transform: 'translate(-2%,10px)' },
                { key: 'e', pos: SOI_TRI.e, cap: 'SoE', def: 'System of Engagement', transform: 'translate(-98%,10px)' },
                { key: 'i', pos: SOI_TRI.i, cap: 'SoI', def: 'System of Insight', transform: 'translate(-50%,-115%)' },
            ];

            const poleLabelsHtml = poles.map(p => {
                const pct = { x: p.pos.x / 640 * 100, y: p.pos.y / 480 * 100 };
                return `<div class="soi-pole-label" style="left:${pct.x}%;top:${pct.y}%;transform:${p.transform};color:${SOI_COLOR[p.key]}">
                    <span class="cap">${p.cap}</span><span class="def">${p.def}</span>
                </div>`;
            }).join('');

            const dotsArr = [];
            groups.forEach(group => {
                const basePos = soiPos(group[0].w);
                const n = group.length;
                const radius = n > 1 ? 16 + Math.sqrt(n) * 10 : 0;
                group.forEach(({ t, w }, i) => {
                    const angle = (i / n) * 2 * Math.PI;
                    const pos = n > 1
                        ? { x: basePos.x + Math.cos(angle) * radius, y: basePos.y + Math.sin(angle) * radius }
                        : basePos;
                    const pct = { x: pos.x / 640 * 100, y: pos.y / 480 * 100 };
                    const gradient = `conic-gradient(${SOI_COLOR.r} 0 ${w.r * 360}deg, ${SOI_COLOR.e} 0 ${(w.r + w.e) * 360}deg, ${SOI_COLOR.i} 0 360deg)`;
                    dotsArr.push(`<div class="soi-map-dot" style="left:${pct.x}%;top:${pct.y}%;background:${gradient}" title="${escapeAttr(t.name)}" onclick="openTool('${escapeAttr(t.id)}');switchTpView('list')"></div>`);
                });
            });
            const dotsHtml = dotsArr.join('');

            el.innerHTML = `
                <div class="soi-map-hint">${unplaced ? `${unplaced} tool${unplaced === 1 ? '' : 's'} not yet placed — check SoR/SoE/SoI in the tool's detail panel to add ${unplaced === 1 ? 'it' : 'them'} to the map.` : 'Positioned by SoR/SoE/SoI blend — click a dot to open that tool.'}</div>
                <div class="soi-map-wrap">
                    <svg class="soi-map-svg" viewBox="0 0 640 480" preserveAspectRatio="none">
                        <polygon points="${SOI_TRI.r.x},${SOI_TRI.r.y} ${SOI_TRI.e.x},${SOI_TRI.e.y} ${SOI_TRI.i.x},${SOI_TRI.i.y}" fill="none" stroke="var(--border)" stroke-width="1.5"/>
                        <line x1="${SOI_TRI.r.x}" y1="${SOI_TRI.r.y}" x2="${(SOI_TRI.e.x+SOI_TRI.i.x)/2}" y2="${(SOI_TRI.e.y+SOI_TRI.i.y)/2}" stroke="var(--border)" stroke-width="1" opacity=".5"/>
                        <line x1="${SOI_TRI.e.x}" y1="${SOI_TRI.e.y}" x2="${(SOI_TRI.r.x+SOI_TRI.i.x)/2}" y2="${(SOI_TRI.r.y+SOI_TRI.i.y)/2}" stroke="var(--border)" stroke-width="1" opacity=".5"/>
                        <line x1="${SOI_TRI.i.x}" y1="${SOI_TRI.i.y}" x2="${(SOI_TRI.r.x+SOI_TRI.e.x)/2}" y2="${(SOI_TRI.r.y+SOI_TRI.e.y)/2}" stroke="var(--border)" stroke-width="1" opacity=".5"/>
                    </svg>
                    ${poleLabelsHtml}
                    ${dotsHtml}
                </div>`;
        }

        function closeChipPopover() {
            const existing = document.getElementById('tp-popover');
            if (existing) existing.remove();
            const backdrop = document.getElementById('tp-popover-backdrop');
            if (backdrop) backdrop.remove();
        }

        function openChipPopover(toolId, anchorEl) {
            closeChipPopover();
            const t = tools.find(x => x.id === toolId);
            if (!t) return;

            const backdrop = document.createElement('div');
            backdrop.id = 'tp-popover-backdrop';
            backdrop.className = 'tp-popover-backdrop';
            backdrop.onclick = closeChipPopover;
            document.body.appendChild(backdrop);

            const rect = anchorEl.getBoundingClientRect();
            const pop = document.createElement('div');
            pop.id = 'tp-popover';
            pop.className = 'tp-popover';
            pop.style.top = (rect.bottom + window.scrollY + 6) + 'px';
            pop.style.left = (rect.left + window.scrollX) + 'px';
            pop.onclick = e => e.stopPropagation();

            // 4 dots representing mastery levels 0-3 (Novice..Power-user). Dot `lvl` renders
            // filled when `mastery >= lvl` (level 0/Novice's dot is always at least filled),
            // clicking dot `lvl` sets mastery to exactly `lvl`.
            const dots = [0, 1, 2, 3].map(lvl =>
                `<span class="tp-mastery-dot${(t.mastery ?? 0) >= lvl ? ' filled' : ''}" title="${escapeAttr(MASTERY_LABELS[lvl])}" onclick="setToolMastery('${escapeAttr(t.id)}', ${lvl})"></span>`
            ).join('');

            pop.innerHTML = `
                <div class="tp-popover-title">${escapeHtml(t.icon || '🛠')} ${escapeHtml(t.name)}</div>
                <div class="tp-popover-row">
                    <div class="tp-popover-label">Used ${t.useCount || 0}× · last ${t.lastUsedAt ? new Date(t.lastUsedAt).toLocaleDateString() : 'never'}</div>
                    <button class="btn btn-primary" style="font-size:12px;padding:5px 10px" onclick="logToolUsage('${escapeAttr(t.id)}')">✓ Used today</button>
                </div>
                <div class="tp-popover-row">
                    <div class="tp-popover-label">Mastery — ${escapeHtml(MASTERY_LABELS[t.mastery ?? 0])}</div>
                    <div class="tp-mastery-dots" id="tp-mastery-dots">${dots}</div>
                </div>
                <a class="tp-popover-link" onclick="switchTpView('list'); openTool('${escapeAttr(t.id)}'); closeChipPopover();">View details →</a>
            `;
            document.body.appendChild(pop);
        }

        function logToolUsage(toolId) {
            const t = tools.find(x => x.id === toolId);
            if (!t) return;
            t.lastUsedAt = new Date().toISOString();
            t.useCount = (t.useCount || 0) + 1;
            save();
            renderMatrix();
            closeChipPopover();
        }

        function setToolMastery(toolId, level) {
            const t = tools.find(x => x.id === toolId);
            if (!t) return;
            t.mastery = Math.min(3, Math.max(0, Math.round(level)));
            save();
            renderMatrix();
            closeChipPopover();
        }

        function load() {
            tools = HubStorage.get(STORAGE_KEY) || [];
            ensureOrderFields();
            ensureUsageFields();
            renderList();
            renderStatsBar();
            renderDetail();
        }

        function save() {
            HubStorage.set(STORAGE_KEY, tools);
            showToast('Tool saved');
            renderList();
            renderStatsBar();
        }

        // Ensure tools have stable ordering inside each category
        function ensureOrderFields() {
            // Add order if missing (preserve existing order if present)
            let changed = false;

            // group current tools by category
            const groups = {};
            tools.forEach(t => {
                const cat = normCat(t.category);
                if (!groups[cat]) groups[cat] = [];
                groups[cat].push(t);
            });

            Object.keys(groups).forEach(cat => {
                const list = groups[cat];
                // sort by existing order; fallback to creation-like id order
                list.sort((a, b) => (a.order ?? 1e15) - (b.order ?? 1e15));
                let i = 1;
                list.forEach(t => {
                    if (typeof t.order !== 'number') {
                        t.order = i;
                        changed = true;
                    }
                    i++;
                });
            });

            if (changed) HubStorage.set(STORAGE_KEY, tools);
        }

        // Backfill freshness/mastery fields for tools created before this feature existed
        function ensureUsageFields() {
            let changed = false;
            tools.forEach(t => {
                if (t.lastUsedAt === undefined) { t.lastUsedAt = null; changed = true; }
                if (typeof t.useCount !== 'number') { t.useCount = 0; changed = true; }
                if (typeof t.mastery !== 'number') { t.mastery = 0; changed = true; }
                const clamped = Math.min(3, Math.max(0, Math.round(t.mastery)));
                if (t.mastery !== clamped) { t.mastery = clamped; changed = true; }
            });
            if (changed) HubStorage.set(STORAGE_KEY, tools);
        }

        function createTool() {
            const t = {
                id: 'tool-' + Date.now().toString(36),
                name: 'New Tool',
                icon: '🛠',
                url: '',
                status: 'exploring',
                ring: 'assess',
                sor: false,
                soe: false,
                soi: false,
                category: '',
                note: '',
                projectIds: [],
                order: 999999, // appended at end of its category
                lastUsedAt: null,
                useCount: 0,
                mastery: 0
            };
            tools.push(t);
            normalizeOrdersInCategory(normCat(t.category));
            save();
            openTool(t.id);
        }

        function toggleSidebar() {
            const s = document.querySelector('.sidebar');
            const b = document.getElementById('tp-backdrop');
            b.classList.toggle('open', s.classList.toggle('open'));
        }
        function closeSidebar() {
            document.querySelector('.sidebar').classList.remove('open');
            document.getElementById('tp-backdrop').classList.remove('open');
        }

        function openTool(id) {
            closeSidebar();
            currentId = id;
            compareMode = false;
            const btn = document.getElementById('compare-btn');
            if (btn) { btn.style.display = ''; btn.textContent = '⇄ Compare'; btn.style.color = ''; }
            renderList();
            renderDetail();
        }

        function deleteTool() {
            if (!currentId) return;
            if (!confirm('Delete this tool?')) return;
            const deleted = tools.find(t => t.id === currentId);
            const cat = deleted ? normCat(deleted.category) : null;

            tools = tools.filter(t => t.id !== currentId);
            currentId = null;

            if (cat) normalizeOrdersInCategory(cat);
            save();
            renderDetail();
        }

        let _saveTimer = null;
        function debouncedSave() {
            clearTimeout(_saveTimer);
            _saveTimer = setTimeout(save, 600);
        }

        function updateField(key, value) {
            const t = tools.find(x => x.id === currentId);
            if (!t) return;

            // Text inputs: update in-memory immediately, debounce save so cursor never jumps
            if (key === 'name' || key === 'icon' || key === 'url' || key === 'note') {
                t[key] = value;
                if (key === 'name') document.getElementById('topbar-title').textContent = value;
                if (key === 'url' || key === 'icon') {
                    const prev = document.getElementById('tp-icon-preview');
                    if (prev) prev.innerHTML = _iconPreviewHtml(t);
                }
                debouncedSave();
                return;
            }

            // Category: re-normalize ordering but never re-render detail (would eject cursor)
            if (key === 'category') {
                const oldCat = normCat(t.category);
                t[key] = value;
                const newCat = normCat(t.category);
                t.order = 999999;
                normalizeOrdersInCategory(oldCat);
                normalizeOrdersInCategory(newCat);
                debouncedSave();
                return;
            }

            const oldRing = (key === 'ring') ? t.ring : null;
            t[key] = value;
            save();
            document.getElementById('topbar-title').textContent = t.name;
            if (key === 'ring') {
                renderDetail(); // re-render so ring pill active states update
                // Prompt decision log on meaningful ring promotions
                const promotions = { assess: ['trial','adopt'], trial: ['adopt'], hold: ['trial','adopt'] };
                if (oldRing && (promotions[oldRing] || []).includes(value)) {
                    promptRingDecision(t, oldRing, value);
                }
            }
        }

        // SoR/SoE/SoI are independent toggles (a tool can be more than one), unlike the
        // single-select ring — flip in place and re-render so the pill state updates.
        function toggleArchTag(key) {
            const t = tools.find(x => x.id === currentId);
            if (!t) return;
            t[key] = !t[key];
            save();
            renderDetail();
        }

        // Normalize sequential order for a category (1..n)
        function normalizeOrdersInCategory(cat) {
            const list = tools
                .filter(t => normCat(t.category) === cat)
                .sort((a, b) => (a.order ?? 999999) - (b.order ?? 999999));

            list.forEach((t, idx) => t.order = idx + 1);
        }

        // Reorder within category: draggedId dropped onto targetId (insert before target)
        function reorderWithinCategory(cat, draggedId, targetId) {
            const list = tools
                .filter(t => normCat(t.category) === cat)
                .sort((a, b) => (a.order ?? 999999) - (b.order ?? 999999));

            const fromIdx = list.findIndex(t => t.id === draggedId);
            const toIdx = list.findIndex(t => t.id === targetId);
            if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return;

            const [moved] = list.splice(fromIdx, 1);
            list.splice(toIdx, 0, moved);

            // write back sequential order
            list.forEach((t, idx) => t.order = idx + 1);
        }

        // Move dragged tool to end of category (optional nice UX)
        function moveToCategoryEnd(newCat, draggedId) {
            const t = tools.find(x => x.id === draggedId);
            if (!t) return;

            const oldCat = normCat(t.category);
            t.category = (newCat === 'OTHER') ? '' : newCat; // keep OTHER as empty
            t.order = 999999;

            normalizeOrdersInCategory(oldCat);
            normalizeOrdersInCategory(normCat(t.category));
        }

        let _searchQuery  = '';
        let _ringFilter   = null; // null = show all, or 'adopt'|'trial'|'assess'|'hold'
        let _statusFilter = null; // null = show all, or 'exploring'|'piloting'|'using'|'retired'

        function onSearchInput() {
            _searchQuery = (document.getElementById('sidebar-search').value || '').toLowerCase().trim();
            document.getElementById('search-clear').classList.toggle('visible', _searchQuery.length > 0);
            renderList();
        }

        function clearSearch() {
            document.getElementById('sidebar-search').value = '';
            _searchQuery = '';
            document.getElementById('search-clear').classList.remove('visible');
            renderList();
        }

        function toggleRingFilter(ring) {
            _ringFilter = (!ring || _ringFilter === ring) ? null : ring;
            renderStatsBar();
            renderList();
        }

        function toggleStatusFilter(status) {
            _statusFilter = (!status || _statusFilter === status) ? null : status;
            renderStatsBar();
            renderList();
        }

        function renderStatsBar() {
            const bar = document.getElementById('stats-bar');
            if (!bar) return;

            const ringCounts = { adopt: 0, trial: 0, assess: 0, hold: 0 };
            const statusCounts = { exploring: 0, piloting: 0, using: 0, retired: 0 };
            tools.forEach(t => {
                if (ringCounts[t.ring] !== undefined) ringCounts[t.ring]++;
                if (statusCounts[t.status] !== undefined) statusCounts[t.status]++;
            });

            const total = tools.length;
            const ringLabels   = { adopt:'Adopt', trial:'Trial', assess:'Assess', hold:'Hold' };
            const statusLabels = { exploring:'Exploring', piloting:'Piloting', using:'Using', retired:'Retired' };

            const anyFilter = _ringFilter || _statusFilter;
            const dim = (active) => active ? '' : (anyFilter ? ' sp-dimmed' : '');

            bar.innerHTML = [
                `<div class="stat-pill sp-total${anyFilter ? ' sp-dimmed' : ''}" title="Clear filters" onclick="toggleRingFilter(null);toggleStatusFilter(null)">
                    <span class="sp-count">${total}</span><span class="sp-label">total</span>
                </div>`,
                `<div class="stats-divider"></div>`,
                ...['adopt','trial','assess','hold'].map(r =>
                    ringCounts[r] > 0
                        ? `<div class="stat-pill sp-${r}${dim(_ringFilter === r)}" title="Radar: ${ringLabels[r]}" onclick="toggleRingFilter('${r}')">
                               <span class="sp-count">${ringCounts[r]}</span><span class="sp-label">${ringLabels[r]}</span>
                           </div>`
                        : ''
                ),
                `<div class="stats-divider"></div>`,
                ...['exploring','piloting','using','retired'].map(s =>
                    statusCounts[s] > 0
                        ? `<div class="stat-pill sp-${s}${dim(_statusFilter === s)}" title="Stage: ${statusLabels[s]}" onclick="toggleStatusFilter('${s}')">
                               <span class="sp-count">${statusCounts[s]}</span><span class="sp-label">${statusLabels[s]}</span>
                           </div>`
                        : ''
                )
            ].join('');
        }

        function renderList() {
            const listEl = document.getElementById('tool-list');
            listEl.innerHTML = '';

            // Apply filters: ring, status, search
            let filtered = tools;
            if (_ringFilter)   filtered = filtered.filter(t => t.ring === _ringFilter);
            if (_statusFilter) filtered = filtered.filter(t => t.status === _statusFilter);
            if (_searchQuery)  filtered = filtered.filter(t =>
                (t.name || '').toLowerCase().includes(_searchQuery) ||
                (t.category || '').toLowerCase().includes(_searchQuery) ||
                (t.description || '').toLowerCase().includes(_searchQuery));

            if (!filtered.length) {
                const parts = [
                    _ringFilter   ? `radar: <strong>${_ringFilter}</strong>`   : '',
                    _statusFilter ? `stage: <strong>${_statusFilter}</strong>` : '',
                    _searchQuery  ? `"${escapeHtml(_searchQuery)}"` : '',
                ].filter(Boolean).join(', ');
                listEl.innerHTML = `<div class="empty" style="margin-top:12px;font-style:italic">No tools${parts ? ' · ' + parts : ''}.</div>`;
                return;
            }

            // Group tools by category
            const groups = {};
            filtered.forEach(t => {
                const cat = normCat(t.category);
                if (!groups[cat]) groups[cat] = [];
                groups[cat].push(t);
            });

            // Sort categories (OTHER last)
            const cats = Object.keys(groups).sort((a, b) => {
                if (a === 'OTHER' && b !== 'OTHER') return 1;
                if (b === 'OTHER' && a !== 'OTHER') return -1;
                return a.localeCompare(b);
            });

            cats.forEach(cat => {
                const items = groups[cat].sort((a, b) => (a.order ?? 999999) - (b.order ?? 999999));

                const section = document.createElement('div');
                section.className = 'cat-section';

                const header = document.createElement('div');
                header.className = 'cat-header';
                header.dataset.cat = cat;
                header.innerHTML = `
        <div class="cat-title">${escapeHtml(cat)}</div>
        <span class="cat-drop-hint">Drop to move here</span>
        <div class="cat-count">${items.length}</div>
      `;

                // Allow dropping on category header (moves dragged tool to end of that category)
                header.addEventListener('dragover', (e) => {
                    if (!dragId) return;
                    e.preventDefault();
                    header.classList.add('drag-over');
                });
                header.addEventListener('dragleave', () => header.classList.remove('drag-over'));
                header.addEventListener('drop', (e) => {
                    e.preventDefault();
                    header.classList.remove('drag-over');
                    if (!dragId) return;

                    // If dropped on header of same category, just append to end
                    moveToCategoryEnd(cat, dragId);
                    save();
                    dragId = null;
                    dragCat = null;
                });

                const itemsWrap = document.createElement('div');
                itemsWrap.className = 'cat-items';

                items.forEach(t => {
                    const row = document.createElement('div');
                    row.className = 'tool-item' + (t.id === currentId ? ' active' : '');
                    row.dataset.id = t.id;
                    row.dataset.cat = cat;
                    row.draggable = true;

                    const statusColors = { exploring:'var(--text3)', piloting:'#38bdf8', using:'var(--accent)', retired:'var(--border)' };
                    const statusDot = t.status ? `<span style="width:7px;height:7px;border-radius:50%;background:${statusColors[t.status]||'var(--text3)'};flex-shrink:0;display:inline-block" title="Stage: ${t.status}"></span>` : '';
                    row.innerHTML = `
          <div class="drag-handle" title="Drag to reorder">⋮⋮</div>
          <div class="tool-icon">${toolIconHtml(t)}</div>
          <div class="tool-name">${escapeHtml(t.name)}</div>
          ${statusDot}
        `;

                    // Click = open (but ignore click immediately after drag)
                    row.addEventListener('click', () => openTool(t.id));

                    // Drag events
                    row.addEventListener('dragstart', (e) => {
                        dragId = t.id;
                        dragCat = cat;
                        row.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                        try { e.dataTransfer.setData('text/plain', t.id); } catch { }
                    });

                    row.addEventListener('dragend', () => {
                        dragId = null;
                        dragCat = null;
                        row.classList.remove('dragging');
                        document.querySelectorAll('.tool-item.drag-over').forEach(x => x.classList.remove('drag-over'));
                        document.querySelectorAll('.cat-header.drag-over').forEach(x => x.classList.remove('drag-over'));
                    });

                    row.addEventListener('dragover', (e) => {
                        // Only allow reorder inside same category
                        if (!dragId || dragCat !== cat) return;
                        e.preventDefault();
                        row.classList.add('drag-over');
                        e.dataTransfer.dropEffect = 'move';
                    });

                    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));

                    row.addEventListener('drop', (e) => {
                        e.preventDefault();
                        row.classList.remove('drag-over');

                        if (!dragId || dragCat !== cat) return;
                        if (dragId === t.id) return;

                        reorderWithinCategory(cat, dragId, t.id);
                        save();
                    });

                    itemsWrap.appendChild(row);
                });

                section.appendChild(header);
                section.appendChild(itemsWrap);
                listEl.appendChild(section);
            });

            if (!tools.length) {
                listEl.innerHTML = `<div class="empty" style="margin-top:12px">No tools yet.</div>`;
            }
        }

        function toggleCompare() {
            compareMode = !compareMode;
            const btn = document.getElementById('compare-btn');
            if (compareMode) {
                btn.textContent = '✕ Exit Compare';
                btn.style.color = 'var(--accent-nope)';
                // default compareId to a different tool
                if (!compareId || compareId === currentId) {
                    const other = tools.find(t => t.id !== currentId);
                    compareId = other ? other.id : null;
                }
                renderCompare();
            } else {
                btn.textContent = '⇄ Compare';
                btn.style.color = '';
                renderDetail();
            }
        }

        function renderCompare() {
            const c = document.getElementById('content');
            const tA = tools.find(t => t.id === currentId);
            const tB = tools.find(t => t.id === compareId);
            if (!tA) return;

            const ringLabels = { adopt:'Adopt', trial:'Trial', assess:'Assess', hold:'Hold' };
            const ringColors = { adopt:'var(--accent)', trial:'#38bdf8', assess:'var(--accent-super)', hold:'var(--accent-nope)' };
            const statusColors = { exploring:'var(--text3)', piloting:'#38bdf8', using:'var(--accent)', retired:'var(--text3)' };

            function toolCol(t, isB) {
                if (!t) return `<div class="compare-col">
                    ${isB ? `<div class="compare-picker-label">Compare with</div>
                    <select class="select" onchange="compareId=this.value;renderCompare()" style="margin-bottom:12px">
                        ${tools.filter(x=>x.id!==currentId).map(x=>`<option value="${escapeHtml(x.id)}">${escapeHtml(x.icon||'🛠')} ${escapeHtml(x.name)}</option>`).join('')}
                    </select>` : ''}
                    <div class="empty-state" style="padding:40px 0">No tool selected</div>
                </div>`;

                const linkedProjects = (() => {
                    try {
                        const ph = JSON.parse(localStorage.getItem('project-hub-v1')||'{}');
                        return (ph.projects||[]).filter(p=>(t.linkedProjects||[]).includes(p.id)).map(p=>p.name);
                    } catch { return []; }
                })();

                const rows = [
                    ['Category',   t.category  || ''],
                    ['Status',     t.status    ? `<span style="color:${statusColors[t.status]||'var(--text3)'}">${t.status}</span>` : ''],
                    ['Radar Ring', t.ring      ? `<span style="color:${ringColors[t.ring]||'var(--text3)'}">${ringLabels[t.ring]||t.ring}</span>` : ''],
                    ['SoR · SoE · SoI', [t.sor && 'SoR', t.soe && 'SoE', t.soi && 'SoI'].filter(Boolean).join(' · ')],
                    ['URL',        t.url       ? `<a href="${escapeHtml(t.url)}" target="_blank" style="color:var(--accent);font-size:12px">${escapeHtml(t.url)}</a>` : ''],
                    ['Projects',   linkedProjects.length ? linkedProjects.map(n=>`<span style="font-size:12px;background:var(--surface3);border-radius:3px;padding:1px 5px">${escapeHtml(n)}</span>`).join(' ') : ''],
                    ['Notes',      t.note      || ''],
                ].map(([label, val]) => `
                    <div class="compare-row">
                        <div class="compare-row-label"${label.startsWith('SoR') ? ' style="text-transform:none"' : ''}>${label}</div>
                        <div class="compare-row-value ${val ? '' : 'compare-row-empty'}">${val || '—'}</div>
                    </div>`).join('');

                const pickerHtml = isB ? `
                    <div class="compare-picker-label">Compare with</div>
                    <select class="select" onchange="compareId=this.value;renderCompare()" style="margin-bottom:4px">
                        ${tools.filter(x=>x.id!==currentId).map(x=>`<option value="${escapeHtml(x.id)}" ${x.id===compareId?'selected':''}>${escapeHtml(x.icon||'🛠')} ${escapeHtml(x.name)}</option>`).join('')}
                    </select>` : '';

                return `<div class="compare-col">
                    ${pickerHtml}
                    <div class="compare-col-header">
                        <div class="compare-col-icon">${toolIconHtml(t, 22)}</div>
                        <div class="compare-col-name">${escapeHtml(t.name)}</div>
                    </div>
                    ${rows}
                </div>`;
            }

            c.innerHTML = `<div class="compare-split">${toolCol(tA, false)}${toolCol(tB, true)}</div>`;
        }

        function renderDetail() {
            const c = document.getElementById('content');
            const title = document.getElementById('topbar-title');

            const compareBtn = document.getElementById('compare-btn');
            if (!currentId) {
                title.textContent = 'Select a tool';
                c.innerHTML = '<div class="empty">Select a tool or add a new one.</div>';
                if (compareBtn) compareBtn.style.display = 'none';
                return;
            }

            const t = tools.find(x => x.id === currentId);
            if (!t) return;

            title.textContent = t.name;
            if (compareBtn) compareBtn.style.display = '';

            const openBtn = t.url
                ? '<a class="btn" href="' + t.url + '" target="_blank">Open</a>'
                : '';

            c.innerHTML = `
      <div class="card">
        <div class="label">Basic</div>
        <div class="row">
          <div class="field">
            <div class="field-label">Tool name</div>
            <input class="input"
              value="${escapeAttr(t.name)}"
              placeholder="e.g. Autodesk Revit"
              oninput="updateField('name', this.value)"
            />
            <div class="field-hint">Human-readable product or platform name</div>
          </div>
          <div class="field">
            <div class="field-label">Icon</div>
            <div id="tp-icon-preview">${_iconPreviewHtml(t)}</div>
            <input class="input"
              value="${escapeAttr(t.icon)}"
              placeholder="🛠 emoji fallback"
              oninput="updateField('icon', this.value)"
            />
            <div class="field-hint">${t.url ? 'Shown when favicon cannot load' : 'Emoji — add URL to auto-fetch favicon'}</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="label">Details</div>
        <div class="row">
          <div class="field">
            <div class="field-label">Status</div>
            <select class="select" onchange="updateField('status', this.value)">
              <option ${t.status === 'exploring' ? 'selected' : ''}>exploring</option>
              <option ${t.status === 'piloting' ? 'selected' : ''}>piloting</option>
              <option ${t.status === 'using' ? 'selected' : ''}>using</option>
              <option ${t.status === 'retired' ? 'selected' : ''}>retired</option>
            </select>
            <div class="field-hint">Your adoption journey — where are you with this tool?</div>
          </div>
          <div class="field">
            <div class="field-label">Radar Ring <span style="color:var(--text3);font-size:10px;font-weight:400">(Technology Radar)</span></div>
            <div class="ring-pill-row">
              ${['adopt','trial','assess','hold'].map(r => {
                const labels = { adopt:'✅ Adopt', trial:'🔬 Trial', assess:'🔍 Assess', hold:'⏸ Hold' };
                const hints  = { adopt:'battle-tested', trial:'worth a project', assess:'worth exploring', hold:'use with caution' };
                const active = (t.ring || 'assess') === r;
                return `<button class="ring-pill-btn${active ? ' active-'+r : ''}" onclick="updateField('ring','${r}')" title="${hints[r]}">${labels[r]}</button>`;
              }).join('')}
            </div>
            <div class="field-hint">Your recommendation — would you use this again? (Technology Radar framework)</div>
          </div>

          <div class="field">
            <div class="field-label" style="text-transform:none">SoR · SoE · SoI <span style="color:var(--text3);font-size:10px;font-weight:400;text-transform:uppercase">(check all that apply)</span></div>
            <div class="ring-pill-row">
              <button class="ring-pill-btn${t.sor ? ' active-sor' : ''}" onclick="toggleArchTag('sor')" title="System of Record — the source of truth for this data">SoR</button>
              <button class="ring-pill-btn${t.soe ? ' active-soe' : ''}" onclick="toggleArchTag('soe')" title="System of Engagement — day-to-day user interaction">SoE</button>
              <button class="ring-pill-btn${t.soi ? ' active-soi' : ''}" onclick="toggleArchTag('soi')" title="System of Insight — analysis, prediction, decision support">SoI</button>
            </div>
            <div class="field-hint">SoR = source of truth for this data. SoE = day-to-day user interaction. SoI = analysis, prediction, decision support. A tool can be more than one — see the Map tab for where it sits.</div>
          </div>
          <div class="field">
            <div class="field-label">Category</div>
            <input class="input"
              value="${escapeAttr(t.category)}"
              placeholder="BIM / AI / Platform / Infra"
              oninput="updateField('category', this.value)"
            />
            <div class="field-hint">Used for listing and grouping</div>
          </div>
        </div>

        <div class="field" style="margin-top:12px">
          <div class="field-label">URL</div>
          <input class="input"
            value="${escapeAttr(t.url)}"
            placeholder="https://..."
            oninput="updateField('url', this.value)"
          />
          <div class="field-hint">Official site, docs, or landing page</div>
        </div>
      </div>

      <div class="card">
        <div class="label">Why it matters</div>
        <textarea class="textarea" oninput="updateField('note', this.value)">${escapeHtml(t.note || '')}</textarea>
      </div>

      <div class="card">
        <div class="label" style="display:flex;align-items:center;justify-content:space-between">
          <span>Enabled Projects</span>
          ${(t.ring === 'assess' || t.ring === 'trial') ? `<button class="btn" style="font-size:11px;padding:3px 10px" onclick="createEvalTask()">＋ Evaluation Task</button>` : ''}
        </div>
        <div class="field-hint" style="margin-bottom:8px">Link this tool to projects it supports or enables — shows a 🛠 chip on project cards.</div>
        <div id="tp-proj-links">${_renderProjectLinksHTML(t)}</div>
      </div>

      <div class="actions">
        ${openBtn}
        <button class="btn danger" onclick="deleteTool()">Delete</button>
      </div>
    `;
        }

        // ── Enabled-projects helpers ──────────────────────────────────────────

        function _renderProjectLinksHTML(t) {
            const raw = HubStorage.get('project-hub-v1') || {};
            const projects = raw.projects || [];
            if (!projects.length) {
                return '<div class="field-hint" style="padding:4px 0">No projects found in Project Hub yet.</div>';
            }
            const linked = t.projectIds || [];
            const statusColor = { active:'var(--accent)', planning:'#38bdf8', onhold:'var(--accent-super)', done:'var(--text3)' };

            // Group by proj.group, using Project Hub's saved group order (same as its
            // Groupings view) with unseen groups appended alphabetically; ungrouped last.
            const groupMap = new Map();
            projects.forEach(p => {
                const key = (p.group || '').trim();
                if (!groupMap.has(key)) groupMap.set(key, []);
                groupMap.get(key).push(p);
            });
            const namedKeys = [...groupMap.keys()].filter(k => k);
            const savedOrder = raw.groupOrder || [];
            const known = savedOrder.filter(g => namedKeys.includes(g));
            const extra = namedKeys.filter(g => !known.includes(g)).sort((a, b) => a.localeCompare(b));
            const orderedGroups = [...known, ...extra];
            if (groupMap.has('')) orderedGroups.push('');

            return orderedGroups.map(groupName => {
                const groupProjects = groupMap.get(groupName).slice().sort((a, b) => a.name.localeCompare(b.name));
                const heading = (groupName || orderedGroups.length > 1)
                    ? `<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:8px 0 4px">${escapeHtml(groupName || 'Ungrouped')}</div>`
                    : '';
                const rows = groupProjects.map(p => {
                    const checked = linked.includes(p.id);
                    const col = statusColor[p.status] || 'var(--text3)';
                    return `<label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border);">
                        <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleProjectLink('${p.id}')" style="accent-color:var(--accent);width:14px;height:14px;flex-shrink:0">
                        <span style="flex:1;font-weight:${checked?'600':'400'}">${escapeHtml(p.name)}</span>
                        <span style="font-size:10px;color:${col};font-family:var(--font-mono);text-transform:uppercase">${p.status || 'active'}</span>
                    </label>`;
                }).join('');
                return heading + rows;
            }).join('');
        }

        function toggleProjectLink(projId) {
            const t = tools.find(x => x.id === currentId);
            if (!t) return;
            if (!t.projectIds) t.projectIds = [];
            const idx = t.projectIds.indexOf(projId);
            if (idx >= 0) {
                t.projectIds.splice(idx, 1);
            } else {
                t.projectIds.push(projId);
            }
            save();
            // Refresh just the links section without full re-render
            const el = document.getElementById('tp-proj-links');
            if (el) el.innerHTML = _renderProjectLinksHTML(t);
        }

        // ── Evaluation task creator ───────────────────────────────────────────

        function createEvalTask() {
            const t = tools.find(x => x.id === currentId);
            if (!t) return;

            const raw = HubStorage.get('project-hub-v1') || {};
            const projects = (raw.projects || []).filter(p => p.status === 'active' || p.status === 'planning');

            if (!projects.length) {
                alert('No active or planning projects found.\nCreate a project in Project Hub first.');
                return;
            }

            // If tool already linked to projects, offer those first
            const linked = (t.projectIds || []);
            const preferred = projects.filter(p => linked.includes(p.id));
            const rest = projects.filter(p => !linked.includes(p.id));
            const ordered = [...preferred, ...rest];

            const lines = ordered.map((p, i) => `${i + 1}. ${p.name}${linked.includes(p.id) ? ' ✓' : ''}`).join('\n');
            const choice = prompt(
                `Add "Evaluate ${t.name}" task to which project?\n\n${lines}\n\nEnter number (linked projects marked ✓):`
            );
            if (!choice) return;

            const idx = parseInt(choice, 10) - 1;
            if (isNaN(idx) || idx < 0 || idx >= ordered.length) {
                alert('Invalid selection.');
                return;
            }

            const proj = ordered[idx];
            const taskTitle = `Evaluate ${t.name}`;
            const newTask = {
                id: 't-' + Date.now().toString(36),
                title: taskTitle,
                status: 'todo',
                priority: 'medium',
                due: '',
                assignee: '',
                note: `Technology Radar ring: ${t.ring || 'assess'}. ${t.url ? 'URL: ' + t.url : ''}`.trim(),
                created: new Date().toISOString()
            };

            if (!proj.tasks) proj.tasks = [];
            proj.tasks.push(newTask);
            HubStorage.set('project-hub-v1', raw);
            alert(`✓ Task "${taskTitle}" added to "${proj.name}"`);
        }

        // ── Ring promotion → Decision log ─────────────────────────────────────

        function promptRingDecision(t, oldRing, newRing) {
            const ringLabels = { adopt: 'Adopt', trial: 'Trial', assess: 'Assess', hold: 'Hold' };
            const msg = `Log this radar ring change as a decision?\n\n"${t.name}": ${ringLabels[oldRing]} → ${ringLabels[newRing]}`;
            if (!confirm(msg)) return;

            const decisions = HubStorage.get('decision-hub-v1') || [];
            const d = {
                id: 'dh-' + Date.now().toString(36),
                title: `Promote ${t.name} to "${ringLabels[newRing]}" on Technology Radar`,
                type: 'tool',
                status: 'decided',
                confidence: newRing === 'adopt' ? 85 : newRing === 'trial' ? 65 : 50,
                summary: `Changed Technology Radar ring from ${ringLabels[oldRing]} to ${ringLabels[newRing]}.`,
                reasoning: `Category: ${t.category || 'Uncategorized'}. Lifecycle status: ${t.status || 'exploring'}.${t.url ? ' Reference: ' + t.url : ''}`,
                tags: ['technology-radar', 'tool-evaluation'],
                cynefin: 'complicated',
                obsidianNote: '',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            decisions.push(d);
            HubStorage.set('decision-hub-v1', decisions);
            alert(`✓ Decision logged: "${d.title}"`);
        }

        // ── Hub Search integration ─────────────────
        HubLinks.resolveItems = (function (orig) {
            return function (toolId) {
                if (toolId === 'tool-portfolio') {
                    const data = HubStorage.get(STORAGE_KEY) || [];
                    return data.map(t => ({
                        id: t.id,
                        label: t.name,
                        subtitle: normCat(t.category) + ' · ' + (t.status || 'tool')
                    }));
                }
                return orig(toolId);
            };
        })(HubLinks.resolveItems);

        // ── Helpers ───────────────────────────────

        function toolIconHtml(t, sz) {
            sz = sz || 20;
            if (t.url) {
                try {
                    const domain = new URL(t.url).hostname;
                    if (domain) {
                        const fb = escapeHtml(t.icon || '🛠');
                        return `<img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=32" width="${sz}" height="${sz}" style="object-fit:contain;border-radius:3px;display:block" onerror="this.style.display='none';this.nextElementSibling.style.display=''" alt=""><span style="display:none">${fb}</span>`;
                    }
                } catch {}
            }
            return escapeHtml(t.icon || '🛠');
        }

        function _iconPreviewHtml(t) {
            if (!t.url) return '';
            try {
                const domain = new URL(t.url).hostname;
                if (!domain) return '';
                return `<div style="display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:var(--r-sm);background:var(--surface2);border:1px solid var(--border);margin-bottom:6px">
                    <div style="width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:var(--surface3);border-radius:7px;font-size:14px;flex-shrink:0">${toolIconHtml(t, 18)}</div>
                    <span style="font-size:11px;color:var(--text2);font-family:var(--font-mono);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(domain)}</span>
                    <span style="font-size:9px;color:var(--accent);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.5px">auto</span>
                </div>`;
            } catch { return ''; }
        }

        function escapeHtml(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function escapeAttr(s) {
            // safer for value=""
            return escapeHtml(s).replace(/`/g, '&#096;');
        }

        load();
        // Auto-select first tool so the detail pane isn't blank when items exist.
        // A hub-highlight postMessage (deep-link) arrives async and overrides this.
        if (!currentId && tools.length) openTool(tools[0].id);
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            HubBootstrap.start('tool-portfolio');
        });
        window.addEventListener('message', e => {
            if (e.origin !== window.location.origin) return;
            if (e.data?.type === 'hub-highlight' && e.data.itemId) {
                switchTpView('list');
                openTool(e.data.itemId);
            }
        });
    </script>
</body>

</html>
