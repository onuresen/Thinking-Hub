<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.anthropic.com; frame-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People Hub</title>
  <link rel="stylesheet" href="styles/fonts.css">
  <link rel="stylesheet" href="theme.css">
  <script src="hub-storage.js"></script>
  <script src="hub-utils.js"></script>
  <script src="hub-links.js"></script>
  <script src="hub-data.js"></script>
  <script src="hub-toast.js"></script>
  <script src="hub-bootstrap.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }
    body { display: flex; flex-direction: column; }

    /* ── Header ── */
    .ph-header {
      padding: 12px 20px 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }
    .ph-header-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .ph-title { font-family: var(--font-display); font-size: 15px; font-weight: 800; }
    .ph-subtitle { font-size: 11px; color: var(--text3); font-family: var(--font-mono); flex: 1; }
    .ph-actions { display: flex; gap: 8px; }

    /* ── Tabs ── */
    .ph-tabs { display: flex; }
    .ph-tab {
      padding: 8px 16px;
      font-size: 12px; font-family: var(--font-body); font-weight: 500;
      color: var(--text2); background: transparent; border: none;
      border-bottom: 2px solid transparent; cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .ph-tab:hover { color: var(--text); }
    .ph-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Content ── */
    .ph-content { flex: 1; overflow: hidden; }
    .ph-panel { display: none; height: 100%; overflow-y: auto; padding: 20px; flex-direction: column; gap: 12px; }
    .ph-panel.active { display: flex; }
    .ph-panel::-webkit-scrollbar { width: 4px; }
    .ph-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    #tab-overlap, #tab-me { overflow: hidden; gap: 0; }

    /* ── Org Tree ── */
    .org-section-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--_d, var(--border));
      border-radius: var(--r); padding: 10px 14px; margin-bottom: 4px;
    }
    .org-leaf-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--_d, var(--border));
      border-radius: var(--r); padding: 9px 12px; min-width: 0;
    }
    .org-leaf-card.muted { opacity: 0.5; }
    .org-leaf-card.muted:hover { opacity: 1; transition: opacity 0.15s; }
    .org-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .org-card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .org-name { font-weight: 700; font-size: 13px; }
    .me-badge {
      font-size: 9px; font-family: var(--font-mono); font-weight: 700;
      background: var(--accent); color: #111; border-radius: 3px; padding: 1px 5px;
      flex-shrink: 0;
    }
    .est-badge {
      font-size: 9px; font-family: var(--font-mono);
      background: var(--surface3); color: var(--text2);
      border-radius: 3px; padding: 1px 5px; border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .org-actions { margin-left: auto; display: flex; gap: 4px; flex-shrink: 0; }
    .org-role { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .org-dept { font-size: 10px; color: var(--text3); font-family: var(--font-mono); }
    .load-row { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
    .load-track { flex: 1; height: 5px; background: var(--surface3); border-radius: 3px; overflow: hidden; min-width: 0; }
    .load-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .load-fill.low { background: var(--accent-like); }
    .load-fill.mid { background: var(--accent-super); }
    .load-fill.high { background: var(--accent-nope); }
    .load-pct { font-size: 10px; font-family: var(--font-mono); color: var(--text2); min-width: 28px; text-align: right; flex-shrink: 0; }
    .load-tasks { font-size: 10px; color: var(--text3); flex-shrink: 0; }
    .skills-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
    .skill-pill {
      font-size: 9px; font-family: var(--font-mono); color: var(--text3);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 1px 6px;
    }
    .avail-note { font-size: 10px; color: var(--text3); margin-top: 3px; font-style: italic;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Load Matrix ── */
    .matrix-wrap { overflow-x: auto; }
    .matrix-table { border-collapse: collapse; font-size: 12px; }
    .matrix-table td, .matrix-table th { border: 1px solid var(--border); }
    .mx-proj-th {
      background: var(--surface2); padding: 8px 12px; font-size: 10px;
      font-family: var(--font-mono); color: var(--text3); text-transform: uppercase;
      font-weight: 600; text-align: left; white-space: nowrap;
    }
    .mx-member-th {
      background: var(--surface2); min-width: 44px; height: 90px;
      vertical-align: bottom; padding: 0 0 8px 0; text-align: center;
    }
    .mx-rot {
      writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);
      font-size: 10px; font-family: var(--font-mono); color: var(--text3); font-weight: 600;
      white-space: nowrap; display: inline-block;
    }
    .mx-rot.me { color: var(--accent); }
    .mx-proj-cell {
      padding: 7px 12px; font-size: 11px; white-space: nowrap;
      max-width: 220px; overflow: hidden; text-overflow: ellipsis;
    }
    .mx-cell {
      text-align: center; font-family: var(--font-mono); font-size: 11px;
      padding: 7px 8px; color: var(--text3);
    }
    .mx-cell.has { font-weight: 700; color: var(--text); }
    .mx-total {
      text-align: center; font-family: var(--font-mono); font-size: 11px;
      background: var(--surface2); font-weight: 700; padding: 7px 10px;
    }
    .mx-foot-cell {
      padding: 6px 8px; background: var(--surface2); vertical-align: middle;
    }
    .mx-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .mx-bar-mini { width: 30px; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
    .mx-bar-mini-fill { height: 100%; border-radius: 2px; }

    /* ── Overlap ── */
    .overlap-header {
      display: flex; gap: 12px; align-items: center; padding: 16px 20px 12px; flex-shrink: 0;
    }
    .overlap-header .select { flex: 1; }
    .overlap-vs { font-family: var(--font-mono); font-size: 13px; color: var(--text3); flex-shrink: 0; }
    .overlap-grid {
      flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
      padding: 0 20px 20px; min-height: 0; overflow: hidden;
    }
    .ov-col {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: 12px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; min-height: 0;
    }
    .ov-col::-webkit-scrollbar { width: 3px; }
    .ov-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .ov-center {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r);
      padding: 12px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; min-height: 0;
    }
    .ov-center::-webkit-scrollbar { width: 3px; }
    .ov-center::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .ov-col-label {
      font-size: 10px; font-family: var(--font-mono); text-transform: uppercase;
      letter-spacing: 0.07em; flex-shrink: 0; padding-bottom: 4px; border-bottom: 1px solid var(--border);
    }
    .ov-proj-name { font-size: 10px; font-family: var(--font-mono); color: var(--text3); margin: 6px 0 3px; }
    .ov-task {
      background: var(--surface2); border-radius: 4px; padding: 5px 8px;
      font-size: 11px; border-left: 2px solid var(--border);
    }
    .ov-shared-group {
      background: var(--accent-dim); border: 1px solid var(--accent-glow);
      border-radius: var(--r-sm); padding: 8px;
    }
    .ov-shared-proj { font-size: 10px; font-family: var(--font-mono); font-weight: 700; color: var(--accent); margin-bottom: 5px; }
    .ov-a-task, .ov-b-task { font-size: 10px; color: var(--text2); margin-bottom: 2px; display: flex; gap: 4px; }
    .ov-a-label { font-size: 9px; color: var(--border-blue); font-weight: 700; flex-shrink: 0; }
    .ov-b-label { font-size: 9px; color: var(--border-purple); font-weight: 700; flex-shrink: 0; }
    .ov-empty { font-size: 11px; color: var(--text3); text-align: center; padding: 20px 0; }

    /* ── Me View ── */
    .me-layout {
      flex: 1; display: grid; grid-template-columns: 300px 1fr; gap: 16px;
      padding: 20px; overflow: hidden; min-height: 0;
    }
    .me-left { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    .me-left::-webkit-scrollbar { width: 3px; }
    .me-left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .me-right { display: flex; flex-direction: column; overflow: hidden; gap: 8px; }
    .me-section-label {
      font-size: 10px; font-family: var(--font-mono); text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--text3); flex-shrink: 0;
    }
    .me-main-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--accent); border-radius: var(--r); padding: 12px;
    }
    .me-mgr-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--border-purple); border-radius: var(--r); padding: 10px 12px;
    }
    .me-peer-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--border-blue); border-radius: var(--r); padding: 8px 12px;
    }
    .me-card-name { font-weight: 700; font-size: 13px; }
    .me-card-role { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .task-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
    .task-list::-webkit-scrollbar { width: 3px; }
    .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .me-task {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 8px 12px; display: flex; flex-direction: column; gap: 3px;
    }
    .me-task-title { font-size: 12px; font-weight: 500; }
    .me-task-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .me-task-proj { font-size: 10px; font-family: var(--font-mono); color: var(--text3); }
    .me-task-status { font-size: 10px; padding: 1px 6px; border-radius: 3px; }
    .me-task-status.open { background: var(--accent-dim); color: var(--accent); }
    .me-task-status.prog { background: rgba(99,102,241,0.15); color: #818cf8; }
    .me-task-prio { font-size: 9px; font-family: var(--font-mono); }
    .me-task-prio.high { color: var(--accent-nope); }
    .me-task-prio.med { color: var(--accent-super); }
    .me-task-prio.low { color: var(--accent-like); }
    .me-task-due { font-size: 10px; color: var(--text3); }

    /* ── Empty state ── */
    .ph-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; padding: 60px 20px; text-align: center;
    }
    .ph-empty-icon { font-size: 36px; opacity: 0.3; }
    .ph-empty-title { font-size: 14px; font-weight: 700; color: var(--text2); }
    .ph-empty-desc { font-size: 12px; color: var(--text3); max-width: 300px; line-height: 1.5; }

    /* ── Modal ── */
    .ph-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none;
      align-items: center; justify-content: center; z-index: var(--z-modal);
    }
    .ph-overlay.open { display: flex; }
    .ph-modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: 20px; width: 460px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      display: flex; flex-direction: column; gap: 14px;
    }
    .ph-modal::-webkit-scrollbar { width: 4px; }
    .ph-modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .ph-modal-title { font-family: var(--font-display); font-size: 14px; font-weight: 800; }
    .ph-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .ph-form-group { display: flex; flex-direction: column; gap: 5px; }
    .ph-form-label { font-size: 11px; color: var(--text2); font-family: var(--font-mono); }
    .ph-cap-row { display: flex; align-items: center; gap: 10px; }
    .ph-cap-row input[type=range] { flex: 1; accent-color: var(--accent); }
    .ph-cap-val { font-size: 12px; font-family: var(--font-mono); min-width: 36px; }
    .ph-check-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .ph-modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>

  <div class="ph-header">
    <div class="ph-header-row">
      <div>
        <div class="ph-title">People Hub</div>
        <div class="ph-subtitle">Synced from Project Hub · <span id="ph-count">—</span></div>
      </div>
      <div class="ph-actions">
        <button class="btn btn-primary" onclick="openMemberModal(null)">+ Add Member</button>
      </div>
    </div>
    <div class="ph-tabs">
      <button class="ph-tab active" data-tab="org" onclick="switchTab('org')">Org Tree</button>
      <button class="ph-tab" data-tab="matrix" onclick="switchTab('matrix')">Load Matrix</button>
      <button class="ph-tab" data-tab="overlap" onclick="switchTab('overlap')">Overlap</button>
      <button class="ph-tab" data-tab="me" onclick="switchTab('me')">Me View</button>
    </div>
  </div>

  <div class="ph-content">
    <div id="tab-org" class="ph-panel active">
      <div id="org-content" style="display:flex;flex-direction:column;gap:8px;flex:1"></div>
    </div>

    <div id="tab-matrix" class="ph-panel">
      <div id="matrix-content" style="flex:1"></div>
    </div>

    <div id="tab-overlap" class="ph-panel">
      <div class="overlap-header">
        <select class="select" id="overlap-a" onchange="renderOverlap()">
          <option value="">— Member A —</option>
        </select>
        <span class="overlap-vs">vs</span>
        <select class="select" id="overlap-b" onchange="renderOverlap()">
          <option value="">— Member B —</option>
        </select>
      </div>
      <div class="overlap-grid" id="overlap-grid">
        <div style="grid-column:1/-1" class="ov-empty">Select two members to compare workloads</div>
      </div>
    </div>

    <div id="tab-me" class="ph-panel">
      <div id="me-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden"></div>
    </div>
  </div>

  <!-- Member modal -->
  <div class="ph-overlay" id="member-modal">
    <div class="ph-modal">
      <div class="ph-modal-title" id="modal-title">Add Member</div>
      <input type="hidden" id="m-id">
      <div class="ph-form-row">
        <div class="ph-form-group">
          <label class="ph-form-label">Name *</label>
          <input class="input" type="text" id="m-name" placeholder="Full name">
        </div>
        <div class="ph-form-group">
          <label class="ph-form-label">Role</label>
          <input class="input" type="text" id="m-role" placeholder="e.g. Section Head">
        </div>
      </div>
      <div class="ph-form-row">
        <div class="ph-form-group">
          <label class="ph-form-label">Department</label>
          <input class="input" type="text" id="m-dept" placeholder="e.g. Digital Strategy">
        </div>
        <div class="ph-form-group">
          <label class="ph-form-label">Reports To</label>
          <select class="select" id="m-reports"></select>
        </div>
      </div>
      <div class="ph-form-group">
        <label class="ph-form-label">
          Capacity % <span style="color:var(--text3)">(what share of their tasks you're tracking)</span>
        </label>
        <div class="ph-cap-row">
          <input type="range" id="m-capacity" min="10" max="100" step="10" value="100"
            oninput="document.getElementById('m-cap-disp').textContent=this.value+'%'">
          <span class="ph-cap-val" id="m-cap-disp">100%</span>
        </div>
      </div>
      <div class="ph-form-group">
        <label class="ph-form-label">Skills <span style="color:var(--text3)">(comma-separated)</span></label>
        <input class="input" type="text" id="m-skills" placeholder="e.g. excel, powerpoint, stakeholder mgmt">
      </div>
      <div class="ph-form-group">
        <label class="ph-form-label">Availability Note</label>
        <input class="input" type="text" id="m-avail" placeholder="e.g. Full time · Mon–Thu · On leave until July">
      </div>
      <div class="ph-form-row">
        <div class="ph-form-group">
          <label class="ph-form-label">Confidence</label>
          <select class="select" id="m-confidence">
            <option value="confirmed">Confirmed</option>
            <option value="estimated">Estimated (~)</option>
          </select>
        </div>
        <div class="ph-form-group">
          <label class="ph-form-label">&nbsp;</label>
          <label class="ph-check-row">
            <input type="checkbox" id="m-isme" style="accent-color:var(--accent)">
            This is me
          </label>
        </div>
      </div>
      <div class="ph-modal-footer">
        <button class="btn btn-ghost" onclick="closeMemberModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveMember()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'people-hub-v1';
    let _tab = 'org';

    // ── Data ─────────────────────────────────────────────────────────────────────

    function getData() { return HubStorage.get(STORAGE_KEY) || { members: [] }; }
    function saveData(d) { HubStorage.set(STORAGE_KEY, d); }
    function getMembers() { return getData().members || []; }

    function getPHData() { return HubStorage.get('project-hub-v1') || { members: [], projects: [] }; }

    function getTasksFor(memberId) {
      const ph = getPHData();
      const out = [];
      for (const proj of (ph.projects || [])) {
        for (const t of (proj.tasks || [])) {
          if (t.assigneeId === memberId) {
            out.push({ ...t, projectName: proj.name, projectId: proj.id });
          }
        }
      }
      return out;
    }

    function getOpenTasksFor(memberId) {
      return getTasksFor(memberId).filter(t => !t.done && t.status !== 'done');
    }

    function calcLoad(member) {
      const open = getOpenTasksFor(member.id).length;
      const cap = member.capacity || 100;
      return Math.min(100, Math.round(open / Math.max(1, cap / 10) * 100));
    }

    function loadCls(pct) {
      return pct >= 90 ? 'high' : pct >= 65 ? 'mid' : 'low';
    }

    function loadColor(pct) {
      return pct >= 90 ? 'var(--accent-nope)' : pct >= 65 ? 'var(--accent-super)' : 'var(--accent-like)';
    }

    function esc(s) {
      return typeof HubUtils !== 'undefined' && HubUtils.esc
        ? HubUtils.esc(s)
        : String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Hierarchy ────────────────────────────────────────────────────────────────

    function buildTree(members, parentId, depth) {
      if (parentId === undefined) parentId = null;
      if (depth === undefined) depth = 0;
      return members
        .filter(m => (m.reportsTo || null) === (parentId || null))
        .map(m => ({ ...m, depth, children: buildTree(members, m.id, depth + 1) }));
    }

    function flattenTree(nodes) {
      const out = [];
      for (const n of nodes) { out.push(n); out.push(...flattenTree(n.children)); }
      return out;
    }

    function orderedMembers(members) {
      const flat = flattenTree(buildTree(members));
      const inTree = new Set(flat.map(m => m.id));
      const dangling = members.filter(m => !inTree.has(m.id)).map(m => ({ ...m, depth: 0, children: [] }));
      return [...flat, ...dangling];
    }

    function depthColor(d) {
      const colors = ['var(--border-purple)', 'var(--border-blue)', 'var(--accent)', 'var(--text2)'];
      return colors[Math.min(d, 3)];
    }

    // ── Tab switching ─────────────────────────────────────────────────────────────

    function switchTab(tab) {
      _tab = tab;
      document.querySelectorAll('.ph-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.ph-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
      renderTab(tab);
    }

    function renderAll() { renderTab(_tab); }

    function renderTab(tab) {
      if (tab === 'org') renderOrgTree();
      else if (tab === 'matrix') renderLoadMatrix();
      else if (tab === 'overlap') { populateOverlapSelects(); renderOverlap(); }
      else if (tab === 'me') renderMeView();
    }

    // ── Org Tree ─────────────────────────────────────────────────────────────────

    function updateMemberCount(n) {
      const el = document.getElementById('ph-count');
      if (el) el.textContent = n + ' member' + (n !== 1 ? 's' : '');
    }

    function renderOrgTree() {
      const members = getMembers();
      const el = document.getElementById('org-content');
      updateMemberCount(members.length);

      if (!members.length) {
        el.innerHTML = `<div class="ph-empty">
          <div class="ph-empty-icon">👥</div>
          <div class="ph-empty-title">No members yet</div>
          <div class="ph-empty-desc">Members sync automatically from Project Hub. Add one there or use + Add Member here.</div>
        </div>`;
        return;
      }

      const tree = buildTree(members);
      const inTree = new Set(flattenTree(tree).map(m => m.id));
      const dangling = members.filter(m => !inTree.has(m.id)).map(m => ({ ...m, depth: 0, children: [] }));

      function renderGroup(nodes) {
        let h = '';
        const leaves = nodes.filter(n => n.children.length === 0);
        const branches = nodes.filter(n => n.children.length > 0);
        if (leaves.length) {
          h += `<div class="org-grid">${leaves.map(renderLeafCard).join('')}</div>`;
        }
        for (const branch of branches) {
          h += renderSectionCard(branch);
          h += renderGroup(branch.children);
        }
        return h;
      }

      let html = '';
      for (const root of tree) {
        html += renderSectionCard(root);
        html += renderGroup(root.children);
      }
      if (dangling.length) {
        html += `<div class="org-grid">${dangling.map(renderLeafCard).join('')}</div>`;
      }
      el.innerHTML = html;
    }

    function renderSectionCard(m) {
      const load = calcLoad(m);
      const open = getOpenTasksFor(m.id).length;
      const indent = (m.depth || 0) * 20;
      const dept = m.department ? `<span class="org-dept"> · ${esc(m.department)}</span>` : '';

      return `<div class="org-section-card" style="margin-left:${indent}px;--_d:${depthColor(m.depth||0)}">
        <div class="org-card-top">
          ${m.isMe ? `<span class="me-badge">ME</span>` : ''}
          <span class="org-name">${esc(m.name)}</span>
          ${m.confidence === 'estimated' ? `<span class="est-badge">~</span>` : ''}
          <div class="org-actions">
            <button class="btn btn-ghost" style="font-size:10px;padding:2px 8px" onclick="openMemberModal('${m.id}')">edit</button>
            <button class="btn btn-ghost" style="font-size:10px;padding:2px 8px;color:var(--accent-nope)" onclick="deleteMember('${m.id}')">✕</button>
          </div>
        </div>
        <div class="org-role">${esc(m.role || '')}${dept}</div>
        ${open > 0 ? `<div class="load-row">
          <div class="load-track"><div class="load-fill ${loadCls(load)}" style="width:${load}%"></div></div>
          <span class="load-pct">${load}%</span>
          <span class="load-tasks">${open} tasks</span>
        </div>` : ''}
      </div>`;
    }

    function renderLeafCard(m) {
      const load = calcLoad(m);
      const open = getOpenTasksFor(m.id).length;
      const muted = open === 0;
      const skillsHtml = (m.skills || []).slice(0, 3).map(s => `<span class="skill-pill">${esc(s)}</span>`).join('');

      return `<div class="org-leaf-card${muted ? ' muted' : ''}" style="--_d:${depthColor(m.depth||0)}">
        <div class="org-card-top">
          ${m.isMe ? `<span class="me-badge">ME</span>` : ''}
          <span class="org-name" style="font-size:12px">${esc(m.name)}</span>
          ${m.confidence === 'estimated' ? `<span class="est-badge">~</span>` : ''}
          <div class="org-actions">
            <button class="btn btn-ghost" style="font-size:10px;padding:1px 6px" onclick="openMemberModal('${m.id}')">✎</button>
          </div>
        </div>
        <div class="org-role" style="font-size:10px">${esc(m.role || '')}</div>
        <div class="load-row">
          <div class="load-track"><div class="load-fill ${loadCls(load)}" style="width:${load}%"></div></div>
          <span class="load-pct">${load}%</span>
          <span class="load-tasks">${open}t</span>
        </div>
        ${skillsHtml ? `<div class="skills-row">${skillsHtml}</div>` : ''}
        ${m.availability ? `<div class="avail-note">⏱ ${esc(m.availability)}</div>` : ''}
      </div>`;
    }

    // ── Load Matrix ──────────────────────────────────────────────────────────────

    function renderLoadMatrix() {
      const members = getMembers();
      const el = document.getElementById('matrix-content');

      if (!members.length) {
        el.innerHTML = `<div class="ph-empty">
          <div class="ph-empty-icon">📊</div>
          <div class="ph-empty-title">No members yet</div>
          <div class="ph-empty-desc">Members sync from Project Hub automatically. Add a project with tasks to see the matrix.</div>
        </div>`;
        return;
      }

      const ph = getPHData();
      const projects = ph.projects || [];
      // Rows = projects; Columns = members (up to 10, hierarchically sorted)
      const sorted = orderedMembers(members).slice(0, 10);

      const memberHeaders = sorted.map(m => {
        const nameShort = m.name.length > 14 ? m.name.slice(0, 13) + '…' : m.name;
        const meMark = m.isMe ? '<span class="me-badge" style="font-size:7px;display:inline-block;margin-bottom:2px">ME</span><br>' : '';
        return `<th class="mx-member-th" title="${esc(m.name)}">
          <div class="mx-rot${m.isMe ? ' me' : ''}">${meMark}${esc(nameShort)}</div>
        </th>`;
      }).join('');

      const headerRow = `<tr><th class="mx-proj-th">Project</th>${memberHeaders}<th class="mx-proj-th" style="text-align:center">Total</th></tr>`;

      const dataRows = projects.map(proj => {
        const cells = sorted.map(m => {
          const n = (proj.tasks || []).filter(t => t.assigneeId === m.id && !t.done && t.status !== 'done').length;
          return `<td class="mx-cell${n > 0 ? ' has' : ''}">${n || '—'}</td>`;
        }).join('');
        const projTotal = sorted.reduce((s, m) =>
          s + (proj.tasks || []).filter(t => t.assigneeId === m.id && !t.done && t.status !== 'done').length, 0);
        const nameShort = proj.name.length > 32 ? proj.name.slice(0, 31) + '…' : proj.name;
        return `<tr><td class="mx-proj-cell" title="${esc(proj.name)}">${esc(nameShort)}</td>${cells}<td class="mx-total">${projTotal || '—'}</td></tr>`;
      }).join('');

      const footCells = sorted.map(m => {
        const total = getOpenTasksFor(m.id).length;
        const load = calcLoad(m);
        return `<td class="mx-foot-cell">
          <div class="mx-bar-wrap">
            <span style="font-size:10px;font-family:var(--font-mono);font-weight:700">${total}</span>
            <div class="mx-bar-mini"><div class="mx-bar-mini-fill" style="width:${load}%;background:${loadColor(load)}"></div></div>
            <span style="font-size:9px;font-family:var(--font-mono);color:var(--text3)">${load}%</span>
          </div>
        </td>`;
      }).join('');

      el.innerHTML = `<div class="matrix-wrap">
        <table class="matrix-table">
          <thead>${headerRow}</thead>
          <tbody>${dataRows || `<tr><td colspan="${sorted.length + 2}" style="padding:20px;text-align:center;color:var(--text3);font-size:12px">No projects yet</td></tr>`}</tbody>
          <tfoot><tr><td class="mx-proj-th">Open tasks / Load</td>${footCells}<td class="mx-foot-cell"></td></tr></tfoot>
        </table>
      </div>`;
    }

    // ── Overlap ──────────────────────────────────────────────────────────────────

    function populateOverlapSelects() {
      const members = getMembers();
      const opts = members.map(m => `<option value="${m.id}">${esc(m.name)}</option>`).join('');
      ['overlap-a', 'overlap-b'].forEach(id => {
        const sel = document.getElementById(id);
        const prev = sel.value;
        sel.innerHTML = `<option value="">— Select member —</option>${opts}`;
        if (prev && members.find(m => m.id === prev)) sel.value = prev;
      });
    }

    function renderOverlap() {
      const aId = document.getElementById('overlap-a').value;
      const bId = document.getElementById('overlap-b').value;
      const grid = document.getElementById('overlap-grid');

      if (!aId || !bId) {
        grid.innerHTML = `<div style="grid-column:1/-1" class="ov-empty">Select two members above to compare their workloads</div>`;
        return;
      }
      if (aId === bId) {
        grid.innerHTML = `<div style="grid-column:1/-1" class="ov-empty">Select two different members</div>`;
        return;
      }

      const members = getMembers();
      const mA = members.find(m => m.id === aId);
      const mB = members.find(m => m.id === bId);
      if (!mA || !mB) return;

      const ph = getPHData();
      const projects = ph.projects || [];
      const mapA = {}, mapB = {};

      for (const proj of projects) {
        const aTasks = (proj.tasks || []).filter(t => t.assigneeId === aId && !t.done && t.status !== 'done');
        const bTasks = (proj.tasks || []).filter(t => t.assigneeId === bId && !t.done && t.status !== 'done');
        if (aTasks.length) mapA[proj.id] = { name: proj.name, tasks: aTasks };
        if (bTasks.length) mapB[proj.id] = { name: proj.name, tasks: bTasks };
      }

      const allIds = new Set([...Object.keys(mapA), ...Object.keys(mapB)]);
      const shared = [...allIds].filter(id => mapA[id] && mapB[id]);
      const onlyA = [...allIds].filter(id => mapA[id] && !mapB[id]);
      const onlyB = [...allIds].filter(id => !mapA[id] && mapB[id]);

      function colHtml(map, ids, taskBorderColor) {
        if (!ids.length) return `<div class="ov-empty">No unique projects</div>`;
        return ids.map(id => {
          const { name, tasks } = map[id];
          return `<div>
            <div class="ov-proj-name">${esc(name)}</div>
            ${tasks.map(t => `<div class="ov-task" style="border-left-color:${taskBorderColor}">${esc(t.title)}</div>`).join('')}
          </div>`;
        }).join('');
      }

      const centerHtml = shared.length
        ? shared.map(id => `<div class="ov-shared-group">
            <div class="ov-shared-proj">${esc(mapA[id].name)}</div>
            ${mapA[id].tasks.map(t => `<div class="ov-a-task"><span class="ov-a-label">A</span>${esc(t.title)}</div>`).join('')}
            ${mapB[id].tasks.map(t => `<div class="ov-b-task"><span class="ov-b-label">B</span>${esc(t.title)}</div>`).join('')}
          </div>`).join('')
        : `<div class="ov-empty">No shared projects</div>`;

      grid.innerHTML = `
        <div class="ov-col">
          <div class="ov-col-label" style="color:var(--border-blue)">Only ${esc(mA.name)}</div>
          ${colHtml(mapA, onlyA, 'var(--border-blue)')}
        </div>
        <div class="ov-center">
          <div class="ov-col-label" style="color:var(--accent)">Shared projects</div>
          ${centerHtml}
        </div>
        <div class="ov-col">
          <div class="ov-col-label" style="color:var(--border-purple)">Only ${esc(mB.name)}</div>
          ${colHtml(mapB, onlyB, 'var(--border-purple)')}
        </div>`;
    }

    // ── Me View ──────────────────────────────────────────────────────────────────

    function renderMeView() {
      const members = getMembers();
      const el = document.getElementById('me-content');
      const me = members.find(m => m.isMe);

      if (!me) {
        el.innerHTML = `<div class="ph-empty">
          <div class="ph-empty-icon">🧑</div>
          <div class="ph-empty-title">No "Me" member set</div>
          <div class="ph-empty-desc">Edit a member and check "This is me" to enable the Me View centered on your perspective.</div>
          <button class="btn btn-primary" onclick="openMemberModal(null)" style="margin-top:6px">+ Add Myself</button>
        </div>`;
        return;
      }

      const manager = me.reportsTo ? members.find(m => m.id === me.reportsTo) : null;
      const peers = me.reportsTo ? members.filter(m => m.id !== me.id && m.reportsTo === me.reportsTo) : [];
      const myLoad = calcLoad(me);
      const myOpen = getOpenTasksFor(me.id);

      const managerHtml = manager ? `
        <div class="me-section-label">Manager</div>
        <div class="me-mgr-card">
          <div class="me-card-name">${esc(manager.name)}</div>
          <div class="me-card-role">${esc(manager.role || '')}${manager.department ? ` · ${esc(manager.department)}` : ''}</div>
        </div>` : '';

      const peersHtml = peers.length ? `
        <div class="me-section-label">Teammates</div>
        ${peers.map(p => {
          const pLoad = calcLoad(p);
          const pOpen = getOpenTasksFor(p.id).length;
          return `<div class="me-peer-card" style="border-left-color:${loadColor(pLoad)}">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:1px">
              <span class="me-card-name" style="font-size:12px">${esc(p.name)}</span>
              ${p.confidence === 'estimated' ? '<span class="est-badge">~</span>' : ''}
            </div>
            <div class="me-card-role">${esc(p.role || '')}</div>
            <div class="load-row" style="margin-top:5px">
              <div class="load-track"><div class="load-fill ${loadCls(pLoad)}" style="width:${pLoad}%"></div></div>
              <span class="load-pct">${pLoad}%</span>
              <span class="load-tasks">${pOpen} tasks</span>
            </div>
          </div>`;
        }).join('')}` : '';

      const tasksHtml = myOpen.length
        ? myOpen.map(t => {
            const st = t.status === 'in-progress' ? 'prog' : 'open';
            const stLabel = t.status === 'in-progress' ? 'In Progress' : 'Open';
            const prioHtml = t.priority ? `<span class="me-task-prio ${t.priority}">${t.priority.toUpperCase()}</span>` : '';
            const dueHtml = t.due ? `<span class="me-task-due">Due ${esc(t.due)}</span>` : '';
            return `<div class="me-task">
              <div class="me-task-title">${esc(t.title)}</div>
              <div class="me-task-meta">
                <span class="me-task-proj">${esc(t.projectName || '')}</span>
                <span class="me-task-status ${st}">${stLabel}</span>
                ${prioHtml}${dueHtml}
              </div>
            </div>`;
          }).join('')
        : `<div style="text-align:center;padding:30px 0;color:var(--text3);font-size:12px">No open tasks — you're all clear!</div>`;

      el.innerHTML = `<div class="me-layout">
        <div class="me-left">
          <div class="me-section-label">You</div>
          <div class="me-main-card">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
              <span class="me-badge">ME</span>
              <span class="me-card-name">${esc(me.name)}</span>
              ${me.confidence === 'estimated' ? '<span class="est-badge">~</span>' : ''}
            </div>
            <div class="me-card-role">${esc(me.role || '')}${me.department ? ` · ${esc(me.department)}` : ''}</div>
            <div class="load-row" style="margin-top:8px">
              <div class="load-track"><div class="load-fill ${loadCls(myLoad)}" style="width:${myLoad}%"></div></div>
              <span class="load-pct">${myLoad}%</span>
              <span class="load-tasks">${myOpen.length} open tasks</span>
            </div>
            ${me.availability ? `<div class="avail-note">⏱ ${esc(me.availability)}</div>` : ''}
          </div>
          ${managerHtml}
          ${peersHtml}
        </div>
        <div class="me-right">
          <div class="me-section-label">My Open Tasks (${myOpen.length})</div>
          <div class="task-list">${tasksHtml}</div>
        </div>
      </div>`;
    }

    // ── Member modal ─────────────────────────────────────────────────────────────

    function openMemberModal(id) {
      const members = getMembers();
      const m = id ? members.find(x => x.id === id) : null;

      document.getElementById('modal-title').textContent = m ? 'Edit Member' : 'Add Member';
      document.getElementById('m-id').value = m ? m.id : '';
      document.getElementById('m-name').value = m ? m.name : '';
      document.getElementById('m-role').value = m ? (m.role || '') : '';
      document.getElementById('m-dept').value = m ? (m.department || '') : '';
      document.getElementById('m-skills').value = m ? (m.skills || []).join(', ') : '';
      document.getElementById('m-avail').value = m ? (m.availability || '') : '';
      document.getElementById('m-isme').checked = m ? !!m.isMe : false;
      document.getElementById('m-confidence').value = m ? (m.confidence || 'confirmed') : 'confirmed';

      const cap = m ? (m.capacity || 100) : 100;
      document.getElementById('m-capacity').value = cap;
      document.getElementById('m-cap-disp').textContent = cap + '%';

      const rSel = document.getElementById('m-reports');
      const others = members.filter(x => x.id !== (m ? m.id : null));
      rSel.innerHTML = `<option value="">— None (top level) —</option>` +
        others.map(x => `<option value="${x.id}"${m && m.reportsTo === x.id ? ' selected' : ''}>${esc(x.name)}</option>`).join('');

      document.getElementById('member-modal').classList.add('open');
      requestAnimationFrame(() => document.getElementById('m-name').focus());
    }

    function closeMemberModal() {
      document.getElementById('member-modal').classList.remove('open');
    }

    function saveMember() {
      const name = document.getElementById('m-name').value.trim();
      if (!name) { showToast('Name is required'); return; }

      const id = document.getElementById('m-id').value || ('ph-' + Date.now());
      const isMe = document.getElementById('m-isme').checked;
      const data = getData();

      const member = {
        id,
        name,
        role: document.getElementById('m-role').value.trim(),
        department: document.getElementById('m-dept').value.trim(),
        reportsTo: document.getElementById('m-reports').value || null,
        capacity: parseInt(document.getElementById('m-capacity').value) || 100,
        skills: document.getElementById('m-skills').value.split(',').map(s => s.trim()).filter(Boolean),
        availability: document.getElementById('m-avail').value.trim(),
        isMe,
        confidence: document.getElementById('m-confidence').value || 'confirmed',
      };

      if (isMe) data.members.forEach(m => { if (m.id !== id) m.isMe = false; });

      const idx = data.members.findIndex(m => m.id === id);
      if (idx >= 0) data.members[idx] = member;
      else data.members.push(member);

      saveData(data);
      closeMemberModal();
      showToast(idx >= 0 ? 'Member updated' : 'Member added');
      renderAll();
    }

    function deleteMember(id) {
      if (!confirm('Remove this member from People Hub?')) return;
      const data = getData();
      // Clear dangling reportsTo refs
      data.members.forEach(m => { if (m.reportsTo === id) m.reportsTo = null; });
      data.members = data.members.filter(m => m.id !== id);
      saveData(data);
      renderAll();
      showToast('Member removed');
    }

    // ── Auto-sync from Project Hub ────────────────────────────────────────────────

    function syncFromProjectHub() {
      const phMembers = getPHData().members || [];
      if (!phMembers.length) return;

      const data = getData();
      let changed = false;

      for (const phm of phMembers) {
        const existing = data.members.find(m => m.id === phm.id);
        if (existing) {
          if (existing.name !== phm.name ||
              existing.role !== (phm.role || '') ||
              existing.department !== (phm.department || '')) {
            existing.name = phm.name;
            if (phm.role) existing.role = phm.role;
            if (phm.department) existing.department = phm.department;
            if (!existing.reportsTo && phm.managerId) existing.reportsTo = phm.managerId;
            changed = true;
          }
        } else {
          data.members.push({
            id: phm.id,
            name: phm.name,
            role: phm.role || '',
            department: phm.department || '',
            reportsTo: phm.managerId || null,
            capacity: 100,
            skills: [],
            availability: '',
            isMe: false,
            confidence: 'confirmed',
          });
          changed = true;
        }
      }

      // Sync isMe from project-hub session selfMemberId
      try {
        const session = JSON.parse(localStorage.getItem('hub-session-v1') || '{}');
        const selfId = session.selfMemberId;
        if (selfId) {
          const me = data.members.find(m => m.id === selfId);
          if (me && !me.isMe) {
            data.members.forEach(m => { m.isMe = false; });
            me.isMe = true;
            changed = true;
          }
        }
      } catch {}

      if (changed) saveData(data);
    }

    // ── Keyboard & subscriptions ──────────────────────────────────────────────────

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeMemberModal();
    });

    HubStorage.subscribe(STORAGE_KEY, renderAll);
    HubStorage.subscribe('project-hub-v1', () => { syncFromProjectHub(); renderAll(); });

    // ── Init ─────────────────────────────────────────────────────────────────────
    HubData.onChange(renderAll);
    HubData.init('people-hub');
    syncFromProjectHub();
    renderOrgTree();
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      HubBootstrap.start('people-hub');
    });
  </script>
</body>
</html>
