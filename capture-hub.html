<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.anthropic.com; frame-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture Hub</title>
  <link rel="stylesheet" href="styles/fonts.css">
  <link rel="stylesheet" href="theme.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--surface);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top accent line ─────────────────────────────────────────────── */
    .cap-accent-bar {
      height: 3px;
      flex-shrink: 0;
      background: linear-gradient(to right, var(--accent), var(--accent2, var(--border-purple)));
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    .cap-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.85rem 1.5rem 0.7rem;
      border-bottom: 1px solid var(--border1);
      flex-shrink: 0;
    }
    .cap-title-block { flex-shrink: 0; }
    .cap-title {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 400;
      color: var(--text);
      font-optical-sizing: auto;
      line-height: 1.1;
    }
    .cap-subtitle {
      font-size: 0.72rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Category legend */
    .cat-legend {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      flex: 1;
    }
    .cl-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: var(--r-chip);
      background: var(--surface2);
      border: 1px solid var(--border1);
      font-size: 0.72rem;
      color: var(--text2);
      white-space: nowrap;
      user-select: none;
    }
    .cl-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Two-column body ─────────────────────────────────────────────── */
    .cap-body {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(260px, 1fr);
      flex: 1;
      overflow: hidden;
    }

    /* ── Dump Column ─────────────────────────────────────────────────── */
    .col-dump {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border1);
    }

    .col-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1.25rem 0.5rem;
      flex-shrink: 0;
    }
    .col-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
    }
    .col-meta {
      font-size: 0.72rem;
      color: var(--text3);
      font-family: var(--font-mono);
    }

    /* ── Write Phase ─────────────────────────────────────────────────── */
    .dump-phase {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      padding: 0 1.25rem 0.9rem;
      gap: 0.75rem;
    }
    .dump-phase.hidden { display: none; }

    /* Writing area: dot-grid background + gutter */
    .dump-area-wrap {
      position: relative;
      flex: 1;
      display: flex;
      overflow: hidden;
      border-radius: var(--r-sm);
      /* Dot-grid paper — rows aligned to 28px line-height (1.75rem at 16px) */
      background-image: radial-gradient(circle, var(--border1) 1px, transparent 1px);
      background-size: 22px 28px;
      background-position: 1.6rem 14px; /* offset to center dots between lines */
    }

    /* Decorative ghost shape — large faint "∴" in corner */
    .dump-area-wrap::after {
      content: '∴';
      position: absolute;
      right: 1rem;
      bottom: 0.5rem;
      font-family: var(--font-display);
      font-size: 7rem;
      color: var(--text3);
      opacity: 0.045;
      pointer-events: none;
      line-height: 1;
      user-select: none;
    }

    .dump-gutter {
      position: absolute;
      left: 0;
      top: 14px; /* align with first dot row */
      width: 1.6rem;
      display: flex;
      flex-direction: column;
      pointer-events: none;
      z-index: 1;
    }
    .gutter-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin: calc((28px - 8px) / 2) auto; /* center in line-height */
      transition: background-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .gutter-dot.lit {
      box-shadow: 0 0 5px var(--_glow, transparent);
    }
    .gutter-dot.fresh { transform: scale(1.5); }

    #dump-area {
      flex: 1;
      background: transparent;
      border: none;
      resize: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 28px; /* matches grid row */
      padding: 14px 1rem 1rem 1.75rem;
      outline: none;
      overflow-y: auto;
      position: relative;
      z-index: 1;
    }
    #dump-area::placeholder {
      color: var(--text3);
      font-style: italic;
      opacity: 0.7;
    }

    /* Stats + footer */
    .dump-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .dump-stats {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
      min-height: 24px;
    }
    .ds-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: var(--r-chip);
      font-size: 0.7rem;
      font-family: var(--font-mono);
      background: var(--surface2);
      border: 1px solid var(--border1);
      white-space: nowrap;
    }
    .ds-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dump-empty-hint { font-size: 0.78rem; color: var(--text3); font-style: italic; }
    #btn-parse {
      white-space: nowrap;
      flex-shrink: 0;
    }
    #btn-parse:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

    /* ── Review Phase ────────────────────────────────────────────────── */
    .review-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .review-count {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.2;
    }
    .review-sub { font-size: 0.75rem; color: var(--text3); margin-top: 2px; }
    .parsed-cards {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      min-height: 0;
    }

    /* Parsed card */
    .pc-card {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.6rem 0.85rem;
      background: var(--surface2);
      border-radius: var(--r-sm);
      border-left: 3px solid var(--_bc, var(--border2));
      animation: pc-enter 0.2s ease backwards;
    }
    @keyframes pc-enter {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pc-card.sending { animation: pc-fly 0.3s ease forwards; }
    @keyframes pc-fly {
      to { opacity: 0; transform: translateX(24px) scale(0.96); }
    }
    .pc-text { flex: 1; font-size: 0.87rem; color: var(--text); line-height: 1.4; word-break: break-word; }
    .pc-chip-wrap { position: relative; flex-shrink: 0; }
    .pc-chip {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 9px; border-radius: var(--r-chip);
      font-size: 0.7rem; font-weight: 500;
      cursor: pointer; user-select: none;
      transition: opacity 0.15s; white-space: nowrap;
    }
    .pc-chip:hover { opacity: 0.75; }
    .pc-remove {
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: 1rem; line-height: 1;
      padding: 1px 3px; border-radius: 3px; flex-shrink: 0;
      transition: color 0.15s;
    }
    .pc-remove:hover { color: var(--accent-nope); }

    /* Cat dropdown */
    .pc-cat-menu {
      position: absolute; right: 0; top: calc(100% + 4px);
      background: var(--surface3); border: 1px solid var(--border1);
      border-radius: var(--r-sm); z-index: var(--z-popover);
      min-width: 155px; overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    }
    .pc-cat-opt {
      display: flex; align-items: center; gap: 7px;
      padding: 0.45rem 0.7rem; cursor: pointer;
      font-size: 0.8rem; color: var(--text);
      transition: background 0.1s;
    }
    .pc-cat-opt:hover { background: var(--surface2); }
    .pc-cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .pc-cat-dest { font-size: 0.68rem; color: var(--text3); margin-left: auto; }

    .review-footer {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 0.65rem; flex-shrink: 0;
      padding-top: 0.65rem; border-top: 1px solid var(--border1);
    }

    /* ── Inbox Column ────────────────────────────────────────────────── */
    .col-inbox {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface2);
      position: relative;
    }
    /* Subtle diagonal stripe pattern behind inbox column */
    .col-inbox::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 18px,
        var(--border1) 18px,
        var(--border1) 19px
      );
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
    .col-inbox > * { position: relative; z-index: 1; }

    /* Quick capture */
    .qc-area {
      padding: 0.6rem 1rem 0.5rem;
      flex-shrink: 0;
    }
    .qc-wrap {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--surface); border: 1px solid var(--border1);
      border-radius: var(--r); padding: 0.45rem 0.85rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .qc-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .qc-plus { font-size: 1rem; color: var(--text3); flex-shrink: 0; line-height: 1; }
    #qc-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: var(--font-body); font-size: 0.85rem;
    }
    #qc-input::placeholder { color: var(--text3); }
    .qc-enter-hint { font-size: 0.68rem; color: var(--text3); font-family: var(--font-mono); white-space: nowrap; }

    /* Inbox filter chips */
    .inbox-toolbar {
      display: flex; align-items: center; gap: 0.3rem;
      padding: 0 1rem 0.5rem; flex-wrap: wrap; flex-shrink: 0;
    }
    .if-chip {
      display: flex; align-items: center; gap: 4px;
      padding: 0.22rem 0.65rem; border-radius: var(--r-chip);
      border: 1px solid var(--border1); background: var(--surface);
      color: var(--text2); font-size: 0.73rem; font-family: var(--font-body);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .if-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }
    .if-chip:hover:not(.active) { color: var(--text); border-color: var(--border2); }
    .if-count { font-size: 0.65rem; font-family: var(--font-mono); opacity: 0.65; }

    /* Inbox list */
    .inbox-list {
      flex: 1; overflow-y: auto;
      padding: 0 0.85rem 1rem;
      display: flex; flex-direction: column; gap: 0.3rem;
    }

    /* Inbox card */
    .ic-card {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.6rem 0.75rem;
      background: var(--surface); border-radius: var(--r-sm);
      border-left: 3px solid var(--_bc, var(--border2));
      transition: background 0.15s;
      position: relative;
    }
    .ic-card:hover { background: var(--surface3); }
    .ic-content { flex: 1; min-width: 0; }
    .ic-text { font-size: 0.85rem; color: var(--text); word-break: break-word; line-height: 1.4; }
    .ic-meta-row { display: flex; align-items: center; gap: 0.4rem; margin-top: 3px; }
    .ic-cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .ic-cat-label { font-size: 0.68rem; color: var(--text3); }
    .ic-time { font-size: 0.68rem; color: var(--text3); font-family: var(--font-mono); }
    .ic-actions {
      display: flex; align-items: center; gap: 0.25rem;
      flex-shrink: 0; opacity: 0; transition: opacity 0.15s;
    }
    .ic-card:hover .ic-actions { opacity: 1; }
    .ic-route-btn {
      padding: 0.22rem 0.55rem;
      background: var(--surface2); border: 1px solid var(--border1);
      border-radius: var(--r-sm); color: var(--text2);
      font-size: 0.72rem; font-family: var(--font-body);
      cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .ic-route-btn:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }
    .ic-del-btn {
      padding: 0.22rem 0.4rem; background: none; border: none;
      color: var(--text3); font-size: 0.85rem; cursor: pointer;
      border-radius: var(--r-sm); transition: color 0.15s; line-height: 1;
    }
    .ic-del-btn:hover { color: var(--accent-nope); }

    /* ── Empty states ────────────────────────────────────────────────── */
    .cap-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.85rem; color: var(--text3); text-align: center;
      padding: 2rem 1.5rem;
    }
    .cap-empty h3 { font-size: 0.92rem; font-weight: 500; color: var(--text2); }
    .cap-empty p { font-size: 0.8rem; max-width: 200px; line-height: 1.6; }

    /* Inbox-zero SVG */
    .cap-empty svg { opacity: 0.2; }

    /* Badge pulse */
    .inbox-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 17px; height: 17px; background: var(--accent);
      color: var(--surface); font-size: 0.65rem; font-weight: 700;
      border-radius: 9px; padding: 0 4px; line-height: 1;
    }
    .inbox-badge:empty { display: none; }
    @keyframes badge-pulse { 0%{transform:scale(1)} 40%{transform:scale(1.4)} 100%{transform:scale(1)} }
    .badge-pulse { animation: badge-pulse 0.35s ease; }

    /* Scrollbars */
    .parsed-cards::-webkit-scrollbar,
    .inbox-list::-webkit-scrollbar,
    #dump-area::-webkit-scrollbar { width: 4px; }
    .parsed-cards::-webkit-scrollbar-thumb,
    .inbox-list::-webkit-scrollbar-thumb,
    #dump-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>

<!-- Gradient accent bar -->
<div class="cap-accent-bar"></div>

<!-- Header: title + category legend -->
<header class="cap-header">
  <div class="cap-title-block">
    <div class="cap-title">Capture</div>
    <div class="cap-subtitle">one thought per line</div>
  </div>
  <div class="cat-legend" id="cat-legend"></div>
</header>

<!-- Two-column body -->
<div class="cap-body">

  <!-- Left: Brain Dump -->
  <div class="col-dump">
    <div class="col-head">
      <span class="col-label">Brain Dump</span>
      <span class="col-meta" id="dump-line-count"></span>
    </div>

    <!-- Write phase -->
    <div class="dump-phase" id="phase-write">
      <div class="dump-area-wrap">
        <div class="dump-gutter" id="dump-gutter"></div>
        <textarea id="dump-area" spellcheck="true"
          placeholder="Fix the login bug&#10;Why is the API so slow?&#10;What if we cached the results?&#10;Risk: vendor contract expires in June&#10;Decided to drop the old auth library&#10;Read 'Thinking Fast and Slow'"></textarea>
      </div>
      <div class="dump-footer">
        <div class="dump-stats" id="dump-stats">
          <span class="dump-empty-hint">Start typing ↑  one thought per line</span>
        </div>
        <button class="btn btn-primary" id="btn-parse" onclick="parseDump()" disabled>
          Parse &amp; Route →
        </button>
      </div>
    </div>

    <!-- Review phase -->
    <div class="dump-phase hidden" id="phase-review">
      <div class="review-header">
        <div>
          <div class="review-count" id="review-count"></div>
          <div class="review-sub">Review categories, then send to your tools</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="backToWrite()">← Edit</button>
      </div>
      <div class="parsed-cards" id="parsed-cards"></div>
      <div class="review-footer">
        <button class="btn btn-ghost" onclick="sendAllToInbox()">→ All to Inbox</button>
        <button class="btn btn-primary" onclick="sendAll()">Send All</button>
      </div>
    </div>
  </div>

  <!-- Right: Inbox -->
  <div class="col-inbox">
    <div class="col-head">
      <span class="col-label">Inbox</span>
      <span class="inbox-badge" id="inbox-badge"></span>
    </div>

    <div class="qc-area">
      <div class="qc-wrap">
        <span class="qc-plus">+</span>
        <input id="qc-input" type="text"
          placeholder="Quick capture — press Enter"
          autocomplete="off" spellcheck="false">
        <span class="qc-enter-hint">↵</span>
      </div>
    </div>

    <div class="inbox-toolbar" id="inbox-toolbar"></div>
    <div class="inbox-list" id="inbox-list"></div>
  </div>

</div>

<script src="hub-storage.js"></script>
<script src="hub-utils.js"></script>
<script src="hub-links.js"></script>
<script src="hub-toast.js"></script>
<script src="hub-bootstrap.js"></script>
<script>
HubBootstrap.start('capture-hub');

// ── Category definitions ──────────────────────────────────────────────────

const CATS = {
  task:     { label: 'Task',     icon: '✓', dot: 'var(--border-blue)',   chipBg: 'var(--node-blue)',   chipColor: 'var(--border-blue)',   dest: 'Project Hub',   routable: true  },
  question: { label: 'Question', icon: '?', dot: 'var(--border-purple)', chipBg: 'var(--node-purple)', chipColor: 'var(--border-purple)', dest: 'Decision Hub',  routable: true  },
  idea:     { label: 'Idea',     icon: '✦', dot: 'var(--border-yellow)', chipBg: 'var(--node-yellow)', chipColor: 'var(--border-yellow)', dest: 'Inbox',         routable: false },
  decision: { label: 'Decision', icon: '⚖', dot: 'var(--border-green)',  chipBg: 'var(--node-green)',  chipColor: 'var(--border-green)',  dest: 'Decision Hub',  routable: true  },
  risk:     { label: 'Risk',     icon: '⚠', dot: 'var(--border-red)',    chipBg: 'var(--node-red)',    chipColor: 'var(--border-red)',    dest: 'Risk Register', routable: true  },
  learning: { label: 'Learning', icon: '◎', dot: 'var(--accent)',        chipBg: 'var(--accent-dim)',  chipColor: 'var(--accent)',        dest: 'Learning Hub',  routable: true  },
  event:    { label: 'Event',    icon: '◷', dot: 'var(--accent-super)',  chipBg: 'var(--surface3)',    chipColor: 'var(--accent-super)',  dest: 'Inbox',         routable: false },
  note:     { label: 'Note',     icon: '·', dot: 'var(--border2)',       chipBg: 'var(--surface2)',    chipColor: 'var(--text3)',         dest: 'Inbox',         routable: false },
};

// ── Build category legend in header ──────────────────────────────────────

function buildLegend() {
  const el = document.getElementById('cat-legend');
  el.innerHTML = Object.entries(CATS).map(([, c]) => `
    <span class="cl-pill">
      <span class="cl-dot" style="background:${c.dot}"></span>
      ${c.label}
    </span>`).join('');
}
buildLegend();

// ── Classifier ───────────────────────────────────────────────────────────

function classify(line) {
  const t = line.trim();
  if (!t) return null;
  const l = t.toLowerCase();

  if (/^(decided|going with|choosing|we('ll| will) use|picked|settled on|agreed on)/i.test(t)) return 'decision';
  if (/ vs\.? /i.test(t) && t.length < 120) return 'decision';

  if (/^(risk:|concern:|watch out|danger:|caveat:)/i.test(t)) return 'risk';
  if (/\b(might fail|could break|at risk|risk of|worried about)\b/i.test(l)) return 'risk';

  if (t.endsWith('?')) return 'question';
  if (/^(how|why|what if|what'?s|should we|should i|is there|are we|can we|will|when should|where should|who should)/i.test(t)) return 'question';

  if (/\b(meeting with|call with|lunch with|sync with|standup|1:1|presentation|demo|workshop)\b/i.test(l)) return 'event';
  if (/\b(monday|tuesday|wednesday|thursday|friday|saturday|sunday|next week|tomorrow|at \d{1,2}(:\d{2})?\s*(am|pm))\b/i.test(l)) return 'event';

  if (/^(read|book:|article:|course:|watch|study|learn|listen to|podcast:)/i.test(t)) return 'learning';

  if (/^(what if|maybe|idea:|imagine|could we|wouldn't it be|what about|i wonder|how about)/i.test(l)) return 'idea';

  if (/^[-*•]\s/.test(t) || /^\[[ x]\]/i.test(t)) return 'task';
  if (/^(fix|write|review|send|call|check|update|create|build|make|add|remove|talk to|schedule|email|finish|complete|deploy|test|refactor|clean|organize|prepare|submit|follow.?up|ping|contact|buy|order|research|investigate|draft|design|implement|set up|configure|document|plan|move|delete|archive|migrate|rename|push|pull|merge|release|announce|ask|tell|remind|book|cancel|confirm|approve|reject|invite|record|publish|upload|download|export|import|convert|process|handle|manage|run|start|stop|enable|disable|verify|validate|debug|optimize|monitor|track|measure|report|audit|assess|evaluate|compare|analyze|summarize|present|share|discuss|explain|show|help|resolve)\b/i.test(t)) return 'task';
  if (/\b(need to|have to|must|todo:|TODO)\b/.test(t) && !t.endsWith('?')) return 'task';

  return 'note';
}

// ── Gutter & live stats ───────────────────────────────────────────────────

const dumpArea   = document.getElementById('dump-area');
const dumpGutter = document.getElementById('dump-gutter');
const dumpStats  = document.getElementById('dump-stats');
const dumpCount  = document.getElementById('dump-line-count');
const btnParse   = document.getElementById('btn-parse');

let _prevSig = '';

function updateGutter() {
  const lines = dumpArea.value.split('\n');
  const cats  = lines.map(l => l.trim() ? classify(l) : null);
  const sig   = cats.join(',');
  if (sig === _prevSig) return;

  const wasLonger = cats.length > _prevSig.split(',').length;
  _prevSig = sig;

  dumpGutter.innerHTML = '';
  cats.forEach((cat, i) => {
    const dot = document.createElement('div');
    const isNew = wasLonger && i === cats.length - 1;
    dot.className = 'gutter-dot' + (isNew ? ' fresh' : '');
    if (cat) {
      const c = CATS[cat];
      dot.style.background = c.dot;
      dot.style.setProperty('--_glow', c.dot);
      dot.classList.add('lit');
    } else {
      dot.style.background = 'transparent';
    }
    dumpGutter.appendChild(dot);
    if (isNew) setTimeout(() => dot.classList.remove('fresh'), 200);
  });

  const valid = cats.filter(Boolean);
  const n     = valid.length;
  dumpCount.textContent = n ? n + ' line' + (n !== 1 ? 's' : '') : '';
  btnParse.disabled = !n;
  updateStats(valid);
}

function updateStats(validCats) {
  if (!validCats.length) {
    dumpStats.innerHTML = '<span class="dump-empty-hint">Start typing ↑  one thought per line</span>';
    return;
  }
  const counts = {};
  validCats.forEach(c => { counts[c] = (counts[c] || 0) + 1; });
  dumpStats.innerHTML = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .map(([cat, n]) => {
      const c = CATS[cat];
      return `<span class="ds-pill">
        <span class="ds-dot" style="background:${c.dot}"></span>
        ${n} ${c.label}${n > 1 ? 's' : ''}
      </span>`;
    }).join('');
}

dumpArea.addEventListener('input', updateGutter);

// ── Parse flow ────────────────────────────────────────────────────────────

let _parsedCards = [];
let _openMenu    = null;

function parseDump() {
  const lines = dumpArea.value.split('\n').filter(l => l.trim());
  if (!lines.length) return;
  _parsedCards = lines.map((text, i) => ({
    id: 'pc-' + Date.now() + '-' + i,
    text: text.trim(),
    cat: classify(text) || 'note',
  }));
  document.getElementById('phase-write').classList.add('hidden');
  document.getElementById('phase-review').classList.remove('hidden');
  renderReview();
}

function backToWrite() {
  document.getElementById('phase-review').classList.add('hidden');
  document.getElementById('phase-write').classList.remove('hidden');
}

function renderReview() {
  const n = _parsedCards.length;
  document.getElementById('review-count').textContent =
    n + ' item' + (n !== 1 ? 's' : '') + ' parsed';
  const container = document.getElementById('parsed-cards');
  container.innerHTML = '';
  _parsedCards.forEach((card, idx) => container.appendChild(buildParsedCard(card, idx)));
}

function buildParsedCard(card, idx) {
  const cat = CATS[card.cat];
  const el  = document.createElement('div');
  el.className = 'pc-card';
  el.id = 'pc-' + card.id;
  el.style.cssText = `--_bc:${cat.dot}; animation-delay:${idx * 35}ms`;
  el.innerHTML = `
    <span class="pc-text">${HubUtils.esc(card.text)}</span>
    <div class="pc-chip-wrap">
      <button class="pc-chip"
        style="background:${cat.chipBg};color:${cat.chipColor};border:1px solid ${cat.dot}"
        onclick="toggleCatMenu('${card.id}',this)">
        ${cat.icon} ${cat.label} ▾
      </button>
    </div>
    <button class="pc-remove" title="Remove" onclick="removeCard('${card.id}')">×</button>`;
  return el;
}

function toggleCatMenu(cardId, chipEl) {
  if (_openMenu) { _openMenu.remove(); _openMenu = null; }
  const card = _parsedCards.find(c => c.id === cardId);
  if (!card) return;
  const menu = document.createElement('div');
  menu.className = 'pc-cat-menu';
  menu.innerHTML = Object.entries(CATS).map(([key, c]) => `
    <div class="pc-cat-opt" onclick="setCardCat('${cardId}','${key}',this.closest('.pc-cat-menu'))">
      <span class="pc-cat-dot" style="background:${c.dot}"></span>
      ${c.icon} ${c.label}
      <span class="pc-cat-dest">${c.dest}</span>
    </div>`).join('');
  chipEl.closest('.pc-chip-wrap').appendChild(menu);
  _openMenu = menu;
  setTimeout(() => {
    document.addEventListener('click', function closer(e) {
      if (!menu.contains(e.target)) { menu.remove(); _openMenu = null; document.removeEventListener('click', closer); }
    });
  }, 0);
}

function setCardCat(cardId, newCat, menu) {
  if (menu) menu.remove();
  _openMenu = null;
  const card = _parsedCards.find(c => c.id === cardId);
  if (!card) return;
  card.cat = newCat;
  const el    = document.getElementById('pc-' + cardId);
  if (el) {
    const fresh = buildParsedCard(card, 0);
    fresh.style.animationDuration = '0s';
    el.replaceWith(fresh);
  }
}

function removeCard(cardId) {
  _parsedCards = _parsedCards.filter(c => c.id !== cardId);
  document.getElementById('pc-' + cardId)?.remove();
  if (!_parsedCards.length) backToWrite();
  else document.getElementById('review-count').textContent =
    _parsedCards.length + ' item' + (_parsedCards.length !== 1 ? 's' : '') + ' parsed';
}

// ── Routing ───────────────────────────────────────────────────────────────

function routeCard(card) {
  const ts = new Date().toISOString();
  if (card.cat === 'task')     return routeTask(card.text, ts);
  if (card.cat === 'question') return routeQuestion(card.text, ts);
  if (card.cat === 'decision') return routeDecision(card.text, ts);
  if (card.cat === 'risk')     return routeRisk(card.text, ts);
  if (card.cat === 'learning') return routeLearning(card.text, ts);
  return addToInbox(card.text, card.cat, ts) && 'Inbox';
}

function routeTask(text, ts) {
  try {
    const raw = HubStorage.get('project-hub-v1') || { projects: [], members: [] };
    if (!Array.isArray(raw.projects)) raw.projects = [];
    let proj = raw.projects.find(p => p._captureInbox);
    if (!proj) {
      proj = { id: 'proj-capture-' + Date.now(), name: '📥 Capture', status: 'active', color: 'blue', tasks: [], members: [], createdAt: ts, _captureInbox: true };
      raw.projects.push(proj);
    }
    proj.tasks.push({ id: 'task-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6), title: text, status: 'open', priority: 'med', createdAt: ts });
    HubStorage.set('project-hub-v1', raw);
    return 'Project Hub';
  } catch { addToInbox(text, 'task', ts); return 'Inbox'; }
}

function routeQuestion(text, ts) {
  try {
    const raw = HubStorage.get('decision-hub-v1');
    const arr = Array.isArray(raw) ? raw : [];
    arr.push({ id: 'dh-' + Date.now(), title: text, summary: '', status: 'pending', type: 'question', tags: [], createdAt: ts });
    HubStorage.set('decision-hub-v1', arr);
    return 'Decision Hub';
  } catch { addToInbox(text, 'question', ts); return 'Inbox'; }
}

function routeDecision(text, ts) {
  try {
    const raw = HubStorage.get('decision-hub-v1');
    const arr = Array.isArray(raw) ? raw : [];
    arr.push({ id: 'dh-' + Date.now(), title: text, summary: '', status: 'pending', type: 'general', tags: [], createdAt: ts });
    HubStorage.set('decision-hub-v1', arr);
    return 'Decision Hub';
  } catch { addToInbox(text, 'decision', ts); return 'Inbox'; }
}

function routeRisk(text, ts) {
  try {
    const raw = HubStorage.get('risk-hub-v1') || { risks: [] };
    if (!Array.isArray(raw.risks)) raw.risks = [];
    raw.risks.push({ id: 'risk-' + Date.now(), title: text, description: '', probability: 'medium', impact: 'medium', status: 'identified', createdAt: ts });
    HubStorage.set('risk-hub-v1', raw);
    return 'Risk Register';
  } catch { addToInbox(text, 'risk', ts); return 'Inbox'; }
}

function routeLearning(text, ts) {
  try {
    const raw = HubStorage.get('learning-hub-v1') || { items: [] };
    if (!Array.isArray(raw.items)) raw.items = [];
    raw.items.push({ id: 'lh-' + Date.now(), title: text, type: 'article', status: 'want', createdAt: ts });
    HubStorage.set('learning-hub-v1', raw);
    return 'Learning Hub';
  } catch { addToInbox(text, 'learning', ts); return 'Inbox'; }
}

function addToInbox(text, cat, ts) {
  const raw = HubStorage.get('capture-hub-v1') || { inbox: [] };
  if (!Array.isArray(raw.inbox)) raw.inbox = [];
  raw.inbox.unshift({ id: 'cap-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6), text, cat, capturedAt: ts });
  HubStorage.set('capture-hub-v1', raw);
  return true;
}

// ── Send All ──────────────────────────────────────────────────────────────

function sendAll() {
  if (!_parsedCards.length) return;
  const summary = {};
  const cards   = [..._parsedCards];
  cards.forEach((card, i) => {
    const el = document.getElementById('pc-' + card.id);
    if (el) { el.style.animationDelay = (i * 25) + 'ms'; el.classList.add('sending'); }
    const dest = routeCard(card);
    summary[dest] = (summary[dest] || 0) + 1;
  });
  setTimeout(() => {
    _parsedCards = [];
    dumpArea.value = '';
    _prevSig = '';
    dumpGutter.innerHTML = '';
    dumpCount.textContent = '';
    dumpStats.innerHTML = '<span class="dump-empty-hint">Start typing ↑  one thought per line</span>';
    btnParse.disabled = true;
    document.getElementById('phase-review').classList.add('hidden');
    document.getElementById('phase-write').classList.remove('hidden');
    const msg = Object.entries(summary).map(([d, n]) => `${n} → ${d}`).join(', ');
    if (window.showToast) showToast('Sent: ' + msg, 'success');
    updateInboxBadge();
    renderInbox();
  }, cards.length * 25 + 280);
}

function sendAllToInbox() {
  const ts = new Date().toISOString();
  _parsedCards.forEach(c => addToInbox(c.text, c.cat, ts));
  _parsedCards = [];
  dumpArea.value = '';
  _prevSig = '';
  dumpGutter.innerHTML = '';
  dumpCount.textContent = '';
  dumpStats.innerHTML = '<span class="dump-empty-hint">Start typing ↑  one thought per line</span>';
  btnParse.disabled = true;
  document.getElementById('phase-review').classList.add('hidden');
  document.getElementById('phase-write').classList.remove('hidden');
  updateInboxBadge();
  renderInbox();
  if (window.showToast) showToast('All items saved to Inbox', 'info');
}

// ── Quick Capture ─────────────────────────────────────────────────────────

document.getElementById('qc-input').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const text = e.target.value.trim();
  if (!text) return;
  e.preventDefault();
  const cat = classify(text) || 'note';
  addToInbox(text, cat, new Date().toISOString());
  e.target.value = '';
  updateInboxBadge();
  renderInbox();
  if (window.showToast) showToast(`"${text.slice(0, 40)}" → Inbox`, 'success');
});

// ── Inbox ─────────────────────────────────────────────────────────────────

let _inboxFilter = 'all';

function updateInboxBadge() {
  const raw   = HubStorage.get('capture-hub-v1') || { inbox: [] };
  const count = (raw.inbox || []).length;
  const badge = document.getElementById('inbox-badge');
  badge.textContent = count > 0 ? count : '';
  if (count > 0) {
    badge.classList.remove('badge-pulse');
    void badge.offsetWidth;
    badge.classList.add('badge-pulse');
  }
}

function renderInboxToolbar(items) {
  const byCat = {};
  items.forEach(it => { byCat[it.cat] = (byCat[it.cat] || 0) + 1; });
  const filters = [{ key: 'all', label: 'All', n: items.length, dot: null }]
    .concat(Object.entries(byCat).filter(([, n]) => n > 0)
      .map(([cat, n]) => ({ key: cat, label: CATS[cat]?.label || cat, n, dot: CATS[cat]?.dot })));
  document.getElementById('inbox-toolbar').innerHTML = filters.map(({ key, label, n, dot }) => `
    <button class="if-chip ${_inboxFilter === key ? 'active' : ''}" onclick="setInboxFilter('${key}')">
      ${dot ? `<span style="width:6px;height:6px;border-radius:50%;background:${dot};display:inline-block"></span>` : ''}
      ${label} <span class="if-count">${n}</span>
    </button>`).join('');
}

function setInboxFilter(cat) {
  _inboxFilter = cat;
  renderInbox();
}

function renderInbox() {
  const raw      = HubStorage.get('capture-hub-v1') || { inbox: [] };
  const items    = raw.inbox || [];
  renderInboxToolbar(items);
  const filtered = _inboxFilter === 'all' ? items : items.filter(it => it.cat === _inboxFilter);
  const list     = document.getElementById('inbox-list');
  list.innerHTML = '';

  if (!filtered.length) {
    list.innerHTML = items.length === 0 ? inboxZeroHTML()
      : `<div class="cap-empty"><p>No ${CATS[_inboxFilter]?.label ?? ''} items.</p></div>`;
    return;
  }

  filtered.forEach(item => {
    const cat  = CATS[item.cat] || CATS.note;
    const card = document.createElement('div');
    card.className = 'ic-card';
    card.style.cssText = `--_bc:${cat.dot}`;
    card.innerHTML = `
      <div class="ic-content">
        <div class="ic-text">${HubUtils.esc(item.text)}</div>
        <div class="ic-meta-row">
          <span class="ic-cat-dot" style="background:${cat.dot}"></span>
          <span class="ic-cat-label">${cat.label}</span>
          <span class="ic-time">${relativeTime(item.capturedAt)}</span>
        </div>
      </div>
      <div class="ic-actions">
        ${cat.routable ? `<button class="ic-route-btn" onclick="routeFromInbox('${item.id}')">→ ${cat.dest}</button>` : ''}
        <button class="ic-del-btn" title="Delete" onclick="deleteFromInbox('${item.id}')">×</button>
      </div>`;
    list.appendChild(card);
  });
}

function routeFromInbox(itemId) {
  const raw = HubStorage.get('capture-hub-v1') || { inbox: [] };
  const idx = (raw.inbox || []).findIndex(it => it.id === itemId);
  if (idx === -1) return;
  const item = raw.inbox.splice(idx, 1)[0];
  HubStorage.set('capture-hub-v1', raw);
  const dest = routeCard({ text: item.text, cat: item.cat });
  if (window.showToast) showToast(`Sent to ${dest}`, 'success');
  updateInboxBadge();
  renderInbox();
}

function deleteFromInbox(itemId) {
  const raw = HubStorage.get('capture-hub-v1') || { inbox: [] };
  raw.inbox = (raw.inbox || []).filter(it => it.id !== itemId);
  HubStorage.set('capture-hub-v1', raw);
  updateInboxBadge();
  renderInbox();
}

function inboxZeroHTML() {
  return `<div class="cap-empty">
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="24" stroke="currentColor" stroke-width="1.5"/>
      <path d="M21 32l7 7 15-15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="32" y1="6" x2="32" y2="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
      <line x1="32" y1="62" x2="32" y2="58" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
      <line x1="6"  y1="32" x2="2"  y2="32" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
      <line x1="62" y1="32" x2="58" y2="32" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
      <line x1="12" y1="12" x2="9"  y2="9"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".35"/>
      <line x1="52" y1="52" x2="55" y2="55" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".35"/>
      <line x1="52" y1="12" x2="55" y2="9"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".35"/>
      <line x1="12" y1="52" x2="9"  y2="55" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".35"/>
    </svg>
    <h3>Inbox zero</h3>
    <p>All clear. Use Brain Dump or quick capture to add items.</p>
  </div>`;
}

function relativeTime(iso) {
  if (!iso) return '';
  const d = Date.now() - new Date(iso).getTime();
  if (d < 60000)    return 'just now';
  if (d < 3600000)  return Math.floor(d / 60000) + 'm ago';
  if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
  return Math.floor(d / 86400000) + 'd ago';
}

// ── PWA share-target ingest (P85 B3) ───────────────────────────────────────
// When the OS shares text/a link into the installed app, it opens
// capture-hub.html?title=…&text=…&url=… — capture it as an inbox item.
// The shell loads tools with ?v=<ts>; that alone must NOT trigger this.
function _ingestShareParams() {
  try {
    const p = new URLSearchParams(location.search);
    const title = (p.get('title') || '').trim();
    const text  = (p.get('text')  || '').trim();
    const url   = (p.get('url')   || '').trim();
    if (!title && !text && !url) return;
    const parts = [];
    if (title) parts.push(title);
    if (text)  parts.push(text);
    let combined = parts.join(' — ');
    if (url) combined = (combined ? combined + ' ' : '') + url;
    addToInbox(combined, null, new Date().toISOString());
    history.replaceState(null, '', location.pathname); // don't re-add on refresh
    if (typeof showToast === 'function') showToast('Captured from share');
  } catch (e) { /* ignore malformed share params */ }
}

// ── Init ──────────────────────────────────────────────────────────────────

_ingestShareParams();
updateInboxBadge();
renderInbox();
</script>
