<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dependency Graph - Thinking Hub</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="theme.css">
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <script src="hub-storage.js"></script>
  <script src="hub-utils.js"></script>
  <script src="hub-links.js"></script>
  <script src="hub-toast.js"></script>
  <script src="hub-bootstrap.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      padding: 12px 20px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
      z-index: 10;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .header-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
    }

    .header-subtitle {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--font-mono);
    }

    /* ── Filter chips ───────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      min-height: 22px;
    }

    .filter-label {
      font-size: 11px;
      color: var(--text3);
      margin-right: 2px;
      flex-shrink: 0;
    }

    .filter-chip {
      padding: 2px 10px;
      border-radius: 999px;
      border: 1px solid var(--chip-color, var(--border));
      background: transparent;
      color: var(--text3);
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.12s;
      opacity: 0.45;
    }

    .filter-chip.active {
      color: var(--text);
      opacity: 1;
      background: rgba(0, 0, 0, 0.2);
    }

    .filter-chip:hover {
      opacity: 1;
    }

    /* ── Network canvas ─────────────────────────────────────── */
    #mynetwork {
      flex: 1;
      width: 100%;
      background: var(--bg);
    }

    /* ── Bottom controls ────────────────────────────────────── */
    .controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-family: var(--font-body);
      transition: all 0.15s;
    }

    .btn:hover {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent-glow);
    }

    .btn.frozen {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent-glow);
    }

    /* ── Legend ─────────────────────────────────────────────── */
    .legend {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      z-index: 100;
      font-size: 11px;
      display: none;
      flex-direction: column;
      gap: 7px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
    }

    .legend.visible {
      display: flex;
    }

    .legend-title {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text2);
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      flex-shrink: 0;
    }

    .legend-hint {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
      color: var(--text3);
      font-size: 10px;
      line-height: 1.5;
    }

    .legend-toggle { font-size: 9px; color: var(--text3); }
    .legend.collapsed .legend-body { display: none; }
    .legend-body { display: flex; flex-direction: column; gap: 7px; margin-top: 6px; }

    /* ── New Link modal ─────────────────────────────────────── */
    .gh-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 500; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.18s;
    }
    .gh-overlay.open { opacity: 1; pointer-events: all; }
    .gh-modal {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--r); width: 520px; max-width: 95vw;
      padding: 24px; display: flex; flex-direction: column; gap: 16px;
    }
    .gh-modal-title { font-family: var(--font-display); font-size: 15px; font-weight: 800; }
    .gh-modal-sides { display: grid; grid-template-columns: 1fr 28px 1fr; gap: 8px; align-items: start; }
    .gh-arrow { display: flex; align-items: center; justify-content: center; padding-top: 26px; color: var(--text3); font-size: 16px; }
    .gh-side-label { font-size: 11px; font-weight: 600; color: var(--text3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .gh-select {
      width: 100%; padding: 7px 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      color: var(--text); font-family: var(--font-body); font-size: 12.5px;
      margin-bottom: 6px; cursor: pointer;
    }
    .gh-select:focus { outline: 1px solid var(--accent); }
    .gh-modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
    .gh-btn {
      padding: 8px 14px; border-radius: var(--r-sm); font-family: var(--font-body);
      font-size: 12.5px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface2); color: var(--text); transition: all 0.12s;
    }
    .gh-btn:hover { border-color: var(--border2); }
    .gh-btn-primary { background: var(--accent); border-color: var(--accent); color: #111; }
    .gh-btn-primary:hover { opacity: 0.85; }
    .gh-btn-danger { color: var(--accent-nope); }
    .gh-btn-danger:hover { border-color: var(--accent-nope); }

    /* ── Edge info panel ─────────────────────────────────────── */
    .edge-panel {
      position: absolute; bottom: 20px; right: 20px; width: 276px;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--r); padding: 14px 16px; z-index: 100;
      display: none; flex-direction: column; gap: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    }
    .edge-panel.visible { display: flex; }
    .edge-panel-title { font-size: 11px; font-weight: 600; color: var(--text3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.5px; }
    .edge-endpoint-tag { display: inline-block; background: var(--surface2); border-radius: 4px; padding: 2px 6px; font-size: 10.5px; color: var(--text3); margin-bottom: 2px; }
    .edge-endpoints { font-size: 12px; color: var(--text2); line-height: 1.6; }
    .edge-note-input {
      width: 100%; padding: 6px 8px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      color: var(--text); font-family: var(--font-body); font-size: 12px;
      resize: none; min-height: 52px; box-sizing: border-box;
    }
    .edge-note-input:focus { outline: 1px solid var(--accent); }
    .edge-panel-actions { display: flex; gap: 6px; }

    /* ── Node info panel ─────────────────────────────────────── */
    #node-panel { right: 20px; bottom: 20px; }
    .np-tool-tag { display:inline-block; background:var(--surface2); border-radius:4px; padding:2px 7px; font-size:10.5px; color:var(--text3); font-family:var(--font-mono); margin-bottom:3px; }
    .np-meta-row { font-size:11.5px; color:var(--text2); line-height:1.75; }
    .np-meta-key { color:var(--text3); }

    /* ── Link modal: picker upgrades ───────────────────────── */
    .gh-modal { max-height: 90vh; overflow-y: auto; }
    .gh-select[size] { height:auto; min-height:110px; max-height:170px; overflow-y:auto; margin-bottom:0; }
    .gh-seg-toggle { display:flex; border:1px solid var(--border); border-radius:var(--r-sm); overflow:hidden; margin-bottom:5px; }
    .gh-seg-btn { flex:1; padding:4px 0; background:var(--surface2); border:none; color:var(--text3); font-family:var(--font-body); font-size:11px; font-weight:600; cursor:pointer; transition:all 0.1s; }
    .gh-seg-btn:hover { color:var(--text); }
    .gh-seg-btn.active { background:var(--accent-dim); color:var(--accent); }
    .gh-search-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
    .gh-search-input { flex:1; padding:5px 8px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); color:var(--text); font-family:var(--font-body); font-size:12px; }
    .gh-search-input:focus { outline:1px solid var(--accent); }
    .gh-item-count { font-size:10px; color:var(--text3); font-family:var(--font-mono); white-space:nowrap; }

    /* ── Right-click context menu ───────────────────────────── */
    #graph-ctx-menu { position:fixed; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:4px 0; min-width:172px; z-index:600; box-shadow:0 8px 24px rgba(0,0,0,0.45); }
    .ctx-item { display:block; width:100%; padding:7px 14px; background:none; border:none; color:var(--text2); font-family:var(--font-body); font-size:12.5px; text-align:left; cursor:pointer; transition:background 0.1s, color 0.1s; }
    .ctx-item:hover { background:var(--accent-dim); color:var(--accent); }
    .ctx-sep { height:1px; background:var(--border); margin:3px 0; }

    /* ── Drag-to-connect banner ─────────────────────────────── */
    #drag-link-banner { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:400; display:none; align-items:center; gap:10px; padding:10px 16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); box-shadow:0 6px 20px rgba(0,0,0,0.40); font-size:12px; white-space:nowrap; }
    #drag-link-banner.visible { display:flex; }

    /* ── Empty state ────────────────────────────────────────── */
    .empty-state {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      z-index: 50;
      padding: 20px;
      pointer-events: none;
    }

    .empty-state.visible {
      display: flex;
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 14px;
      opacity: 0.35;
    }

    .empty-title {
      font-family: var(--font-display);
      font-size: 15px;
      color: var(--text2);
      margin-bottom: 8px;
    }

    .empty-text {
      font-size: 12px;
      color: var(--text2);
      max-width: 280px;
      line-height: 1.6;
    }

  </style>
</head>

<body>

  <div class="header">
    <div class="header-row">
      <div class="header-title">Dependency Graph</div>
      <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
        <input type="text" id="graph-search" class="gh-search-input" placeholder="Search nodes… (/)" oninput="searchNodes(this.value)" style="width:160px;font-size:11.5px;padding:4px 9px">
        <button id="graph-search-clear" class="gh-btn" style="display:none;padding:3px 8px;font-size:11px" onclick="clearNodeSearch()">✕</button>
        <div class="header-subtitle" id="stats">0 nodes · 0 links</div>
      </div>
    </div>
    <div class="filter-bar" id="filter-bar"></div>
  </div>

  <div class="controls">
    <button class="btn" onclick="fitGraph()">Fit to Screen</button>
    <button class="btn" id="physics-btn" onclick="togglePhysics()">Freeze Layout</button>
    <button class="btn" id="leaves-btn" onclick="toggleLeaves()">Leaves</button>
    <button class="btn" id="orphans-btn" onclick="toggleOrphans()">Orphans</button>
    <button class="btn frozen" id="auto-btn" onclick="toggleAutoLinks()">Auto Links</button>
    <button class="btn" onclick="openNewLinkModal()">+ New Link</button>
  </div>

  <div class="legend" id="legend"></div>

  <div id="empty" class="empty-state">
    <svg width="96" height="72" viewBox="0 0 96 72" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:4px;opacity:0.55">
      <circle cx="14" cy="36" r="8" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="48" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="48" cy="60" r="8" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="82" cy="36" r="8" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="48" cy="36" r="5" fill="currentColor" opacity="0.3"/>
      <line x1="22" y1="32" x2="40" y2="17" stroke="currentColor" stroke-width="1.2" opacity="0.6"/>
      <line x1="22" y1="40" x2="40" y2="55" stroke="currentColor" stroke-width="1.2" opacity="0.6"/>
      <line x1="56" y1="17" x2="74" y2="31" stroke="currentColor" stroke-width="1.2" opacity="0.6"/>
      <line x1="56" y1="55" x2="74" y2="41" stroke="currentColor" stroke-width="1.2" opacity="0.6"/>
      <line x1="48" y1="20" x2="48" y2="52" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.4"/>
    </svg>
    <div class="empty-title">No relationships yet</div>
    <div class="empty-text">Start linking your tasks, ideas, and decisions across the Thinking Hub — they'll appear here as a live graph.</div>
  </div>

  <div id="mynetwork"></div>

  <!-- Edge info panel -->
  <div class="edge-panel" id="edge-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div class="edge-panel-title">Link</div>
      <select class="gh-select" id="edge-rel-type" style="font-size:10.5px;padding:2px 5px;margin:0;width:auto;flex-shrink:0">
        <option value="relates">↔ Relates</option>
        <option value="depends-on">→ Depends on</option>
        <option value="blocks">→ Blocks</option>
        <option value="leads-to">→ Leads to</option>
      </select>
    </div>
    <div class="edge-endpoints" id="edge-endpoints"></div>
    <textarea class="edge-note-input" id="edge-note" placeholder="Add a note to this link…" rows="3"></textarea>
    <div class="edge-panel-actions">
      <button class="gh-btn gh-btn-primary" style="flex:1" onclick="saveEdgeNote()">Save</button>
      <button class="gh-btn gh-btn-danger" onclick="deleteCurrentEdge()">Delete</button>
      <button class="gh-btn" onclick="closeEdgePanel()">✕</button>
    </div>
  </div>

  <!-- Node info panel -->
  <div class="edge-panel" id="node-panel">
    <div id="np-tool-tag" class="np-tool-tag"></div>
    <div id="np-label" style="font-size:13px;font-weight:600;color:var(--text);line-height:1.4;margin-top:2px"></div>
    <div id="np-meta" class="np-meta-row"></div>
    <div class="edge-panel-actions">
      <button class="gh-btn gh-btn-primary" style="flex:1" id="np-open-btn">Open</button>
      <button class="gh-btn" id="np-link-btn">+ Link</button>
      <button class="gh-btn" onclick="closeNodePanel()">✕</button>
    </div>
  </div>

  <!-- Drag-to-connect banner -->
  <div id="drag-link-banner">
    <span id="dlb-text" style="color:var(--text2)"></span>
    <button class="gh-btn gh-btn-primary" id="dlb-yes">Link</button>
    <button class="gh-btn" id="dlb-no">✕</button>
  </div>

  <!-- New Link modal -->
  <div class="gh-overlay" id="link-overlay" onclick="if(event.target===this)closeLinkModal()">
    <div class="gh-modal">
      <div class="gh-modal-title">Create New Link</div>
      <div class="gh-modal-sides">
        <div>
          <div class="gh-side-label">Item A</div>
          <select class="gh-select" id="nl-tool-a" onchange="populateItems('a')"></select>
          <div class="gh-seg-toggle" id="nl-seg-a" style="display:none">
            <button class="gh-seg-btn active" onclick="setPickerMode('a','tasks')">Tasks</button>
            <button class="gh-seg-btn" onclick="setPickerMode('a','projects')">Projects</button>
          </div>
          <div class="gh-search-row">
            <input type="text" class="gh-search-input" id="nl-search-a" placeholder="Filter…" oninput="filterItems('a')">
            <span class="gh-item-count" id="nl-count-a"></span>
          </div>
          <select class="gh-select" id="nl-item-a" size="6"></select>
        </div>
        <div class="gh-arrow">↔</div>
        <div>
          <div class="gh-side-label">Item B</div>
          <select class="gh-select" id="nl-tool-b" onchange="populateItems('b')"></select>
          <div class="gh-seg-toggle" id="nl-seg-b" style="display:none">
            <button class="gh-seg-btn active" onclick="setPickerMode('b','tasks')">Tasks</button>
            <button class="gh-seg-btn" onclick="setPickerMode('b','projects')">Projects</button>
          </div>
          <div class="gh-search-row">
            <input type="text" class="gh-search-input" id="nl-search-b" placeholder="Filter…" oninput="filterItems('b')">
            <span class="gh-item-count" id="nl-count-b"></span>
          </div>
          <select class="gh-select" id="nl-item-b" size="6"></select>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="gh-side-label" style="white-space:nowrap;margin:0">Relationship Type</div>
        <select class="gh-select" id="nl-rel-type" style="flex:1;margin:0;padding:6px 8px">
          <option value="relates">↔ Relates to (undirected)</option>
          <option value="depends-on">→ Depends on</option>
          <option value="blocks">→ Blocks</option>
          <option value="leads-to">→ Leads to</option>
        </select>
      </div>
      <div class="gh-modal-footer">
        <button class="gh-btn" onclick="closeLinkModal()">Cancel</button>
        <button class="gh-btn gh-btn-primary" onclick="confirmNewLink()">Create Link</button>
      </div>
    </div>
  </div>

  <script>
    const TOOL_COLORS_DARK = {
      'project-hub':  { bg: '#1c2d47', border: '#3a5f96' },
      'decision-hub': { bg: '#3a1e1e', border: '#7a3535' },
      'kmqt-board':   { bg: '#2b1e3a', border: '#5e3a7a' },
      'idea-swiper':  { bg: '#1e3828', border: '#3a7a52' },
      'schedule':     { bg: '#38321c', border: '#7a6a30' },
      'canvas-hub':   { bg: '#1c3838', border: '#30787a' },
      'risk-hub':     { bg: '#3a1516', border: '#be3030' },
      'goals-hub':    { bg: '#332e14', border: '#a08020' },
      'meetings-hub':   { bg: '#152838', border: '#2868a8' },
      'tool-portfolio': { bg: '#1a2e1a', border: '#3a8040' },
      'learning-hub':   { bg: '#1a2a40', border: '#2860a8' },
      'stakeholder-hub':{ bg: '#2a1e38', border: '#5c30a0' },
    };
    const TOOL_COLORS_LIGHT = {
      'project-hub':    { bg: '#bed8f5', border: '#4a90c8' },
      'decision-hub':   { bg: '#f5c0c0', border: '#c04040' },
      'kmqt-board':     { bg: '#e0c8f8', border: '#7a40b0' },
      'idea-swiper':    { bg: '#b8ecd4', border: '#2aaa6a' },
      'schedule':       { bg: '#fae0a0', border: '#b88020' },
      'canvas-hub':     { bg: '#b8ecd4', border: '#2aaa6a' },
      'risk-hub':       { bg: '#fcd0d0', border: '#c83030' },
      'goals-hub':      { bg: '#faeab0', border: '#a07820' },
      'meetings-hub':   { bg: '#b8d4f0', border: '#3060a8' },
      'tool-portfolio': { bg: '#c8ecc8', border: '#3a9040' },
      'learning-hub':   { bg: '#c0d8f5', border: '#3060b8' },
      'stakeholder-hub':{ bg: '#ddc8f8', border: '#6030b0' },
    };

    const TOOL_LABELS = {
      'project-hub':    'Project Hub',
      'decision-hub':   'Decision Hub',
      'kmqt-board':     'KMQT Board',
      'idea-swiper':    'Idea Swiper',
      'schedule':       'Schedule',
      'canvas-hub':     'Canvas',
      'risk-hub':       'Risk Register',
      'goals-hub':      'Goals Hub',
      'meetings-hub':   'Meetings',
      'tool-portfolio': 'Tool Portfolio',
      'learning-hub':   'Learning Log',
      'stakeholder-hub':'Stakeholder Map',
    };

    const EDGE_TYPE_CONFIG = {
      'relates':    { label: '',          arrowTo: false, arrowFrom: false, hue: null },
      'depends-on': { label: 'depends on', arrowTo: true,  arrowFrom: false, hue: '#5580cc' },
      'blocks':     { label: 'blocks',     arrowTo: true,  arrowFrom: false, hue: '#cc4444' },
      'leads-to':   { label: 'leads to',   arrowTo: true,  arrowFrom: false, hue: '#44aa66' },
    };

    let network = null;
    let nodesDS = null;
    let edgesDS = null;
    let nodesMap = new Map();
    let hiddenTools = new Set();
    let physicsEnabled = true;
    let autoLinksEnabled = true;

    // ── Controls ──────────────────────────────────────────────

    function fitGraph() {
      if (network) network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
    }

    function togglePhysics() {
      physicsEnabled = !physicsEnabled;
      if (network) network.setOptions({ physics: { enabled: physicsEnabled } });
      const btn = document.getElementById('physics-btn');
      btn.textContent = physicsEnabled ? 'Freeze Layout' : 'Resume Physics';
      btn.classList.toggle('frozen', !physicsEnabled);
    }

    // ── Filtering ─────────────────────────────────────────────

    function applyFilters() {
      if (!nodesDS) return;
      const updates = [];
      nodesMap.forEach((node, id) => {
        updates.push({ id, hidden: hiddenTools.has(node.tool) });
      });
      nodesDS.update(updates);
      updateStats();
    }

    function updateStats() {
      const visible = Array.from(nodesMap.values()).filter(n => !hiddenTools.has(n.tool)).length;
      const totalEdges = edgesDS ? edgesDS.length : 0;
      document.getElementById('stats').textContent = `${visible} nodes · ${totalEdges} links`;
    }

    // ── Filter bar ────────────────────────────────────────────

    function buildFilterBar(tools) {
      const bar = document.getElementById('filter-bar');
      bar.innerHTML = '';
      if (!tools.length) return;

      const label = document.createElement('span');
      label.className = 'filter-label';
      label.textContent = 'Show:';
      bar.appendChild(label);

      const toolCounts = {};
      nodesMap.forEach(n => { toolCounts[n.tool] = (toolCounts[n.tool] || 0) + 1; });

      const _isDarkBar = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark';
      const _tcBar = _isDarkBar ? TOOL_COLORS_DARK : TOOL_COLORS_LIGHT;
      tools.forEach(tool => {
        const colors = _tcBar[tool] || { border: _isDarkBar ? '#555' : '#8888a0' };
        const chip = document.createElement('button');
        chip.className = 'filter-chip active';
        chip.dataset.tool = tool;
        chip.style.setProperty('--chip-color', colors.border);
        const count = toolCounts[tool] || 0;
        chip.innerHTML = `${HubUtils.esc(TOOL_LABELS[tool] || tool)}<span style="font-size:9px;opacity:0.65;margin-left:4px;font-family:var(--font-mono)">${count}</span>`;
        chip.onclick = () => toggleToolVisibility(tool);
        bar.appendChild(chip);
      });
    }

    // ── Legend ────────────────────────────────────────────────

    function buildLegend(tools) {
      const legend = document.getElementById('legend');
      if (!tools.length) { legend.classList.remove('visible'); return; }
      legend.classList.add('visible');
      const collapsed = legend.classList.contains('collapsed');
      legend.innerHTML = `
        <div class="legend-title" onclick="this.closest('.legend').classList.toggle('collapsed')" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px">
          <span>TOOLS</span><span class="legend-toggle">${collapsed ? '▸' : '▾'}</span>
        </div>`;
      const body = document.createElement('div');
      body.className = 'legend-body';
      tools.forEach(tool => {
        const _isDarkLeg = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark';
        const c = (_isDarkLeg ? TOOL_COLORS_DARK : TOOL_COLORS_LIGHT)[tool] || (_isDarkLeg ? { bg: '#333', border: '#555' } : { bg: '#e4e4ea', border: '#8888a0' });
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-swatch" style="background:${c.bg};border-color:${c.border}"></div><span>${TOOL_LABELS[tool] || tool}</span>`;
        body.appendChild(item);
      });
      const hint = document.createElement('div');
      hint.className = 'legend-hint';
      hint.innerHTML = 'Double-click a node to open it';
      body.appendChild(hint);
      legend.appendChild(body);
    }

    // ── Auto-node loader ──────────────────────────────────────

    function loadAutoNodes(isDark) {
      const TC = isDark ? TOOL_COLORS_DARK : TOOL_COLORS_LIGHT;
      const fontColor = isDark ? '#e8e8f0' : '#1a1a2e';
      const autoEdgeColor = isDark ? 'rgba(255,255,255,0.20)' : 'rgba(0,0,0,0.25)';
      const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#b8f033';

      const nodes = new Map();
      const edges = [];

      function addNode(tool, itemId, label) {
        const id = `${tool}::${itemId}`;
        if (nodes.has(id)) return id;
        const c = TC[tool] || (isDark ? { bg: '#2a2a30', border: '#555' } : { bg: '#e4e4ea', border: '#8888a0' });
        nodes.set(id, {
          id, label: (label || 'Untitled').slice(0, 40), tool, itemId,
          title: `<b>${TOOL_LABELS[tool] || tool}</b><br>${label || 'Untitled'}`,
          hidden: hiddenTools.has(tool),
          color: { background: c.bg, border: c.border,
            highlight: { background: c.bg, border: accentColor },
            hover: { background: c.bg, border: c.border } },
          font: { color: fontColor, size: 12, face: 'DM Sans, sans-serif' },
          shape: 'box', borderWidth: 1,
          margin: { top: 8, bottom: 8, left: 10, right: 10 }
        });
        return id;
      }

      function addAutoEdge(fromId, toId, label) {
        edges.push({
          id: `auto::${fromId}__${toId}`, from: fromId, to: toId,
          _auto: true, title: label,
          color: { color: autoEdgeColor, highlight: accentColor, hover: autoEdgeColor },
          width: 1, dashes: [5, 5],
          arrows: { to: { enabled: true, scaleFactor: 0.45 } },
          smooth: { type: 'continuous' }, selectionWidth: 1.5
        });
      }

      // Projects (parent nodes — always load so edges can reference them)
      try {
        const ph = JSON.parse(localStorage.getItem('project-hub-v1') || '{}');
        (ph.projects || []).forEach(p => addNode('project-hub', p.id, p.name));
      } catch {}

      // Decisions → project
      try {
        const dl = JSON.parse(localStorage.getItem('decision-hub-v1') || '[]');
        const decisions = Array.isArray(dl) ? dl : (dl.entries || []);
        decisions.forEach(d => {
          const dId = addNode('decision-hub', d.id, d.title || 'Decision');
          if (d.projectId && nodes.has(`project-hub::${d.projectId}`))
            addAutoEdge(dId, `project-hub::${d.projectId}`, 'decision → project');
        });
      } catch {}

      // Risks → project
      try {
        const rh = JSON.parse(localStorage.getItem('risk-hub-v1') || '{}');
        (rh.risks || []).forEach(r => {
          const rId = addNode('risk-hub', r.id, r.title || 'Risk');
          if (r.projectId && nodes.has(`project-hub::${r.projectId}`))
            addAutoEdge(rId, `project-hub::${r.projectId}`, 'risk → project');
        });
      } catch {}

      // Goals (objectives) → project
      try {
        const gh = JSON.parse(localStorage.getItem('goals-hub-v1') || '{}');
        (gh.quarters || []).forEach(q =>
          (q.objectives || []).forEach(o => {
            const oId = addNode('goals-hub', o.id, o.title || 'Objective');
            if (o.projectId && nodes.has(`project-hub::${o.projectId}`))
              addAutoEdge(oId, `project-hub::${o.projectId}`, 'goal → project');
          })
        );
      } catch {}

      // Meetings → project
      try {
        const mh = JSON.parse(localStorage.getItem('meetings-hub-v1') || '{}');
        (mh.meetings || []).forEach(m => {
          const mId = addNode('meetings-hub', m.id, m.title || 'Meeting');
          if (m.projectId && nodes.has(`project-hub::${m.projectId}`))
            addAutoEdge(mId, `project-hub::${m.projectId}`, 'meeting → project');
        });
      } catch {}

      // Tool Portfolio → linked projects
      try {
        const tp = JSON.parse(localStorage.getItem('tool-portfolio-v1') || '[]');
        tp.forEach(t => {
          const tId = addNode('tool-portfolio', t.id, t.name || 'Tool');
          (t.projectIds || []).forEach(projId => {
            if (nodes.has(`project-hub::${projId}`))
              addAutoEdge(tId, `project-hub::${projId}`, 'tool → project');
          });
        });
      } catch {}

      // Learning items (standalone nodes)
      try {
        const lh = JSON.parse(localStorage.getItem('learning-hub-v1') || '{}');
        (lh.items || []).forEach(item => {
          addNode('learning-hub', item.id, item.title || 'Learning');
        });
      } catch {}

      // Stakeholders → projects
      try {
        const sth = JSON.parse(localStorage.getItem('stakeholder-hub-v1') || '{}');
        (sth.stakeholders || []).forEach(sh => {
          const sId = addNode('stakeholder-hub', sh.id, sh.name || 'Stakeholder');
          (sh.projectIds || []).forEach(projId => {
            if (nodes.has(`project-hub::${projId}`))
              addAutoEdge(sId, `project-hub::${projId}`, 'stakeholder → project');
          });
        });
      } catch {}

      return { nodes: Array.from(nodes.values()), edges };
    }

    // ── Build graph ───────────────────────────────────────────

    function buildGraph() {
      const isDark = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark';
      const TC = isDark ? TOOL_COLORS_DARK : TOOL_COLORS_LIGHT;
      const nodeFontColor = isDark ? '#e8e8f0' : '#1a1a2e';
      const edgeColor = isDark ? 'rgba(255,255,255,0.38)' : 'rgba(0,0,0,0.60)';
      const _gcss = getComputedStyle(document.documentElement);
      const accentColor = _gcss.getPropertyValue('--accent').trim() || '#b8f033';
      const edgeHover = _gcss.getPropertyValue('--accent-glow').trim() || 'rgba(184,240,51,0.45)';

      // Seed with auto-generated nodes + dashed edges
      const auto = autoLinksEnabled ? loadAutoNodes(isDark) : { nodes: [], edges: [] };
      nodesMap = new Map();
      auto.nodes.forEach(n => nodesMap.set(n.id, n));
      const edges = [...auto.edges];

      // Overlay manual link nodes (merge — don't overwrite if auto already added it)
      const links = HubLinks.getAll();
      function nodeId(tool, itemId) { return `${tool}::${itemId}`; }

      links.forEach(link => {
        [link.a, link.b].forEach(side => {
          const id = nodeId(side.tool, side.itemId);
          if (nodesMap.has(id)) return;
          const c = TC[side.tool] || (isDark ? { bg: '#2a2a30', border: '#555' } : { bg: '#e4e4ea', border: '#8888a0' });
          nodesMap.set(id, {
            id,
            label: (side.label || 'Untitled').slice(0, 40),
            tool: side.tool, itemId: side.itemId,
            title: `<b>${TOOL_LABELS[side.tool] || side.tool}</b><br>${side.label || 'Untitled'}`,
            hidden: hiddenTools.has(side.tool),
            color: { background: c.bg, border: c.border,
              highlight: { background: c.bg, border: accentColor },
              hover: { background: c.bg, border: c.border } },
            font: { color: nodeFontColor, size: 12, face: 'DM Sans, sans-serif' },
            shape: 'box', borderWidth: 1,
            margin: { top: 8, bottom: 8, left: 10, right: 10 }
          });
        });
        const et = EDGE_TYPE_CONFIG[link.relType] || EDGE_TYPE_CONFIG['relates'];
        const edgeTitle = link.note ? `📝 ${link.note}` : undefined;
        edges.push({
          id: link.id, _linkId: link.id,
          from: nodeId(link.a.tool, link.a.itemId),
          to: nodeId(link.b.tool, link.b.itemId),
          title: edgeTitle,
          label: et.label || undefined,
          font: et.label ? { size: 9, color: isDark ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.55)', face: 'DM Sans, sans-serif', background: 'none' } : undefined,
          color: { color: et.hue ? et.hue + (isDark ? '99' : 'bb') : edgeColor, highlight: accentColor, hover: edgeHover },
          arrows: {
            to:   { enabled: et.arrowTo,   scaleFactor: 0.55 },
            from: { enabled: et.arrowFrom, scaleFactor: 0.55 },
          },
          width: link.note ? 2.5 : 1.5,
          selectionWidth: 2,
          smooth: { type: 'curvedCW', roundness: 0.1 }
        });
      });

      const nodes = Array.from(nodesMap.values());

      if (!nodes.length) {
        document.getElementById('empty').classList.add('visible');
        if (network) { network.destroy(); network = null; }
        nodesDS = null; edgesDS = null; nodesMap.clear();
        document.getElementById('stats').textContent = '0 nodes · 0 links';
        document.getElementById('filter-bar').innerHTML = '';
        document.getElementById('legend').classList.remove('visible');
        return;
      }

      document.getElementById('empty').classList.remove('visible');
      const tools = [...new Set(nodes.map(n => n.tool))];

      buildFilterBar(tools);
      buildLegend(tools);

      if (network) { network.destroy(); network = null; }

      nodesDS = new vis.DataSet(nodes);
      edgesDS = new vis.DataSet(edges);

      network = new vis.Network(
        document.getElementById('mynetwork'),
        { nodes: nodesDS, edges: edgesDS },
        {
          physics: {
            enabled: physicsEnabled,
            forceAtlas2Based: {
              gravitationalConstant: -80,
              centralGravity: 0.004,
              springLength: 160,
              springConstant: 0.06
            },
            minVelocity: 0.5,
            solver: 'forceAtlas2Based'
          },
          interaction: {
            hover: true,
            tooltipDelay: 150,
            zoomView: true,
            dragView: true,
            navigationButtons: false
          }
        }
      );

      network.on('doubleClick', params => {
        if (!params.nodes.length) return;
        const node = nodesMap.get(params.nodes[0]);
        if (node) HubLinks.navigateTo(node.tool, node.itemId);
      });

      network.on('selectEdge', params => {
        if (!params.edges.length) return;
        const edgeId = params.edges[0];
        const edge = edgesDS.get(edgeId);
        if (edge && edge._linkId) showEdgePanel(edge._linkId);
      });

      network.on('deselectEdge', () => {
        if (!network || !network.getSelectedEdges().length) closeEdgePanel();
      });

      network.on('selectNode', params => {
        if (params.nodes.length) {
          showNodePanel(params.nodes[0]);
          applyNeighbourHighlight(params.nodes[0]);
        }
      });

      network.on('deselectNode', () => {
        clearNeighbourHighlight();
        closeNodePanel();
      });

      network.on('oncontext', params => {
        params.event.preventDefault();
        const nodeId = network.getNodeAt(params.pointer.DOM);
        showContextMenu(params.event.clientX, params.event.clientY, nodeId ? nodesMap.get(nodeId) : null);
      });

      network.on('dragEnd', params => {
        if (!params.nodes.length) return;
        const target = getNearbyNode(params.nodes[0], params.pointer.DOM);
        if (target) setTimeout(() => showDragLinkPrompt(params.nodes[0], target), 80);
      });

      network.on('stabilized', updateStats);
      setTimeout(() => {
        if (!network) return;
        network.setSize('100%', document.getElementById('mynetwork').offsetHeight + 'px');
        network.redraw();
        network.fit({ animation: false });
      }, 0);
      updateStats();
    }

    // ── Leaves filter ─────────────────────────────────────────
    let leavesOnly = false;

    function toggleLeaves() {
      leavesOnly = !leavesOnly;
      document.getElementById('leaves-btn').classList.toggle('frozen', leavesOnly);
      applyLeaves();
    }

    function applyLeaves() {
      if (!nodesDS || !edgesDS) return;
      if (!leavesOnly) { applyFilters(); return; }
      const degree = new Map();
      nodesMap.forEach((_, id) => degree.set(id, 0));
      edgesDS.forEach(e => {
        degree.set(e.from, (degree.get(e.from) || 0) + 1);
        degree.set(e.to, (degree.get(e.to) || 0) + 1);
      });
      const updates = [];
      nodesMap.forEach((node, id) => {
        updates.push({ id, hidden: hiddenTools.has(node.tool) || (degree.get(id) || 0) > 1 });
      });
      nodesDS.update(updates);
      updateStats();
    }

    // ── Orphans filter ────────────────────────────────────────
    let orphansOnly = false;

    function toggleOrphans() {
      orphansOnly = !orphansOnly;
      document.getElementById('orphans-btn').classList.toggle('frozen', orphansOnly);
      applyOrphans();
    }

    function applyOrphans() {
      if (!nodesDS || !edgesDS) return;
      if (!orphansOnly) { applyLeaves(); return; }
      const connected = new Set();
      edgesDS.forEach(e => { connected.add(e.from); connected.add(e.to); });
      const updates = [];
      nodesMap.forEach((node, id) => {
        updates.push({ id, hidden: hiddenTools.has(node.tool) || connected.has(id) });
      });
      nodesDS.update(updates);
      updateStats();
    }

    // ── Edge click → info panel ───────────────────────────────
    let _currentEdgeId = null;
    let _edgeLinksCache = [];

    function closeEdgePanel() {
      document.getElementById('edge-panel').classList.remove('visible');
      _currentEdgeId = null;
      if (network) network.unselectAll();
    }

    function saveEdgeNote() {
      if (!_currentEdgeId) return;
      const note = document.getElementById('edge-note').value.trim();
      const relType = document.getElementById('edge-rel-type').value;
      const links = HubStorage.get('hub-links-v1') || [];
      const idx = links.findIndex(l => l.id === _currentEdgeId);
      if (idx >= 0) {
        links[idx].note = note;
        links[idx].relType = relType;
        HubStorage.set('hub-links-v1', links);
        showToast('Link saved');
      }
      closeEdgePanel();
    }

    function deleteCurrentEdge() {
      if (!_currentEdgeId || !confirm('Delete this link?')) return;
      HubLinks.removeLink(_currentEdgeId);
      closeEdgePanel();
    }

    function showEdgePanel(edgeId) {
      closeNodePanel();
      const links = HubStorage.get('hub-links-v1') || [];
      const link = links.find(l => l.id === edgeId);
      if (!link) return;
      _currentEdgeId = edgeId;

      const toolLabel = t => TOOL_LABELS[t] || t;
      document.getElementById('edge-endpoints').innerHTML =
        `<span class="edge-endpoint-tag">${toolLabel(link.a.tool)}</span> ${(link.a.label || '').slice(0, 36)}<br>` +
        `<span class="edge-endpoint-tag">${toolLabel(link.b.tool)}</span> ${(link.b.label || '').slice(0, 36)}`;
      document.getElementById('edge-note').value = link.note || '';
      document.getElementById('edge-rel-type').value = link.relType || 'relates';
      document.getElementById('edge-panel').classList.add('visible');
    }

    // ── New Link modal ────────────────────────────────────────
    const LINKABLE_TOOLS = Object.keys(TOOL_LABELS);

    function toggleAutoLinks() {
      autoLinksEnabled = !autoLinksEnabled;
      document.getElementById('auto-btn').classList.toggle('frozen', autoLinksEnabled);
      buildGraph();
    }

    const _pickerMode = { a: 'tasks', b: 'tasks' };

    function openNewLinkModal(preselect) {
      const overlay = document.getElementById('link-overlay');
      document.getElementById('nl-rel-type').value = 'relates';
      ['a', 'b'].forEach(side => {
        const toolSel = document.getElementById(`nl-tool-${side}`);
        toolSel.innerHTML = LINKABLE_TOOLS.map(t =>
          `<option value="${t}">${TOOL_LABELS[t]}</option>`
        ).join('');
        if (side === 'b') toolSel.selectedIndex = 1;
        document.getElementById(`nl-search-${side}`).value = '';
        _pickerMode[side] = 'tasks';
        populateItems(side);
      });
      if (preselect) {
        const s = preselect.side || 'a';
        const toolSel = document.getElementById(`nl-tool-${s}`);
        toolSel.value = preselect.tool;
        populateItems(s);
        setTimeout(() => {
          document.getElementById(`nl-item-${s}`).value = preselect.itemId;
        }, 0);
      }
      overlay.classList.add('open');
    }

    function closeLinkModal() {
      document.getElementById('link-overlay').classList.remove('open');
    }

    function setPickerMode(side, mode) {
      _pickerMode[side] = mode;
      const seg = document.getElementById(`nl-seg-${side}`);
      seg.querySelectorAll('.gh-seg-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === mode);
      });
      document.getElementById(`nl-search-${side}`).value = '';
      populateItems(side);
    }

    function populateItems(side) {
      const tool = document.getElementById(`nl-tool-${side}`).value;
      const itemSel = document.getElementById(`nl-item-${side}`);
      const seg = document.getElementById(`nl-seg-${side}`);

      // Show Projects/Tasks toggle only for project-hub
      seg.style.display = tool === 'project-hub' ? '' : 'none';

      try {
        if (tool === 'project-hub' && _pickerMode[side] === 'projects') {
          const data = HubStorage.get('project-hub-v1') || {};
          const projects = data.projects || [];
          itemSel.innerHTML = projects.length
            ? projects.map(p => `<option value="${p.id}" data-label="${(p.name || '').replace(/"/g,'&quot;')}">${(p.name || '(untitled)').slice(0, 50)}</option>`).join('')
            : '<option value="">— no projects —</option>';
        } else if (tool === 'project-hub') {
          // Tasks grouped by project
          const data = HubStorage.get('project-hub-v1') || {};
          const groups = [];
          for (const p of (data.projects || [])) {
            const tasks = (p.tasks || []).filter(t => t.title);
            if (tasks.length) groups.push({ proj: p.name, tasks });
          }
          if (!groups.length) {
            itemSel.innerHTML = '<option value="">— no tasks found —</option>';
          } else {
            itemSel.innerHTML = groups.map(g =>
              `<optgroup label="${(g.proj || 'Project').replace(/"/g,'&quot;')}">${
                g.tasks.map(t => `<option value="${t.id}" data-label="${(t.title || '').replace(/"/g,'&quot;')}">${(t.title || '(untitled)').slice(0, 50)}</option>`).join('')
              }</optgroup>`
            ).join('');
          }
        } else {
          const items = HubLinks.resolveItems(tool);
          itemSel.innerHTML = items.length
            ? items.map(it => `<option value="${it.id}" data-label="${(it.label || '').replace(/"/g,'&quot;')}">${(it.label || '(untitled)').slice(0, 50)}</option>`).join('')
            : '<option value="">— no items found —</option>';
        }
      } catch {
        itemSel.innerHTML = '<option value="">— unavailable —</option>';
      }
      filterItems(side);
    }

    function filterItems(side) {
      const q = (document.getElementById(`nl-search-${side}`).value || '').toLowerCase().trim();
      const itemSel = document.getElementById(`nl-item-${side}`);
      let total = 0, visible = 0;
      // Walk options, hiding non-matches; hide empty optgroups
      const opts = itemSel.querySelectorAll('option');
      opts.forEach(opt => {
        if (!opt.value) return; // keep placeholder
        total++;
        const match = !q || opt.text.toLowerCase().includes(q);
        opt.style.display = match ? '' : 'none';
        if (match) visible++;
      });
      itemSel.querySelectorAll('optgroup').forEach(grp => {
        const anyVisible = Array.from(grp.querySelectorAll('option')).some(o => o.style.display !== 'none');
        grp.style.display = anyVisible ? '' : 'none';
      });
      const countEl = document.getElementById(`nl-count-${side}`);
      if (total > 0) countEl.textContent = q ? `${visible}/${total}` : `${total}`;
      else countEl.textContent = '';
    }

    function confirmNewLink() {
      const toolA = document.getElementById('nl-tool-a').value;
      const selA  = document.getElementById('nl-item-a');
      const toolB = document.getElementById('nl-tool-b').value;
      const selB  = document.getElementById('nl-item-b');
      if (!selA.value || !selB.value) { alert('Please select items on both sides.'); return; }
      if (toolA === toolB && selA.value === selB.value) { alert('Cannot link an item to itself.'); return; }
      const labelA = selA.options[selA.selectedIndex]?.dataset.label || selA.options[selA.selectedIndex]?.text || '';
      const labelB = selB.options[selB.selectedIndex]?.dataset.label || selB.options[selB.selectedIndex]?.text || '';
      const relType = document.getElementById('nl-rel-type').value;
      HubLinks.addLink(
        { tool: toolA, itemId: selA.value, label: labelA },
        { tool: toolB, itemId: selB.value, label: labelB },
        { relType }
      );
      closeLinkModal();
    }

    // ── Node info panel ───────────────────────────────────────
    let _currentNodeId = null;

    function fetchNodeMeta(tool, itemId) {
      try {
        if (tool === 'project-hub') {
          const data = HubStorage.get('project-hub-v1') || {};
          for (const p of (data.projects || [])) {
            const t = (p.tasks || []).find(t => t.id === itemId);
            if (t) return [
              { k: 'Project', v: p.name || '—' },
              { k: 'Status',  v: t.status || '—' },
              { k: 'Priority',v: t.priority || '—' },
            ];
          }
        }
        if (tool === 'decision-hub') {
          const data = HubStorage.get('decision-hub-v1') || [];
          const d = data.find(d => d.id === itemId);
          if (d) return [
            { k: 'Type',       v: d.type || '—' },
            { k: 'Confidence', v: d.confidence != null ? d.confidence + '%' : '—' },
            { k: 'Status',     v: d.status || '—' },
          ];
        }
        if (tool === 'goals-hub') {
          const data = HubStorage.get('goals-hub-v1') || {};
          for (const q of (data.quarters || [])) {
            const o = (q.objectives || []).find(o => o.id === itemId);
            if (o) return [{ k: 'Quarter', v: q.label || '—' }];
          }
        }
        if (tool === 'risk-hub') {
          const data = HubStorage.get('risk-hub-v1') || {};
          const r = (data.risks || []).find(r => r.id === itemId);
          if (r) return [
            { k: 'Category', v: r.category || '—' },
            { k: 'Status',   v: r.status || '—' },
          ];
        }
        if (tool === 'tool-portfolio') {
          const data = HubStorage.get('tool-portfolio-v1') || [];
          const t = data.find(t => t.id === itemId);
          if (t) return [
            { k: 'Ring',     v: t.ring || '—' },
            { k: 'Status',   v: t.status || '—' },
            { k: 'Category', v: t.category || '—' },
          ];
        }
        if (tool === 'meetings-hub') {
          const data = HubStorage.get('meetings-hub-v1') || {};
          const m = (data.meetings || []).find(m => m.id === itemId);
          if (m) return [
            { k: 'Type',   v: m.type || '—' },
            { k: 'Date',   v: m.date || '—' },
            { k: 'Status', v: m.status || '—' },
          ];
        }
        if (tool === 'learning-hub') {
          const data = HubStorage.get('learning-hub-v1') || {};
          const it = (data.items || []).find(it => it.id === itemId);
          if (it) return [
            { k: 'Type',   v: it.type || '—' },
            { k: 'Status', v: it.status || '—' },
          ];
        }
        if (tool === 'stakeholder-hub') {
          const data = HubStorage.get('stakeholder-hub-v1') || {};
          const sh = (data.stakeholders || []).find(sh => sh.id === itemId);
          if (sh) return [
            { k: 'Role',       v: sh.role || '—' },
            { k: 'Engagement', v: sh.engagement || '—' },
          ];
        }
      } catch {}
      return [];
    }

    function showNodePanel(nodeId) {
      const node = nodesMap.get(nodeId);
      if (!node) return;
      _currentNodeId = nodeId;
      closeEdgePanel();

      document.getElementById('np-tool-tag').textContent = TOOL_LABELS[node.tool] || node.tool;
      document.getElementById('np-label').textContent = node.label;

      const meta = fetchNodeMeta(node.tool, node.itemId);
      document.getElementById('np-meta').innerHTML = meta
        .map(m => `<span class="np-meta-key">${m.k}:</span> ${m.v}`)
        .join('<br>');

      const openBtn = document.getElementById('np-open-btn');
      openBtn.textContent = `Open in ${TOOL_LABELS[node.tool] || node.tool}`;
      openBtn.onclick = () => HubLinks.navigateTo(node.tool, node.itemId);

      document.getElementById('np-link-btn').onclick = () => {
        closeNodePanel();
        openNewLinkModal({ side: 'a', tool: node.tool, itemId: node.itemId });
      };

      document.getElementById('node-panel').classList.add('visible');
    }

    function closeNodePanel() {
      document.getElementById('node-panel').classList.remove('visible');
      _currentNodeId = null;
    }

    // ── Right-click context menu ──────────────────────────────
    function dismissContextMenu() {
      const m = document.getElementById('graph-ctx-menu');
      m.style.display = 'none';
      m.innerHTML = '';
      document.removeEventListener('keydown', _ctxKeyHandler);
    }

    function _ctxKeyHandler(e) {
      if (e.key === 'Escape') dismissContextMenu();
    }

    function toggleToolVisibility(tool) {
      if (hiddenTools.has(tool)) {
        hiddenTools.delete(tool);
      } else {
        hiddenTools.add(tool);
      }
      // Sync filter chip
      const chip = document.querySelector(`.filter-chip[data-tool="${tool}"]`);
      if (chip) chip.classList.toggle('active', !hiddenTools.has(tool));
      applyLeaves();
    }

    function showContextMenu(clientX, clientY, node) {
      dismissContextMenu();
      const m = document.getElementById('graph-ctx-menu');
      const items = [];

      if (node) {
        const toolName = TOOL_LABELS[node.tool] || node.tool;
        items.push({ label: `Open in ${toolName}`, action: () => HubLinks.navigateTo(node.tool, node.itemId) });
        items.push({ label: 'Add link from here…', action: () => openNewLinkModal({ side: 'a', tool: node.tool, itemId: node.itemId }) });
        items.push({ sep: true });
        items.push({ label: `Hide ${toolName} nodes`, action: () => toggleToolVisibility(node.tool) });
      } else {
        items.push({ label: 'Fit to screen', action: fitGraph });
        items.push({ label: '+ New link', action: () => openNewLinkModal() });
      }

      m.innerHTML = items.map(it =>
        it.sep
          ? '<div class="ctx-sep"></div>'
          : `<button class="ctx-item">${it.label}</button>`
      ).join('');

      m.querySelectorAll('.ctx-item').forEach((btn, i) => {
        const actionItem = items.filter(it => !it.sep)[i];
        btn.onclick = () => { dismissContextMenu(); actionItem.action(); };
      });

      // Clamp to viewport
      const W = window.innerWidth, H = window.innerHeight;
      const x = clientX + 172 > W ? W - 176 : clientX + 2;
      const y = clientY + 140 > H ? H - 144 : clientY + 2;
      m.style.left = x + 'px';
      m.style.top  = y + 'px';
      m.style.display = 'block';

      document.addEventListener('mousedown', dismissContextMenu, { once: true });
      document.addEventListener('keydown', _ctxKeyHandler);
    }

    // ── Drag-to-connect ───────────────────────────────────────
    let _dlbTimer = null;

    function getNearbyNode(draggedId, domPos) {
      const offsets = [-22, 0, 22];
      for (const dx of offsets) {
        for (const dy of offsets) {
          if (dx === 0 && dy === 0) continue;
          const id = network.getNodeAt({ x: domPos.x + dx, y: domPos.y + dy });
          if (id && id !== draggedId) return id;
        }
      }
      return null;
    }

    function _hideDragBanner() {
      clearTimeout(_dlbTimer);
      const b = document.getElementById('drag-link-banner');
      b.classList.remove('visible');
    }

    function showDragLinkPrompt(idA, idB) {
      const nA = nodesMap.get(idA), nB = nodesMap.get(idB);
      if (!nA || !nB) return;
      _hideDragBanner();
      const banner = document.getElementById('drag-link-banner');
      document.getElementById('dlb-text').textContent =
        `Link "${nA.label.slice(0,22)}" ↔ "${nB.label.slice(0,22)}"?`;
      document.getElementById('dlb-yes').onclick = () => { _hideDragBanner(); _confirmDragLink(idA, idB); };
      document.getElementById('dlb-no').onclick  = _hideDragBanner;
      banner.classList.add('visible');
      _dlbTimer = setTimeout(_hideDragBanner, 6000);
    }

    function _confirmDragLink(idA, idB) {
      const nA = nodesMap.get(idA), nB = nodesMap.get(idB);
      if (!nA || !nB) return;
      HubLinks.addLink(
        { tool: nA.tool, itemId: nA.itemId, label: nA.label },
        { tool: nB.tool, itemId: nB.itemId, label: nB.label }
      );
      showToast('Link created');
    }

    // ── Node search ───────────────────────────────────────────
    function searchNodes(q) {
      if (!nodesDS) return;
      q = (q || '').toLowerCase().trim();
      if (!q) { clearNodeSearch(); return; }
      const matches = [];
      nodesMap.forEach((node, id) => {
        if (node.label.toLowerCase().includes(q) || (TOOL_LABELS[node.tool] || node.tool).toLowerCase().includes(q))
          matches.push(id);
      });
      const updates = [];
      nodesMap.forEach((_, id) => updates.push({ id, opacity: matches.includes(id) ? 1 : 0.12 }));
      nodesDS.update(updates);
      if (matches.length && network) {
        network.selectNodes(matches);
        network.fit({ nodes: matches, animation: { duration: 350, easingFunction: 'easeInOutQuad' } });
      }
      document.getElementById('graph-search-clear').style.display = '';
    }

    function clearNodeSearch() {
      const inp = document.getElementById('graph-search');
      if (inp) inp.value = '';
      document.getElementById('graph-search-clear').style.display = 'none';
      if (!nodesDS) return;
      const updates = [];
      nodesMap.forEach((_, id) => updates.push({ id, opacity: 1 }));
      nodesDS.update(updates);
      if (network) network.unselectAll();
    }

    // ── Neighbour highlight ───────────────────────────────────
    function applyNeighbourHighlight(nodeId) {
      if (!nodesDS || !edgesDS) return;
      const neighbors = new Set([nodeId]);
      edgesDS.forEach(e => {
        if (e.from === nodeId) neighbors.add(e.to);
        if (e.to === nodeId)   neighbors.add(e.from);
      });
      const updates = [];
      nodesMap.forEach((_, id) => updates.push({ id, opacity: neighbors.has(id) ? 1 : 0.12 }));
      nodesDS.update(updates);
    }

    function clearNeighbourHighlight() {
      if (!nodesDS) return;
      const inp = document.getElementById('graph-search');
      if (inp && inp.value.trim()) { searchNodes(inp.value); return; }
      const updates = [];
      nodesMap.forEach((_, id) => updates.push({ id, opacity: 1 }));
      nodesDS.update(updates);
    }

    // ── Keyboard shortcuts ────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      if (e.key === 'f' || e.key === 'F') { e.preventDefault(); fitGraph(); }
      if (e.key === 'n' || e.key === 'N') { e.preventDefault(); openNewLinkModal(); }
      if (e.key === 'Escape') {
        closeEdgePanel();
        closeNodePanel();
        clearNodeSearch();
        dismissContextMenu();
      }
      if (e.key === '/') {
        e.preventDefault();
        const inp = document.getElementById('graph-search');
        if (inp) inp.focus();
      }
    });

    buildGraph();
    ['hub-links-v1','project-hub-v1','decision-hub-v1','risk-hub-v1','goals-hub-v1','meetings-hub-v1',
     'learning-hub-v1','stakeholder-hub-v1']
      .forEach(k => HubStorage.subscribe(k, buildGraph));
    window.__hl_onLinkChange = buildGraph;

    window.addEventListener('message', e => {
      if (e.origin !== window.location.origin) return;
      if (e.data?.type === 'hub-theme') {
        document.documentElement.setAttribute('data-theme', e.data.theme);
        buildGraph();
      }
    });
  </script>
  <div id="graph-ctx-menu" style="display:none"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      HubBootstrap.start('graph-hub');
    });
  </script>
</body>

</html>
