<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Hub</title>
  <script src="hub-storage.js"></script>
  <script src="hub-utils.js"></script>
  <script src="hub-links.js"></script>
  <script src="hub-data.js"></script>
  <script src="hub-toast.js"></script>
  <script src="hub-bootstrap.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }
    body { display: flex; flex-direction: column; }

    /* ── Warm library palette ── */
    :root {
      --_lh-amber:          rgba(251, 191, 36, 0.65);
      --_lh-hl-bg:          rgba(251, 191, 36, 0.07);
      --_lh-hl-border:      rgba(251, 191, 36, 0.55);
      --_lh-insight-bg:     rgba(251, 191, 36, 0.04);
      --_lh-insight-border: rgba(251, 191, 36, 0.22);
      --_lh-reading-dot:    #fbbf24;
      --_lh-detail-warm:    rgba(251, 191, 36, 0.025);
    }
    [data-theme="light"] {
      --_lh-amber:          rgba(180, 120, 0, 0.7);
      --_lh-hl-bg:          rgba(251, 191, 36, 0.1);
      --_lh-hl-border:      rgba(180, 120, 0, 0.5);
      --_lh-insight-bg:     rgba(255, 251, 235, 0.8);
      --_lh-insight-border: rgba(180, 120, 0, 0.25);
      --_lh-reading-dot:    #b45309;
      --_lh-detail-warm:    rgba(251, 191, 36, 0.05);
    }

    /* ── Topbar ── */
    .topbar {
      height: 54px; display: flex; align-items: center; gap: 10px;
      padding: 0 20px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; background: var(--surface);
    }
    .logo-mark {
      width: 26px; height: 26px; border-radius: 7px; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: #111; font-family: var(--font-display); flex-shrink: 0;
    }
    .logo-text { font-family: var(--font-display); font-size: 13.5px; font-weight: 800; }
    .topbar-spacer { flex: 1; }

    /* ── Body ── */
    .body-wrap { flex: 1; display: flex; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px; min-width: 280px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; background: var(--surface); overflow: hidden;
    }
    .sidebar-filters { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 7px; flex-shrink: 0; }
    .search-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 6px 10px; color: var(--text); font-family: var(--font-body); font-size: 12.5px; outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .filter-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .f-chip {
      padding: 3px 10px; border-radius: 999px; border: 1px solid var(--border);
      background: transparent; color: var(--text3); font-size: 11px; cursor: pointer;
      transition: all 0.12s; font-family: var(--font-body);
    }
    .f-chip:hover { border-color: var(--accent-glow); color: var(--text2); }
    .f-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .sidebar-list { flex: 1; overflow-y: auto; }
    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .list-item {
      padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background 0.1s; display: flex; gap: 9px; align-items: flex-start;
    }
    .list-item:hover { background: var(--surface2); }
    .list-item.active { background: var(--surface2); border-left: 3px solid var(--accent); padding-left: 11px; }
    .li-type-badge {
      font-size: 9.5px; font-family: var(--font-mono); font-weight: 700; text-transform: uppercase;
      padding: 2px 5px; border-radius: 4px; flex-shrink: 0; margin-top: 2px;
    }
    .li-type-badge.book { background: rgba(251,191,36,0.15); color: var(--_lh-reading-dot); }
    .li-type-badge.article { background: rgba(16,185,129,0.15); color: #34d399; }
    .li-type-badge.course { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .li-type-badge.video { background: rgba(239,68,68,0.15); color: #f87171; }
    .li-body { flex: 1; min-width: 0; }
    .li-title { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .li-author { font-size: 11px; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .li-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .li-status-dot.to-read { background: var(--text3); }
    .li-status-dot.reading { background: var(--_lh-reading-dot); box-shadow: 0 0 5px var(--_lh-reading-dot); }
    .li-status-dot.done { background: var(--accent-like); }

    .sidebar-add-btn {
      padding: 12px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
    }

    /* ── Detail panel ── */
    .detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .detail-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--text3); gap: 8px;
    }
    .detail-empty-icon { font-size: 28px; opacity: 0.35; }
    .detail-empty-text { font-size: 13px; }

    .detail-header {
      padding: 14px 20px 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 12px; flex-shrink: 0;
    }
    .detail-title-wrap { flex: 1; min-width: 0; }
    .detail-title { font-family: var(--font-display); font-size: 17px; font-weight: 800; line-height: 1.25; }
    .detail-author { font-size: 12px; color: var(--text3); margin-top: 3px; }
    .detail-meta-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .type-pill {
      font-size: 10px; font-weight: 700; text-transform: uppercase; font-family: var(--font-mono);
      padding: 2px 7px; border-radius: 4px;
    }
    .type-pill.book { background: rgba(251,191,36,0.15); color: var(--_lh-reading-dot); }
    .type-pill.article { background: rgba(16,185,129,0.15); color: #34d399; }
    .type-pill.course { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .type-pill.video { background: rgba(239,68,68,0.15); color: #f87171; }
    .status-select {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm);
      color: var(--text); font-size: 11.5px; padding: 3px 8px; cursor: pointer; outline: none;
      font-family: var(--font-body);
    }
    .status-select:focus { border-color: var(--accent); }
    .url-link { font-size: 11.5px; color: var(--accent); text-decoration: none; font-family: var(--font-mono); }
    .url-link:hover { text-decoration: underline; }
    .tag-wrap { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
    .tag-pill {
      font-size: 10.5px; padding: 2px 7px; border-radius: 999px; background: var(--surface2);
      border: 1px solid var(--border); color: var(--text3); cursor: pointer;
    }
    .tag-pill:hover { border-color: var(--accent-nope); color: var(--accent-nope); }
    .tag-add-input {
      font-size: 11px; background: transparent; border: 1px dashed var(--border); border-radius: 999px;
      color: var(--text); padding: 2px 7px; outline: none; width: 80px; font-family: var(--font-body);
    }
    .tag-add-input:focus { border-color: var(--accent); }
    .detail-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }
    .detail-body::-webkit-scrollbar { width: 4px; }
    .detail-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .section-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }

    /* ── Highlights ── */
    .highlight-list { display: flex; flex-direction: column; gap: 6px; }
    .highlight-item {
      background: var(--_lh-hl-bg); border-left: 3px solid var(--_lh-hl-border); border-radius: 0 var(--r-sm) var(--r-sm) 0;
      padding: 8px 12px; display: flex; gap: 8px; align-items: flex-start;
    }
    .highlight-text { flex: 1; font-size: 13px; color: var(--text); line-height: 1.45; }
    .highlight-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .hl-btn {
      background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px;
      padding: 1px 3px; transition: color 0.12s;
    }
    .hl-btn:hover { color: var(--text); }
    .hl-btn.send:hover { color: var(--accent); }
    .hl-btn.del:hover { color: var(--accent-nope); }
    .add-highlight-row { display: flex; gap: 6px; }
    .add-highlight-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 7px 10px; color: var(--text); font-family: var(--font-body); font-size: 13px; outline: none;
    }
    .add-highlight-input:focus { border-color: var(--accent); }

    /* ── Notes ── */
    .notes-textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 10px 12px; color: var(--text); font-family: var(--font-body); font-size: 13px;
      outline: none; resize: vertical; min-height: 100px; transition: border-color 0.15s;
    }
    .notes-textarea:focus { border-color: var(--accent); }

    /* ── Key Insight — parchment feel ── */
    #key-insight-textarea {
      background: var(--_lh-insight-bg);
      border-color: var(--_lh-insight-border);
      font-style: italic;
    }
    #key-insight-textarea:focus { border-color: var(--_lh-amber); }

    /* ── Detail body — warm reading tint ── */
    .detail-body { background: var(--_lh-detail-warm); }

    /* ── Add/Edit modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border2); border-radius: var(--r);
      width: 480px; max-width: 94vw; display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .modal-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .modal-title { font-family: var(--font-display); font-size: 14px; font-weight: 800; flex: 1; }
    .modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
    .field-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
    .field-input, .field-select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 8px 10px; color: var(--text);
      font-family: var(--font-body); font-size: 13px; outline: none; transition: border-color 0.15s;
    }
    .field-input:focus, .field-select:focus { border-color: var(--accent); }
    .modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .modal-footer .spacer { flex: 1; }

    /* ── Progress ── */
    .li-progress-bar { height: 3px; background: var(--surface2); border-radius: 2px; margin-top: 4px; overflow: hidden; }
    .li-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
    .progress-row { display: flex; align-items: center; gap: 8px; }
    .progress-num-input {
      width: 54px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm);
      color: var(--text); font-family: var(--font-mono); font-size: 12px; padding: 3px 7px; outline: none; text-align: right;
    }
    .progress-num-input:focus { border-color: var(--accent); }
    .progress-pct { font-size: 11px; color: var(--text3); font-family: var(--font-mono); }
    .progress-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; cursor: pointer; }
    .progress-fill-det { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.2s; }

    /* ── Drag ── */
    .lh-drag-handle { color: var(--text3); font-size: 11px; flex-shrink: 0; opacity: 0; transition: opacity 0.1s; user-select: none; cursor: grab; padding: 2px 1px; align-self: center; }
    .list-item:hover .lh-drag-handle { opacity: 1; }
    .list-item.lh-drag-src { opacity: 0.35 !important; }
    .lh-drop-line { height: 2px; background: var(--accent); border-radius: 2px; pointer-events: none; margin: 0; }

    /* ── Link badge ── */
    .li-link-badge { font-size: 10px; padding: 1px 5px; border-radius: 4px; background: var(--surface2); color: var(--text3); font-family: var(--font-mono); }
    .link-hub-btn { font-size: 11px; padding: 5px 8px; border: 1px solid var(--border); border-radius: var(--r-sm); background: none; color: var(--text3); cursor: pointer; transition: all 0.12s; }
    .link-hub-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Owned badge ── */
    .owned-badge { font-size: 9px; font-family: var(--font-mono); font-weight: 700; text-transform: uppercase; padding: 1px 6px; border-radius: 3px; cursor: pointer; transition: all 0.12s; user-select: none; }
    .owned-badge.owned { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
    .owned-badge.wishlist { background: var(--surface2); color: var(--text3); border: 1px dashed var(--border); }
    .owned-badge:hover { opacity: 0.75; }

    /* ── Notes sections (flex-grow to fill panel) ── */
    .detail-body { display: grid !important; grid-template-rows: auto 1fr 1fr; align-items: stretch; }
    .notes-section { display: flex; flex-direction: column; min-height: 130px; }
    .notes-section .notes-textarea { flex: 1; resize: none; min-height: 80px; }

    /* ── Bookshelf view ── */
    #shelf-view { flex: 1; overflow-y: auto; padding: 32px 40px 64px; background: var(--bg); }
    #shelf-view::-webkit-scrollbar { width: 5px; }
    #shelf-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .shelf-section { margin-bottom: 28px; }
    .shelf-books-row { display: flex; align-items: flex-end; gap: 5px; padding: 4px 20px 0; min-height: 200px; }
    .shelf-board { height: 14px; border-radius: 2px; background: linear-gradient(to bottom, rgba(180,120,0,0.55) 0%, rgba(100,60,0,0.3) 100%); box-shadow: 0 5px 14px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,200,80,0.25); }
    .shelf-shadow { height: 7px; background: linear-gradient(to bottom, rgba(0,0,0,0.14), transparent); }
    .book-spine {
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);
      border-radius: 3px 3px 0 0; cursor: pointer; flex-shrink: 0;
      transition: transform 0.2s cubic-bezier(.2,0,.2,1.6), box-shadow 0.2s;
      overflow: hidden; position: relative; padding: 8px 5px;
    }
    .book-spine:hover { transform: rotate(180deg) translateY(10px); box-shadow: -3px -8px 20px rgba(0,0,0,0.4); z-index: 3; }
    .book-spine.wishlist-spine { opacity: 0.45; filter: saturate(0.5); outline: 2px dashed rgba(255,255,255,0.25); outline-offset: -3px; }
    .spine-title { font-size: 10px; font-weight: 700; font-family: var(--font-display); letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .spine-author { font-size: 8px; opacity: 0.65; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 6px; }
    .shelf-popup {
      position: absolute; bottom: calc(100% + 12px); left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r);
      padding: 12px 14px; min-width: 190px; max-width: 250px; z-index: 50;
      box-shadow: 0 8px 28px rgba(0,0,0,0.4); pointer-events: all;
    }
    .shelf-empty { padding: 80px 32px; text-align: center; color: var(--text3); font-size: 13px; }

    /* ── Type-specific spine shapes ── */
    /* Articles: dog-ear corner → reads as a printed page/document */
    .book-spine.type-article {
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 11px), calc(100% - 11px) 100%, 0 100%);
    }
    /* Courses: disc ring → DVD / badge / certification */
    .spine-disc {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.38);
      background: rgba(255,255,255,0.07);
      flex-shrink: 0; margin-top: 6px;
    }
    /* Videos: play indicator */
    .spine-play {
      font-size: 10px; opacity: 0.55; flex-shrink: 0; margin-top: 6px; letter-spacing: 0;
    }

    /* ── Mobile drawer ──────────────────────────────────────────── */
    .sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 99; }
    .sidebar-backdrop.open { display: block; }
    .mob-nav-btn { display: none; background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 18px; padding: 6px 8px; border-radius: var(--r-sm); flex-shrink: 0; line-height: 1; transition: background 0.1s; }
    .mob-nav-btn:hover { background: var(--surface2); }

    @media (max-width: 640px) {
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0; height: 100%;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.22s cubic-bezier(.4,0,.2,1);
        box-shadow: 6px 0 32px rgba(0,0,0,0.45);
        width: 260px; min-width: 260px;
      }
      .sidebar.open { transform: translateX(0); }
      .mob-nav-btn { display: flex; align-items: center; }
      .topbar { padding: 0 8px; gap: 8px; }
    }
  </style>
</head>
<body>
<div class="sidebar-backdrop" id="lrn-backdrop" onclick="closeSidebar()"></div>

<div class="topbar">
  <button class="mob-nav-btn" onclick="toggleSidebar()" aria-label="Open filter panel">☰</button>
  <div class="logo-mark">◈</div>
  <div class="logo-text">Learning Hub</div>
  <div class="topbar-spacer"></div>
  <button class="btn btn-ghost" id="view-toggle-btn" onclick="toggleView()" style="font-size:12px;padding:5px 12px" title="Switch view">📚 Shelf</button>
  <button class="btn btn-primary" onclick="openAddModal(null)" style="font-size:12px;padding:6px 14px">+ Add item</button>
</div>

<div class="body-wrap" id="body-wrap">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-filters">
      <input class="search-input" id="search-input" placeholder="Search…" oninput="renderList()">
      <div class="filter-row" id="status-filters">
        <button class="f-chip active" data-status="all" onclick="setStatusFilter('all')">All</button>
        <button class="f-chip" data-status="to-read" onclick="setStatusFilter('to-read')">To Start</button>
        <button class="f-chip" data-status="reading" onclick="setStatusFilter('reading')">In Progress</button>
        <button class="f-chip" data-status="done" onclick="setStatusFilter('done')">Completed</button>
      </div>
      <div class="filter-row" id="type-filters">
        <button class="f-chip active" data-type="all" onclick="setTypeFilter('all')">All types</button>
        <button class="f-chip" data-type="book" onclick="setTypeFilter('book')">Books</button>
        <button class="f-chip" data-type="article" onclick="setTypeFilter('article')">Articles</button>
        <button class="f-chip" data-type="course" onclick="setTypeFilter('course')">Courses</button>
        <button class="f-chip" data-type="video" onclick="setTypeFilter('video')">Videos</button>
      </div>
      <div class="filter-row" id="owned-filters">
        <button class="f-chip active" data-owned="all" onclick="setOwnedFilter('all')">All</button>
        <button class="f-chip" data-owned="owned" onclick="setOwnedFilter('owned')">📚 Owned</button>
        <button class="f-chip" data-owned="wishlist" onclick="setOwnedFilter('wishlist')">📌 Wishlist</button>
      </div>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
    <div class="sidebar-add-btn" style="display:flex;gap:6px">
      <button class="btn btn-ghost" onclick="openAddModal(null)" style="flex:1;font-size:12px">+ Add item</button>
      <button class="btn btn-ghost" id="show-archived-btn" onclick="toggleShowArchived()" style="font-size:11px;padding:4px 8px" title="Show archived">📦</button>
    </div>
  </aside>

  <!-- Detail -->
  <div class="detail" id="detail">
    <div class="detail-empty" id="detail-empty">
      <div class="detail-empty-icon">◈</div>
      <div class="detail-empty-text">Select an item to view details</div>
    </div>
    <div id="detail-content" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden">
    </div>
  </div>
</div>

<!-- Bookshelf view -->
<div id="shelf-view" style="display:none"></div>

<!-- Add/Edit modal -->
<div class="modal-overlay" id="add-modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="add-modal-title">Add Item</div>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="field-label">Title *</div>
        <input class="field-input" id="am-title" placeholder="Book / article / course title" />
      </div>
      <div>
        <div class="field-label">Author / Source</div>
        <input class="field-input" id="am-author" placeholder="Author or publisher" />
      </div>
      <div>
        <div class="field-label">Type</div>
        <select class="field-select" id="am-type">
          <option value="book">Book</option>
          <option value="article">Article</option>
          <option value="course">Course</option>
          <option value="video">Video</option>
        </select>
      </div>
      <div>
        <div class="field-label">Status</div>
        <select class="field-select" id="am-status">
          <option value="to-read">To Start</option>
          <option value="reading">In Progress</option>
          <option value="done">Completed</option>
        </select>
      </div>
      <div>
        <div class="field-label">Platform / Publisher <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></div>
        <input class="field-input" id="am-platform" placeholder="e.g. Coursera, O'Reilly, YouTube…" />
      </div>
      <div>
        <div class="field-label">URL (optional)</div>
        <input class="field-input" id="am-url" placeholder="https://…" type="url" />
      </div>
      <label style="display:flex;align-items:center;gap:9px;font-size:13px;cursor:pointer;color:var(--text2)">
        <input type="checkbox" id="am-owned" style="accent-color:var(--accent);width:14px;height:14px">
        <span>📚 I own this / in my library</span>
        <span style="font-size:11px;color:var(--text3)">(unchecked = 📌 Wishlist)</span>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveItem()">Save</button>
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <div class="spacer"></div>
      <button class="btn btn-ghost" id="am-archive-btn" onclick="archiveCurrentItem()" style="display:none">📦 Archive</button>
      <button class="btn btn-danger" id="am-delete-btn" onclick="deleteItem()" style="display:none">Delete</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'learning-hub-v1';

  const STATUS_CONFIG = {
    'to-read': { label: 'To Start',    dot: 'to-read' },
    'reading': { label: 'In Progress', dot: 'reading' },
    'done':    { label: 'Completed',   dot: 'done'    },
  };

  const TYPE_ICON = { book: '📖', article: '📄', course: '🎓', video: '▶' };

  const SPINE_PALETTES = {
    book:    [['#c9903e','#1a0e00'],['#b87333','#fff8f0'],['#8b5e14','#fef9ec'],['#e8c14a','#2d1800'],['#6b4c1e','#fef3c7'],['#d4a053','#1e0800']],
    article: [['#1b5e40','#d1fae5'],['#0d4f33','#a7f3d0'],['#2d7a56','#ecfdf5'],['#3d8b6b','#022c22'],['#145741','#ccfbf1']],
    course:  [['#1e3a8a','#dbeafe'],['#5b21b6','#ede9fe'],['#0369a1','#e0f2fe'],['#1e40af','#bfdbfe'],['#374151','#f3f4f6']],
    video:   [['#881337','#ffe4e6'],['#9f1239','#fce7f3'],['#7f1d1d','#fee2e2'],['#be123c','#fff1f2'],['#b91c1c','#fecaca']],
  };

  let data = { items: [] };
  let activeId = null;
  let editingId = null;
  let showArchived = false;
  let statusFilter = 'all';
  let typeFilter = 'all';
  let ownedFilter = 'all';
  let viewMode = 'list';

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
  function _esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function load() {
    data = HubStorage.get(STORAGE_KEY) || { items: [] };
    if (!data.items) data.items = [];
    // Normalize missing fields
    data.items.forEach(it => {
      if (it.progress === undefined) it.progress = it.status === 'done' ? 100 : 0;
      if (!it.platform) it.platform = '';
      if (it.owned === undefined) it.owned = false;
    });
  }
  function save() { HubStorage.set(STORAGE_KEY, data); }

  // ── Filters ──────────────────────────────────────────────────────────────────

  function setStatusFilter(f) {
    statusFilter = f;
    document.querySelectorAll('#status-filters .f-chip').forEach(c => c.classList.toggle('active', c.dataset.status === f));
    renderList();
  }
  function setTypeFilter(f) {
    typeFilter = f;
    document.querySelectorAll('#type-filters .f-chip').forEach(c => c.classList.toggle('active', c.dataset.type === f));
    renderList();
  }
  function setOwnedFilter(f) {
    ownedFilter = f;
    document.querySelectorAll('#owned-filters .f-chip').forEach(c => c.classList.toggle('active', c.dataset.owned === f));
    renderList();
  }

  function filteredItems() {
    const q = document.getElementById('search-input')?.value.trim().toLowerCase() || '';
    const archivedCount = (data.items||[]).filter(it => it.archived).length;
    const archBtn = document.getElementById('show-archived-btn');
    if (archBtn) archBtn.textContent = showArchived ? '← Active' : `📦 (${archivedCount})`;
    // Preserve user-defined array order; no automatic status sort
    return data.items.filter(it => {
      if (showArchived ? !it.archived : it.archived) return false;
      if (statusFilter !== 'all' && it.status !== statusFilter) return false;
      if (typeFilter !== 'all' && it.type !== typeFilter) return false;
      if (ownedFilter === 'owned' && !it.owned) return false;
      if (ownedFilter === 'wishlist' && it.owned) return false;
      if (q && !it.title.toLowerCase().includes(q) && !(it.author||'').toLowerCase().includes(q) && !(it.tags||[]).join(' ').toLowerCase().includes(q)) return false;
      return true;
    });
  }

  // ── Sidebar list ─────────────────────────────────────────────────────────────

  function renderList() {
    const list = document.getElementById('sidebar-list');
    const items = filteredItems();
    if (!items.length) {
      const allEmpty = !data.items || !data.items.length;
      list.innerHTML = `<div class="empty-state"><span class="e-icon">◑</span><div class="e-title">${allEmpty ? 'Nothing logged yet' : 'No items found'}</div><div class="e-sub">${allEmpty ? 'Add a book, article, or course to start.' : 'Try adjusting your filters.'}</div></div>`;
      return;
    }
    list.innerHTML = items.map(it => {
      const pct = it.progress || 0;
      const linkCount = (typeof HubLinks !== 'undefined') ? HubLinks.getLinksFor('learning-hub', it.id).length : 0;
      return `<div class="list-item${it.id === activeId ? ' active' : ''}" draggable="true" data-drag-id="${it.id}" onclick="openDetail('${it.id}')">
        <span class="lh-drag-handle">⠿</span>
        <div class="li-type-badge ${it.type}">${it.type}</div>
        <div class="li-body">
          <div class="li-title">${_esc(it.title)}</div>
          ${it.author ? `<div class="li-author">${_esc(it.author)}</div>` : ''}
          ${pct > 0 ? `<div class="li-progress-bar"><div class="li-progress-fill" style="width:${pct}%"></div></div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
          <div class="li-status-dot ${it.status}" title="${STATUS_CONFIG[it.status]?.label || it.status}"></div>
          <span style="font-size:9px" title="${it.owned ? 'Owned' : 'Wishlist'}">${it.owned ? '📚' : '📌'}</span>
          ${linkCount ? `<span class="li-link-badge">🔗${linkCount}</span>` : ''}
        </div>
      </div>`;
    }).join('');
    initLHDrag(list);
  }

  // ── Detail ───────────────────────────────────────────────────────────────────

  function toggleSidebar() {
    const s = document.querySelector('.sidebar');
    const b = document.getElementById('lrn-backdrop');
    b.classList.toggle('open', s.classList.toggle('open'));
  }
  function closeSidebar() {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('lrn-backdrop').classList.remove('open');
  }

  function openDetail(id) {
    closeSidebar();
    activeId = id;
    renderList();
    renderDetail();
  }

  function renderDetail() {
    const item = data.items.find(it => it.id === activeId);
    const empty = document.getElementById('detail-empty');
    const content = document.getElementById('detail-content');

    if (!item) { empty.style.display = 'flex'; content.style.display = 'none'; return; }
    empty.style.display = 'none';
    content.style.display = 'flex';

    const tags = (item.tags || []).map(t =>
      `<span class="tag-pill" onclick="removeTag('${_esc(t)}')" title="Remove">${_esc(t)} ✕</span>`
    ).join('');

    const highlights = (item.highlights || []).map(h => `<div class="highlight-item" id="hl-${h.id}">
      <div class="highlight-text">${_esc(h.text)}</div>
      <div class="highlight-actions">
        <button class="hl-btn send" onclick="sendToSwiper('${h.id}')" title="Send to Idea Swiper">→ Swiper</button>
        <button class="hl-btn del" onclick="removeHighlight('${h.id}')" title="Delete">✕</button>
      </div>
    </div>`).join('');

    const pct = item.progress || 0;
    content.innerHTML = `
      <div class="detail-header">
        <div class="detail-title-wrap">
          <div class="detail-title">${_esc(item.title)}</div>
          ${item.author ? `<div class="detail-author">${_esc(item.author)}${item.platform ? ` · <span style="color:var(--text3)">${_esc(item.platform)}</span>` : ''}</div>` : (item.platform ? `<div class="detail-author" style="color:var(--text3)">${_esc(item.platform)}</div>` : '')}
          <div class="detail-meta-row">
            <span class="type-pill ${item.type}">${TYPE_ICON[item.type] || ''} ${item.type}</span>
            <select class="status-select" onchange="updateStatus(this.value)">
              ${Object.entries(STATUS_CONFIG).map(([v,c]) =>
                `<option value="${v}"${item.status===v?' selected':''}>${c.label}</option>`
              ).join('')}
            </select>
            <span class="owned-badge ${item.owned ? 'owned' : 'wishlist'}" onclick="toggleOwned()" title="Click to toggle">${item.owned ? '📚 Owned' : '📌 Wishlist'}</span>
            ${item.url ? `<a class="url-link" href="${_esc(item.url)}" target="_blank" rel="noopener">↗ Open</a>` : ''}
          </div>
          <div class="detail-meta-row" style="margin-top:5px">
            <div class="progress-row" style="width:100%">
              <span style="font-size:10px;color:var(--text3);font-family:var(--font-mono);white-space:nowrap">Progress</span>
              <input class="progress-num-input" id="progress-input" type="number" min="0" max="100" value="${pct}"
                onchange="updateProgress(this.value)" title="Progress %">
              <span class="progress-pct">%</span>
              <div class="progress-track" onclick="progressTrackClick(event, this)">
                <div class="progress-fill-det" id="progress-fill-det" style="width:${pct}%"></div>
              </div>
            </div>
          </div>
          <div class="detail-meta-row" style="margin-top:6px">
            <div class="tag-wrap">
              ${tags}
              <input class="tag-add-input" id="tag-input" placeholder="+ tag" onkeydown="handleTagKey(event)">
            </div>
          </div>
        </div>
        <div class="detail-actions">
          <button class="link-hub-btn" onclick="openLinksModal()" title="Link to other items">🔗</button>
          <button class="btn btn-ghost" onclick="openAddModal('${item.id}')" style="font-size:12px;padding:5px 10px">Edit</button>
        </div>
      </div>
      <div class="detail-body">
        <div>
          <div class="section-label">Highlights & Key Insights</div>
          <div class="highlight-list" id="highlight-list">${highlights}</div>
          <div class="add-highlight-row" style="margin-top:6px">
            <input class="add-highlight-input" id="hl-input" placeholder="Add a highlight or key insight…" onkeydown="handleHLKey(event)">
            <button class="btn btn-ghost" onclick="addHighlight()" style="font-size:12px;padding:6px 10px">Add</button>
          </div>
        </div>
        <div class="notes-section">
          <div class="section-label">Notes</div>
          <textarea class="notes-textarea" id="notes-textarea" placeholder="Personal notes, reflections, to-do from reading…" onblur="saveNotes()">${_esc(item.notes||'')}</textarea>
        </div>
        <div class="notes-section">
          <div class="section-label">Key Insight <span style="font-size:10px;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0">— Feynman: explain it simply</span></div>
          <textarea class="notes-textarea" id="key-insight-textarea"
            placeholder="Explain the core idea as if teaching someone with no background here. Avoid jargon. Use a concrete analogy if possible. If you can't explain it simply, you don't understand it yet."
            onblur="saveKeyInsight()">${_esc(item.keyInsight||'')}</textarea>
        </div>
      </div>`;
  }

  function updateStatus(val) {
    const item = data.items.find(it => it.id === activeId); if (!item) return;
    item.status = val;
    if (val === 'done') { item.completedAt = new Date().toISOString(); item.progress = 100; }
    else if (val === 'to-read') { item.progress = 0; }
    save(); renderList();
    // Sync progress UI without full re-render
    const inp = document.getElementById('progress-input');
    const fill = document.getElementById('progress-fill-det');
    if (inp) inp.value = item.progress;
    if (fill) fill.style.width = item.progress + '%';
  }

  function updateProgress(val) {
    const item = data.items.find(it => it.id === activeId); if (!item) return;
    const pct = Math.max(0, Math.min(100, parseInt(val) || 0));
    item.progress = pct;
    if (pct === 100 && item.status !== 'done') { item.status = 'done'; item.completedAt = new Date().toISOString(); }
    else if (pct > 0 && pct < 100 && item.status === 'to-read') { item.status = 'reading'; }
    else if (pct === 0 && item.status === 'reading') { item.status = 'to-read'; }
    save(); renderList();
    const fill = document.getElementById('progress-fill-det');
    if (fill) fill.style.width = pct + '%';
    const sel = document.querySelector('.status-select');
    if (sel) sel.value = item.status;
    const inp = document.getElementById('progress-input');
    if (inp) inp.value = pct;
  }

  function progressTrackClick(e, track) {
    const rect = track.getBoundingClientRect();
    const pct = Math.round(((e.clientX - rect.left) / rect.width) * 100);
    updateProgress(pct);
  }

  function openLinksModal() {
    const item = data.items.find(it => it.id === activeId); if (!item) return;
    if (typeof HubLinks !== 'undefined') HubLinks.openModal('learning-hub', item.id, item.title || 'Untitled');
  }

  function saveNotes() {
    const item = data.items.find(it => it.id === activeId);
    const ta = document.getElementById('notes-textarea');
    if (item && ta) { item.notes = ta.value; save(); }
  }

  function saveKeyInsight() {
    const item = data.items.find(it => it.id === activeId);
    const ta = document.getElementById('key-insight-textarea');
    if (item && ta) { item.keyInsight = ta.value; save(); }
  }

  // ── Tags ─────────────────────────────────────────────────────────────────────

  function handleTagKey(e) {
    if (e.key !== 'Enter') return;
    const inp = document.getElementById('tag-input');
    const tag = inp.value.trim();
    if (!tag) return;
    const item = data.items.find(it => it.id === activeId);
    if (!item) return;
    if (!item.tags) item.tags = [];
    if (!item.tags.includes(tag)) { item.tags.push(tag); save(); renderDetail(); }
    inp.value = '';
  }

  function removeTag(tag) {
    const item = data.items.find(it => it.id === activeId);
    if (!item) return;
    item.tags = (item.tags||[]).filter(t => t !== tag);
    save(); renderDetail();
  }

  // ── Highlights ───────────────────────────────────────────────────────────────

  function handleHLKey(e) { if (e.key === 'Enter') addHighlight(); }

  function addHighlight() {
    const inp = document.getElementById('hl-input');
    const text = inp.value.trim();
    if (!text) return;
    const item = data.items.find(it => it.id === activeId);
    if (!item) return;
    if (!item.highlights) item.highlights = [];
    item.highlights.push({ id: uid(), text, createdAt: new Date().toISOString() });
    save(); inp.value = ''; renderDetail();
  }

  function removeHighlight(hlId) {
    const item = data.items.find(it => it.id === activeId);
    if (!item) return;
    item.highlights = (item.highlights||[]).filter(h => h.id !== hlId);
    save(); renderDetail();
  }

  function sendToSwiper(hlId) {
    const item = data.items.find(it => it.id === activeId);
    if (!item) return;
    const hl = (item.highlights||[]).find(h => h.id === hlId);
    if (!hl) return;
    const swRaw = HubStorage.get('ideaswipe_history_v6');
    let swData = { ideas: [] };
    if (swRaw) { try { swData = typeof swRaw === 'string' ? JSON.parse(swRaw) : swRaw; } catch {} }
    if (!swData.ideas) swData.ideas = [];
    swData.ideas.push({
      id: uid(), text: hl.text, source: `Learning: ${item.title}`,
      status: 'pending', createdAt: new Date().toISOString()
    });
    HubStorage.set('ideaswipe_history_v6', swData);
    if (typeof HubLinks !== 'undefined' && HubLinks.toast) {
      HubLinks.toast('Sent to Idea Swiper');
    }
  }

  // ── Add/Edit modal ───────────────────────────────────────────────────────────

  function openAddModal(id) {
    editingId = id;
    const item = id ? data.items.find(it => it.id === id) : null;
    document.getElementById('add-modal-title').textContent = item ? 'Edit Item' : 'Add Item';
    document.getElementById('am-title').value = item ? item.title : '';
    document.getElementById('am-author').value = item ? (item.author||'') : '';
    document.getElementById('am-type').value = item ? item.type : 'book';
    document.getElementById('am-status').value = item ? item.status : 'to-read';
    document.getElementById('am-platform').value = item ? (item.platform||'') : '';
    document.getElementById('am-url').value = item ? (item.url||'') : '';
    document.getElementById('am-owned').checked = item ? !!item.owned : false;
    document.getElementById('am-delete-btn').style.display = item ? '' : 'none';
    const archBtn = document.getElementById('am-archive-btn');
    if (archBtn) { archBtn.style.display = item ? '' : 'none'; archBtn.textContent = item && item.archived ? '↩ Restore' : '📦 Archive'; }
    document.getElementById('add-modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('am-title').focus(), 50);
  }

  function closeAddModal() {
    document.getElementById('add-modal-overlay').classList.remove('open');
    editingId = null;
  }

  function saveItem() {
    const title = document.getElementById('am-title').value.trim();
    if (!title) { document.getElementById('am-title').focus(); return; }
    const status = document.getElementById('am-status').value;
    if (editingId) {
      const item = data.items.find(it => it.id === editingId);
      if (item) {
        item.title    = title;
        item.author   = document.getElementById('am-author').value.trim();
        item.type     = document.getElementById('am-type').value;
        item.platform = document.getElementById('am-platform').value.trim();
        item.url      = document.getElementById('am-url').value.trim();
        item.owned    = document.getElementById('am-owned').checked;
        if (item.status !== status) {
          item.status = status;
          if (status === 'done') { item.completedAt = new Date().toISOString(); item.progress = 100; }
          else if (status === 'to-read') { item.progress = 0; }
        }
      }
    } else {
      const newItem = {
        id: uid(), title,
        author:   document.getElementById('am-author').value.trim(),
        type:     document.getElementById('am-type').value,
        status,
        platform: document.getElementById('am-platform').value.trim(),
        url:      document.getElementById('am-url').value.trim(),
        progress: status === 'done' ? 100 : 0,
        owned: document.getElementById('am-owned').checked,
        tags: [], highlights: [], notes: '', keyInsight: '',
        createdAt: new Date().toISOString(),
      };
      data.items.unshift(newItem);
      activeId = newItem.id;
    }
    save(); closeAddModal(); renderList(); renderDetail();
  }

  function archiveCurrentItem() {
    if (!editingId) return;
    const it = data.items.find(x => x.id === editingId);
    if (!it) return;
    it.archived = !it.archived;
    save(); closeAddModal(); renderList();
    showToast(it.archived ? 'Item archived' : 'Item restored');
  }

  function toggleShowArchived() {
    showArchived = !showArchived;
    activeId = null;
    renderList();
    document.getElementById('detail-empty').style.display = 'flex';
    document.getElementById('detail-content').style.display = 'none';
  }

  function deleteItem() {
    if (!editingId) return;
    if (!confirm('Delete this item and all its highlights?')) return;
    if (activeId === editingId) { activeId = null; }
    data.items = data.items.filter(it => it.id !== editingId);
    save(); closeAddModal(); renderList(); renderDetail();
  }

  // ── Drag-to-reorder ───────────────────────────────────────────────────────────

  function initLHDrag(listEl) {
    if (!listEl) return;
    let _id = null, _line = null;
    function getLine() {
      if (!_line) { _line = document.createElement('div'); _line.className = 'lh-drop-line'; }
      return _line;
    }
    function clearLine() { if (_line && _line.parentNode) _line.remove(); }

    listEl.addEventListener('dragstart', e => {
      const item = e.target.closest('[data-drag-id]'); if (!item) return;
      _id = item.dataset.dragId;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', _id);
      setTimeout(() => item.classList.add('lh-drag-src'), 0);
    });
    listEl.addEventListener('dragend', () => {
      listEl.querySelectorAll('.lh-drag-src').forEach(el => el.classList.remove('lh-drag-src'));
      clearLine(); _id = null;
    });
    listEl.addEventListener('dragover', e => {
      if (!_id) return;
      const item = e.target.closest('[data-drag-id]');
      if (!item || item.dataset.dragId === _id) return;
      e.preventDefault();
      const rect = item.getBoundingClientRect();
      if (e.clientY < rect.top + rect.height / 2) item.before(getLine()); else item.after(getLine());
    });
    listEl.addEventListener('dragleave', e => { if (!listEl.contains(e.relatedTarget)) clearLine(); });
    listEl.addEventListener('drop', e => {
      e.preventDefault();
      const item = e.target.closest('[data-drag-id]'); clearLine();
      if (!item || !_id) return;
      const toId = item.dataset.dragId; if (toId === _id) return;
      const rect = item.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;
      // Reorder within full data.items array (not filtered view, to preserve relative order)
      const fromIdx = data.items.findIndex(x => x.id === _id); if (fromIdx === -1) return;
      const [moved] = data.items.splice(fromIdx, 1);
      const toIdx = data.items.findIndex(x => x.id === toId);
      data.items.splice(before ? toIdx : toIdx + 1, 0, moved);
      _id = null;
      save(); renderList();
    });
  }

  // ── Owned toggle ─────────────────────────────────────────────────────────────

  function toggleOwned() {
    const item = data.items.find(it => it.id === activeId); if (!item) return;
    item.owned = !item.owned;
    save(); renderList(); renderDetail();
  }

  // ── Bookshelf view ───────────────────────────────────────────────────────────

  function toggleView() {
    viewMode = viewMode === 'list' ? 'shelf' : 'list';
    const btn = document.getElementById('view-toggle-btn');
    const bodyWrap = document.getElementById('body-wrap');
    const shelfEl = document.getElementById('shelf-view');
    if (viewMode === 'shelf') {
      btn.textContent = '📋 List';
      bodyWrap.style.display = 'none';
      shelfEl.style.display = 'block';
      renderShelf();
    } else {
      btn.textContent = '📚 Shelf';
      bodyWrap.style.display = '';
      shelfEl.style.display = 'none';
    }
  }

  function spineSize(item, idx) {
    const sum = item.title.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    const height = 130 + (sum % 7) * 10;
    const width  = 28  + ((sum + item.title.length) % 5) * 5;
    const palette = SPINE_PALETTES[item.type] || SPINE_PALETTES.book;
    const [bg, fg] = palette[idx % palette.length];
    return { height, width, bg, fg };
  }

  function renderShelf() {
    const shelfEl = document.getElementById('shelf-view'); if (!shelfEl) return;
    const items = data.items.filter(it => !it.archived);
    if (!items.length) {
      shelfEl.innerHTML = `<div class="shelf-empty">No items yet — add a book, article, or course to fill your shelf.</div>`;
      return;
    }
    const PER_SHELF = 13;
    const shelves = [];
    for (let i = 0; i < items.length; i += PER_SHELF) shelves.push(items.slice(i, i + PER_SHELF));
    shelfEl.innerHTML = shelves.map((row, si) => {
      const spines = row.map((item, i) => {
        const { height, width, bg, fg } = spineSize(item, si * PER_SHELF + i);
        const wishCls = !item.owned ? ' wishlist-spine' : '';
        const shapeEl = item.type === 'course' ? '<div class="spine-disc"></div>'
                      : item.type === 'video'  ? '<div class="spine-play">▶</div>'
                      : '';
        return `<div class="book-spine type-${item.type}${wishCls}"
          style="width:${width}px;height:${height}px;background:${bg};color:${fg}"
          data-spine-id="${item.id}" title="${_esc(item.title)}${item.author ? ' — ' + item.author : ''}">
          <div class="spine-title">${_esc(item.title)}</div>
          ${item.author ? `<div class="spine-author">${_esc(item.author)}</div>` : ''}
          ${shapeEl}
        </div>`;
      }).join('');
      return `<div class="shelf-section">
        <div class="shelf-books-row">${spines}</div>
        <div class="shelf-board"></div>
        <div class="shelf-shadow"></div>
      </div>`;
    }).join('');

    // Attach click handlers for spine popups
    shelfEl.querySelectorAll('.book-spine').forEach(el => {
      el.addEventListener('click', () => shelfClickSpine(el.dataset.spineId, el));
    });
  }

  function shelfClickSpine(id, el) {
    document.querySelectorAll('.shelf-popup').forEach(p => p.remove());
    const item = data.items.find(it => it.id === id); if (!item) return;
    const pct = item.progress || 0;
    const popup = document.createElement('div');
    popup.className = 'shelf-popup';
    popup.innerHTML = `
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.3">${_esc(item.title)}</div>
      ${item.author ? `<div style="font-size:11px;color:var(--text3);margin-bottom:7px">${_esc(item.author)}</div>` : ''}
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
        <span class="type-pill ${item.type}">${TYPE_ICON[item.type]||''} ${item.type}</span>
        <span style="font-size:11px;color:var(--text2)">${STATUS_CONFIG[item.status]?.label||''}</span>
        <span style="font-size:10px;color:var(--text3)">${item.owned ? '📚 Owned' : '📌 Wishlist'}</span>
      </div>
      ${pct > 0 ? `<div style="height:3px;background:var(--surface3);border-radius:2px;margin-bottom:9px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--accent);border-radius:2px"></div></div>` : ''}
      <button class="btn btn-ghost" style="font-size:11px;width:100%;padding:5px" onclick="openFromShelf('${id}')">Open details →</button>`;
    el.style.position = 'relative';
    el.appendChild(popup);
    setTimeout(() => {
      document.addEventListener('click', function h(e) {
        if (!el.contains(e.target)) { popup.remove(); document.removeEventListener('click', h); }
      });
    }, 0);
  }

  function openFromShelf(id) {
    viewMode = 'list';
    document.getElementById('view-toggle-btn').textContent = '📚 Shelf';
    document.getElementById('shelf-view').style.display = 'none';
    document.getElementById('body-wrap').style.display = '';
    openDetail(id);
  }

  // ── Boot ─────────────────────────────────────────────────────────────────────

  document.addEventListener('DOMContentLoaded', () => {
    load();
    renderList();
    renderDetail();
    // Navigate here from Cmd+K or Graph Hub
    window.addEventListener('message', e => {
      if (e.data?.type === 'hub-highlight' && e.data.id) {
        const it = data.items.find(x => x.id === e.data.id);
        if (it) { activeId = it.id; renderList(); renderDetail(); }
      }
    });
    HubBootstrap.start('learning-hub');
  });

  document.getElementById('add-modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('add-modal-overlay')) closeAddModal();
  });
</script>
</body>
</html>
