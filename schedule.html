<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule</title>
  <script src="hub-storage.js"></script>
  <script src="hub-utils.js"></script>
  <script src="hub-links.js"></script>
  <script src="hub-data.js"></script>
  <script src="hub-bootstrap.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }

    body {
      display: flex;
    }

    /* ── Toolbar logo + view tabs ──────────────────────────────── */
    .sch-logo-mark {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #111;
      font-family: var(--font-display);
      flex-shrink: 0;
    }

    .sch-logo-text {
      font-family: var(--font-display);
      font-size: 13.5px;
      font-weight: 800;
      color: var(--text);
      flex-shrink: 0;
    }

    .sch-view-toggle {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }

    .sch-view-btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      border-radius: var(--r-sm);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .sch-view-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #111;
      font-weight: 700;
    }

    .sch-view-btn:not(.active):hover {
      border-color: var(--border2);
      color: var(--text);
    }

    .sch-add-btn {
      padding: 6px 14px;
      background: var(--accent);
      border: none;
      border-radius: var(--r-sm);
      color: #111;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .sch-add-btn:hover {
      opacity: 0.85;
    }

    .sch-filter-btn {
      padding: 4px 9px;
      border: 1px solid transparent;
      border-radius: 20px;
      background: transparent;
      color: var(--text3);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
    }

    .sch-filter-btn.active {
      border-color: var(--border2);
      color: var(--text2);
      background: var(--surface2);
    }

    .sch-filter-btn:not(.active):hover {
      color: var(--text2);
    }

    /* ── Main ──────────────────────────────────────────────────── */
    .sch-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sch-toolbar {
      min-height: 52px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }



    .sch-toolbar-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: var(--r-sm);
      color: var(--text2);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
    }

    .sch-toolbar-btn:hover {
      border-color: var(--border2);
      color: var(--text);
    }

    .sch-toolbar-btn.active {
      background: var(--surface2);
      border-color: var(--border2);
      color: var(--text);
    }

    .sch-toolbar-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    .sch-toolbar-today {
      padding: 6px 12px;
      border: 1px solid var(--accent);
      background: transparent;
      border-radius: var(--r-sm);
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.12s;
    }

    .sch-toolbar-today:hover {
      background: var(--accent);
      color: #111;
    }

    .sch-view-host {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #view-timeline,
    #view-calendar {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .view-hidden {
      display: none !important;
    }

    /* ── Gantt ─────────────────────────────────────────────────── */
    .gantt-layout {
      display: flex;
      height: 100%;
      overflow: hidden;
    }

    .gantt-label-col {
      width: 240px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border2);
      background: var(--surface);
      overflow: hidden;
    }

    .gantt-label-head {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text3);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }

    .gantt-label-body {
      flex: 1;
      overflow: hidden; /* scroll driven by gantt-scroll sync */
    }

    .gantt-label-row {
      height: 44px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }

    .gantt-label-row:hover { background: var(--surface2); }
    .gantt-label-row.selected { background: var(--accent-dim); border-left: 2px solid var(--accent); padding-left: 8px; }
    .gantt-label-row.alt { background: var(--surface2); }
    .gantt-label-row.alt:hover { background: var(--surface3); }
    .gantt-label-row.alt.selected { background: var(--accent-dim); }

    .gantt-label-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .gantt-label-dot.ms-shape {
      border-radius: 1px;
      transform: rotate(45deg);
    }

    .gantt-label-name {
      font-size: 12px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gantt-wrap {
      display: flex;
      height: 100%;
      overflow: hidden;
    }

    .gantt-scroll {
      flex: 1;
      overflow: auto;
    }

    .gantt-scroll::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .gantt-scroll::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    .gantt-header {
      display: flex;
      height: 44px;
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .gantt-col-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 10.5px;
      color: var(--text3);
      font-family: var(--font-mono);
      line-height: 1.3;
    }

    .gantt-col-header.today-col {
      color: var(--accent);
      font-weight: 700;
    }

    .gantt-col-header.weekend {
      background: rgba(255, 255, 255, 0.02);
    }

    .gantt-col-header .col-main {
      font-weight: 600;
      font-size: 11px;
    }

    .gantt-col-header .col-sub {
      font-size: 9px;
      opacity: 0.6;
    }

    .gantt-body {
      position: relative;
    }

    .gantt-row-bg {
      position: absolute;
      left: 0;
      right: 0;
      height: 44px;
      border-bottom: 1px solid var(--border);
    }

    .gantt-row-bg.alt {
      background: rgba(255, 255, 255, 0.012);
    }

    .gantt-col-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }

    .gantt-col-weekend {
      position: absolute;
      top: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.025);
    }

    .gantt-today-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--accent);
      opacity: 0.55;
      z-index: 2;
      pointer-events: none;
    }

    .gantt-bar {
      position: absolute;
      height: 26px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 600;
      color: #111;
      cursor: pointer;
      overflow: hidden;
      white-space: nowrap;
      transition: filter 0.12s;
      z-index: 3;
    }

    .gantt-bar:hover {
      filter: brightness(1.12);
    }

    .gantt-bar.done {
      opacity: 0.38;
    }

    .gantt-bar.selected {
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.2), 0 0 0 3px var(--accent);
    }

    .gantt-milestone {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 2px;
      transform: translateX(-50%) rotate(45deg);
      cursor: pointer;
      z-index: 3;
      transition: filter 0.12s;
    }

    .gantt-milestone:hover {
      filter: brightness(1.2);
    }

    .gantt-milestone.done {
      opacity: 0.38;
    }

    .gantt-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text3);
      font-size: 13px;
      gap: 8px;
    }

    .gantt-empty-icon {
      font-size: 32px;
      opacity: 0.25;
    }

    /* ── Calendar ──────────────────────────────────────────────── */
    #view-calendar {
      display: flex;
      flex-direction: column;
    }

    .cal-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .cal-nav-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
    }
    /* Keep ‹ title › grouped; push Week/Today to the right (P3) */
    .cal-nav .sch-toolbar-sep { margin-left: auto; }

    .cal-nav-btn {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: var(--r-sm);
      color: var(--text2);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
      line-height: 1;
    }

    .cal-nav-btn:hover {
      border-color: var(--border2);
      color: var(--text);
    }

    .cal-week-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 0 12px;
      flex-shrink: 0;
    }

    .cal-week-label {
      padding: 8px 4px 6px;
      text-align: center;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text3);
      font-family: var(--font-mono);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .cal-week-label.weekend {
      color: var(--accent2);
    }

    .cal-grid-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px 12px;
    }

    .cal-grid-wrap::-webkit-scrollbar {
      width: 4px;
    }

    .cal-grid-wrap::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(var(--cal-rows, 6), minmax(0, 1fr));
      gap: 3px;
      height: 100%;
      min-height: 480px;
    }

    .cal-day-cell {
      min-height: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 6px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      overflow-y: auto;
    }

    .cal-day-cell:hover {
      border-color: var(--border2);
      background: var(--surface2);
    }

    .cal-day-cell.weekend {
      background: var(--accent2-dim);
    }

    .cal-day-cell.weekend:hover {
      background: var(--accent2-glow);
    }

    .cal-day-cell.today {
      border-color: var(--accent);
    }

    .cal-day-cell.out-of-month {
      opacity: 0.28;
    }

    .cal-day-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      font-family: var(--font-mono);
      margin-bottom: 4px;
    }

    .cal-day-cell.today .cal-day-num {
      color: var(--accent);
    }

    .cal-pill {
      display: block;
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 10.5px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
      cursor: pointer;
      transition: filter 0.1s;
    }

    .cal-pill:hover {
      filter: brightness(1.15);
    }

    .cal-pill.done {
      opacity: 0.38;
    }

    .cal-pill.meeting {
      background: var(--node-blue);
      border: 1px solid var(--border-blue);
      color: var(--text2);
    }

    .cal-more {
      font-size: 10px;
      color: var(--text3);
      padding: 1px 4px;
      font-family: var(--font-mono);
    }

    /* ── Week hourly grid ─────────────────────────────────────────── */
    .cal-week-header.week-mode {
      grid-template-columns: 46px repeat(7, 1fr);
    }

    .cal-week-gutter {
      flex-shrink: 0;
    }

    .cal-grid.week-grid {
      display: block;
      height: auto;
      min-height: 0;
    }

    .wg-allday-row {
      display: grid;
      grid-template-columns: 46px repeat(7, 1fr);
      gap: 3px;
      position: sticky;
      top: 0;
      z-index: var(--z-sticky, 2);
      background: var(--bg);
      padding-bottom: 4px;
    }

    .wg-allday-col {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 3px;
      min-height: 30px;
      max-height: 84px;
      overflow-y: auto;
      cursor: pointer;
    }

    .wg-allday-col.weekend {
      background: var(--accent2-dim);
    }

    .wg-allday-col.today {
      border-color: var(--accent);
    }

    .wg-grid-body {
      display: grid;
      grid-template-columns: 46px repeat(7, 1fr);
      gap: 3px;
      margin-top: 4px;
    }

    .wg-time-col {
      position: relative;
      height: var(--wg-grid-height);
    }

    .wg-time-label {
      position: absolute;
      right: 6px;
      transform: translateY(-50%);
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text3);
      white-space: nowrap;
    }

    .wg-day-col {
      position: relative;
      height: var(--wg-grid-height);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      cursor: pointer;
      background-image: repeating-linear-gradient(to bottom,
        var(--border) 0, var(--border) 1px,
        transparent 1px, transparent var(--wg-slot-height));
    }

    .wg-day-col.weekend {
      background-color: var(--accent2-dim);
    }

    .wg-day-col.today {
      border-color: var(--accent);
    }

    .wg-work-band {
      position: absolute;
      left: 0;
      right: 0;
      background: var(--accent-dim);
      pointer-events: none;
      border-radius: var(--r-sm);
    }

    .wg-block {
      position: absolute;
      border-radius: 4px;
      padding: 2px 4px;
      font-size: 10px;
      font-weight: 500;
      line-height: 1.3;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid;
      transition: filter 0.1s;
    }

    .wg-block:hover {
      filter: brightness(1.15);
      z-index: 1;
    }

    .wg-block.done {
      opacity: 0.45;
    }

    .wg-block.meeting {
      background: var(--node-blue);
      border-color: var(--border-blue);
      color: var(--text2);
    }

    .wg-block.dragging {
      opacity: 0.85;
      z-index: var(--z-popover, 5);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      cursor: grabbing;
    }

    .wg-resize-handle {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 6px;
      cursor: ns-resize;
    }

    /* ── Drawer ────────────────────────────────────────────────── */
    .sch-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 340px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transform: translateX(100%);
      transition: transform 0.22s cubic-bezier(.4, 0, .2, 1);
    }

    .sch-drawer.open {
      transform: translateX(0);
    }

    .sch-drawer-header {
      height: 54px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sch-drawer-title {
      flex: 1;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
    }

    .sch-close-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
    }

    .sch-close-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .sch-drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sch-drawer-body::-webkit-scrollbar {
      width: 4px;
    }

    .sch-drawer-body::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    .sch-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .sch-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .sch-textarea {
      resize: vertical;
      min-height: 72px;
    }

    .sch-date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .sch-color-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sch-color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.12s, transform 0.12s;
    }

    .sch-color-swatch:hover {
      transform: scale(1.15);
    }

    .sch-color-swatch.selected {
      border-color: var(--text);
    }

    .sch-done-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sch-done-row label {
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
    }

    .sch-source-badge {
      display: inline-block;
      padding: 5px 9px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 10.5px;
      color: var(--text3);
      font-family: var(--font-mono);
      line-height: 1.4;
    }

    .sch-drawer-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .sch-save-btn {
      flex: 1;
      padding: 10px 0;
      background: var(--accent);
      border: none;
      border-radius: var(--r-sm);
      color: #111;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.12s;
    }

    .sch-save-btn:hover {
      opacity: 0.85;
    }

    .sch-delete-btn {
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text3);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
    }

    .sch-delete-btn:hover {
      border-color: #f44;
      color: #f44;
    }

    /* ── Toast ─────────────────────────────────────────────────── */
    .sch-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 12.5px;
      color: var(--text);
      z-index: 999;
      transition: transform 0.25s cubic-bezier(.4, 0, .2, 1);
      white-space: nowrap;
      pointer-events: none;
    }

    .sch-toast.show {
      transform: translateX(-50%) translateY(0);
    }


    /* ═══════════════════════════════════════════════════════════
       Multi-Project Gantt
    ═══════════════════════════════════════════════════════════ */
    #view-multi {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .multi-toolbar {
      height: 44px; flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      padding: 0 14px; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .multi-range-label {
      font-family: var(--font-mono); font-size: 11px; color: var(--text2);
      min-width: 160px; text-align: center;
    }
    .multi-gantt-scroll {
      flex: 1; overflow: auto;
      position: relative;
    }

    /* ── Header row ─────────────────────────────────────────── */
    .multi-hdr-row {
      display: flex; position: sticky; top: 0; z-index: 10;
      background: var(--surface); border-bottom: 2px solid var(--border);
      min-width: max-content;
    }
    .multi-hdr-corner {
      width: 220px; min-width: 220px; flex-shrink: 0;
      position: sticky; left: 0; z-index: 11;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 14px;
      font-size: 10px; font-family: var(--font-mono); letter-spacing: 1px;
      text-transform: uppercase; color: var(--text3);
    }
    .multi-col-hdr {
      flex-shrink: 0; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-family: var(--font-mono); color: var(--text3);
      border-right: 1px solid var(--border);
      white-space: nowrap; padding: 0 4px;
    }
    .multi-col-hdr.is-today { color: var(--accent); background: var(--accent-dim); }

    /* ── Rows ───────────────────────────────────────────────── */
    .mrow {
      display: flex; min-width: max-content;
      border-bottom: 1px solid var(--border);
    }
    .mrow-label {
      width: 220px; min-width: 220px; flex-shrink: 0;
      position: sticky; left: 0; z-index: 2;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
      padding: 0 10px; overflow: hidden;
    }
    .mrow-gantt {
      position: relative; flex-shrink: 0;
    }

    /* ── Project swimlane header ────────────────────────────── */
    .mrow-proj { height: 36px; }
    .mrow-proj .mrow-label {
      background: var(--surface2); cursor: pointer;
      font-weight: 700; font-size: 12px;
    }
    .mrow-proj .mrow-label:hover { background: var(--surface3); }
    .mrow-proj .mrow-gantt { background: var(--surface2); }
    .proj-color-bar { width: 4px; min-width: 4px; height: 18px; border-radius: 2px; flex-shrink: 0; }
    .proj-chevron { font-size: 9px; color: var(--text3); flex-shrink: 0; }
    .proj-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .proj-meta { font-size: 10px; font-family: var(--font-mono); color: var(--text3); white-space: nowrap; }

    /* ── Task / Milestone rows ──────────────────────────────── */
    .mrow-item { height: 28px; }
    .mrow-item .mrow-label { font-size: 11.5px; color: var(--text2); padding-left: 26px; }
    .mrow-item.is-done .mrow-label { color: var(--text3); text-decoration: line-through; }
    .item-label-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-due-badge {
      font-size: 10px; font-family: var(--font-mono); color: var(--text3); white-space: nowrap; flex-shrink: 0;
    }
    .item-due-badge.overdue { color: var(--accent-nope); }
    .ms-icon { font-size: 9px; flex-shrink: 0; }

    /* ── Gantt bars & markers ───────────────────────────────── */
    .g-bar {
      position: absolute; top: 50%; transform: translateY(-50%);
      height: 8px; border-radius: 3px; min-width: 6px;
      opacity: 0.85; cursor: default;
    }
    .g-bar.is-done { opacity: 0.35; }
    .g-diamond {
      position: absolute; top: 50%; transform: translate(-50%, -50%) rotate(45deg);
      width: 10px; height: 10px; border-radius: 2px; cursor: default;
    }
    .g-diamond.is-done { opacity: 0.35; }

    /* ── Grid lines & today ─────────────────────────────────── */
    .g-col-band {
      position: absolute; top: 0; bottom: 0;
      border-right: 1px solid var(--border); pointer-events: none;
    }
    .g-today-line {
      position: absolute; top: 0; bottom: 0; width: 2px;
      background: var(--accent); opacity: 0.55; pointer-events: none; z-index: 1;
    }

    /* ── Empty state ────────────────────────────────────────── */
    .multi-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 8px;
      color: var(--text3); font-size: 13px; text-align: center; padding: 40px;
    }
    .multi-empty-icon { font-size: 36px; opacity: 0.3; margin-bottom: 6px; }
  </style>
</head>

<body>
  <!-- ══ Main ═════════════════════════════════════════════════════ -->
  <main class="sch-main">
    <div class="sch-toolbar">
      <div class="sch-logo-mark">▦</div>
      <span class="sch-logo-text">Schedule</span>
      <div class="sch-toolbar-sep"></div>
      <div class="sch-view-toggle">
        <button class="sch-view-btn active" id="btn-calendar" onclick="switchView('calendar')">Calendar</button>
        <button class="sch-view-btn" id="btn-timeline" onclick="switchView('timeline')">Timeline</button>
        <button class="sch-view-btn" id="btn-multi" onclick="switchView('multi')">Projects</button>
      </div>
      <div class="sch-toolbar-sep"></div>
      <div id="toolbar-controls" style="display:flex;align-items:center;gap:6px;flex:1"></div>
      <button class="sch-add-btn" onclick="openDrawer(null)">+ Add Item</button>
    </div>

    <div class="sch-view-host">

      <!-- Timeline / Gantt -->
      <div id="view-timeline" class="view-hidden">
        <div class="gantt-layout">
          <div class="gantt-label-col" id="gantt-label-col">
            <div class="gantt-label-head">Item</div>
            <div class="gantt-label-body" id="gantt-label-body"></div>
          </div>
          <div class="gantt-wrap">
            <div class="gantt-scroll" id="gantt-scroll">
              <div class="gantt-header" id="gantt-header"></div>
              <div class="gantt-body" id="gantt-body"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Multi-Project Gantt -->
      <div id="view-multi" class="view-hidden">
        <div class="multi-toolbar" id="multi-toolbar">
          <button class="sch-toolbar-btn" onclick="multiNav(-1)">&#8249;</button>
          <span class="multi-range-label" id="multi-range-label"></span>
          <button class="sch-toolbar-btn" onclick="multiNav(1)">&#8250;</button>
          <button class="sch-toolbar-today" onclick="multiToday()">Today</button>
          <div style="flex:1"></div>
          <button class="sch-toolbar-btn" id="multi-zoom-btn" onclick="toggleMultiZoom()">Month</button>
        </div>
        <div class="multi-gantt-scroll" id="multi-gantt-scroll">
          <!-- built by renderMultiView() -->
        </div>
      </div>

      <!-- Calendar -->
      <div id="view-calendar">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="calNav(-1)">&#8249;</button>
          <span class="cal-nav-title" id="cal-title"></span>
          <button class="cal-nav-btn" onclick="calNav(1)">&#8250;</button>
          <div class="sch-toolbar-sep"></div>
          <button class="sch-toolbar-btn" id="cal-week-toggle" onclick="toggleCalWeek()">Week</button>
          <button class="sch-toolbar-today" onclick="calToday()">Today</button>
        </div>
        <div class="cal-week-header" id="cal-week-header">
          <div class="cal-week-gutter" id="cwl-gutter" style="display:none"></div>
          <div class="cal-week-label" id="cwl-0">Mon</div>
          <div class="cal-week-label" id="cwl-1">Tue</div>
          <div class="cal-week-label" id="cwl-2">Wed</div>
          <div class="cal-week-label" id="cwl-3">Thu</div>
          <div class="cal-week-label" id="cwl-4">Fri</div>
          <div class="cal-week-label weekend" id="cwl-5">Sat</div>
          <div class="cal-week-label weekend" id="cwl-6">Sun</div>
        </div>
        <div class="cal-grid-wrap">
          <div class="cal-grid" id="cal-grid"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- ══ Edit Drawer ═══════════════════════════════════════════════ -->
  <div class="sch-drawer" id="sch-drawer">
    <div class="sch-drawer-header">
      <span class="sch-drawer-title" id="drawer-title">Add Item</span>
      <button class="sch-close-btn" onclick="closeDrawer()">&#10005;</button>
    </div>
    <div class="sch-drawer-body">
      <div id="drawer-badge" style="display:none">
        <div class="sch-source-badge">Imported from Project Hub — edit the source there to update the origin.</div>
      </div>
      <div class="sch-field">
        <label class="sch-label">Title</label>
        <input class="sch-input" id="f-title" type="text" placeholder="Item title…" />
      </div>
      <div class="sch-field">
        <label class="sch-label">Type</label>
        <select class="sch-select" id="f-type">
          <option value="task">Task</option>
          <option value="milestone">Milestone</option>
          <option value="event">Event</option>
        </select>
      </div>
      <div class="sch-date-row">
        <div class="sch-field">
          <label class="sch-label">Start</label>
          <input class="sch-input" id="f-start" type="date" />
        </div>
        <div class="sch-field">
          <label class="sch-label">End</label>
          <input class="sch-input" id="f-end" type="date" />
        </div>
      </div>
      <div class="sch-date-row">
        <div class="sch-field">
          <label class="sch-label">Start time <span style="opacity:.6">(optional)</span></label>
          <input class="sch-input" id="f-start-time" type="time" step="1800" />
        </div>
        <div class="sch-field">
          <label class="sch-label">End time</label>
          <input class="sch-input" id="f-end-time" type="time" step="1800" />
        </div>
      </div>
      <div class="sch-field">
        <label class="sch-label">Color</label>
        <div class="sch-color-row" id="color-swatches"></div>
      </div>
      <div class="sch-field">
        <label class="sch-label">Project</label>
        <select class="sch-input" id="f-project">
          <option value="">— none —</option>
        </select>
      </div>
      <div class="sch-field">
        <label class="sch-label">Notes</label>
        <textarea class="sch-textarea" id="f-notes" placeholder="Optional notes…"></textarea>
      </div>
      <div class="sch-done-row">
        <input type="checkbox" id="f-done" />
        <label for="f-done">Mark as done</label>
      </div>
    </div>
    <div class="sch-drawer-footer">
      <button class="sch-save-btn" onclick="saveDrawer()">Save</button>
      <button class="sch-delete-btn" id="drawer-delete-btn" onclick="deleteCurrentItem()"
        style="display:none">Delete</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="sch-toast" id="sch-toast"></div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // Date utilities (declared first so TODAY const can use them)
    // ═══════════════════════════════════════════════════════════════

    const SOURCE_TYPES = {
      manual: "Manual",
      project: "Project Task",
      alignment: "Alignment Decision",
      kmqt: "KMQT Try",
      decision: "Decision Log"
    };

    function isoToDate(s) {
      return s ? new Date(s + 'T00:00:00') : new Date();
    }

    function dateToIso(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    function addDays(iso, n) {
      const d = isoToDate(iso);
      d.setDate(d.getDate() + n);
      return dateToIso(d);
    }

    function timeToMinutes(t) {
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function minutesToTime(mins) {
      mins = ((mins % 1440) + 1440) % 1440;
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
    }

    function addMinutesToTime(t, delta) {
      return minutesToTime(timeToMinutes(t) + delta);
    }

    function getWeekStart(iso) {
      const d = isoToDate(iso);
      const dow = d.getDay(); // 0=Sun
      d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
      return dateToIso(d);
    }

    function getDow(iso) {
      // 0=Mon … 6=Sun
      const d = isoToDate(iso).getDay();
      return d === 0 ? 6 : d - 1;
    }

    function isWeekend(iso) {
      const d = getDow(iso);
      return d === 5 || d === 6;
    }

    function fmtDate(iso) {
      if (!iso) return '';
      return isoToDate(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function fmtMonth(year, month) {
      return new Date(year, month, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    function uid() { return 'si-' + Math.random().toString(36).slice(2, 9); }

    function esc(s) {
      return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ═══════════════════════════════════════════════════════════════
    // Constants
    // ═══════════════════════════════════════════════════════════════
    const STORAGE_KEY = 'schedule-v1';
    const TODAY = dateToIso(new Date());
    const ROW_H = 44;

    const PALETTE = [
      '#b8f033', '#4ade80', '#60a5fa', '#f472b6',
      '#fb923c', '#a78bfa', '#facc15', '#34d399',
      '#f87171', '#94a3b8',
    ];

    const DAY_NAMES = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

    // Week-grid layout constants
    const WG_START_MIN = 6 * 60;   // 06:00
    const WG_END_MIN = 22 * 60;    // 22:00
    const WG_SLOT_MIN = 30;        // 30-minute slots
    const WG_SLOT_PX = 24;         // px per slot
    const WG_PX_PER_MIN = WG_SLOT_PX / WG_SLOT_MIN;
    const WORK_PERIODS = [['08:30', '12:00'], ['13:00', '17:30']];

    // Greedy lane assignment for overlapping blocks. Mutates each block
    // with a `.lane` index and returns the total lane count.
    function layoutLanes(blocks) {
      blocks.sort((a, b) => a.startMin - b.startMin);
      const laneEnds = [];
      blocks.forEach(b => {
        let lane = laneEnds.findIndex(end => end <= b.startMin);
        if (lane === -1) { lane = laneEnds.length; laneEnds.push(0); }
        laneEnds[lane] = b.endMin;
        b.lane = lane;
      });
      return Math.max(1, laneEnds.length);
    }

    // ═══════════════════════════════════════════════════════════════
    // State
    // ═══════════════════════════════════════════════════════════════
    let state;
    let ui = {
      activeView: 'calendar',
      zoom: 'month',
      calYear: new Date().getFullYear(),
      calMonth: new Date().getMonth(),
      calWeekMode: false,
      filterType: 'all',
      selectedId: null,
      drawerItemId: null,
      multiZoom: 'week',
      multiOffset: 0,
      collapsedProjects: new Set(),
    };
    let _drawerColor = PALETTE[2];

    // ═══════════════════════════════════════════════════════════════
    // Persistence
    // ═══════════════════════════════════════════════════════════════
    function loadState() {
      try {
        const saved = HubStorage.get(STORAGE_KEY);
        if (saved) return saved;
      } catch { }
      return { items: [], settings: { defaultZoom: 'month', defaultView: 'timeline' } };
    }

    function saveState() {
      HubStorage.set(STORAGE_KEY, state);
    }

    // ═══════════════════════════════════════════════════════════════
    // Column generation (for Gantt)
    // ═══════════════════════════════════════════════════════════════
    function generateColumns() {
      if (ui.zoom === 'week') {
        // Day columns: today - 14d to today + 56d
        const start = addDays(TODAY, -14);
        const cols = [];
        for (let i = 0; i < 71; i++) cols.push(addDays(start, i));
        return cols;
      } else {
        // Week (Monday) columns: today - 4 weeks to today + 28 weeks
        const start = getWeekStart(addDays(TODAY, -28));
        const cols = [];
        for (let i = 0; i < 34; i++) cols.push(addDays(start, i * 7));
        return cols;
      }
    }

    function colWidth() { return ui.zoom === 'week' ? 40 : 82; }

    function colIndexForIso(iso, columns) {
      if (!iso) return -1;
      if (ui.zoom === 'week') return columns.indexOf(iso);
      return columns.indexOf(getWeekStart(iso));
    }

    // ═══════════════════════════════════════════════════════════════
    // Filtered items
    // ═══════════════════════════════════════════════════════════════
    function filteredItems() {
      return state.items.filter(it =>
        ui.filterType === 'all' || it.type === ui.filterType
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // Sidebar
    // ═══════════════════════════════════════════════════════════════


    // ═══════════════════════════════════════════════════════════════
    // Gantt / Timeline
    // ═══════════════════════════════════════════════════════════════
    function renderTimeline() {
      const columns = generateColumns();
      const cw = colWidth();
      const items = filteredItems();
      const totalWidth = columns.length * cw;

      // ── Header ──
      const headerEl = document.getElementById('gantt-header');
      headerEl.style.width = totalWidth + 'px';

      if (ui.zoom === 'week') {
        let prevMonthLabel = null;
        headerEl.innerHTML = columns.map((iso, i) => {
          const d = isoToDate(iso);
          const monLabel = d.toLocaleDateString('en-US', { month: 'short' });
          const showMon = monLabel !== prevMonthLabel;
          prevMonthLabel = monLabel;
          const isToday = iso === TODAY;
          const isWE = isWeekend(iso);
          return `<div class="gantt-col-header${isToday ? ' today-col' : ''}${isWE ? ' weekend' : ''}"
        style="width:${cw}px">
        <div class="col-main">${d.getDate()}</div>
        <div class="col-sub">${DAY_NAMES[getDow(iso)].slice(0, 1)}${showMon ? ' ' + monLabel : ''}</div>
      </div>`;
        }).join('');
      } else {
        const curWeek = getWeekStart(TODAY);
        headerEl.innerHTML = columns.map((iso) => {
          const d = isoToDate(iso);
          const mon = d.toLocaleDateString('en-US', { month: 'short' });
          return `<div class="gantt-col-header${iso === curWeek ? ' today-col' : ''}"
        style="width:${cw}px">
        <div class="col-main">${mon} ${d.getDate()}</div>
      </div>`;
        }).join('');
      }

      // ── Body ──
      const bodyEl = document.getElementById('gantt-body');

      if (!items.length) {
        bodyEl.innerHTML = `<div class="gantt-empty"><div class="gantt-empty-icon">▦</div><div>No items to display</div></div>`;
        bodyEl.style.width = totalWidth + 'px';
        bodyEl.style.height = '200px';
        return;
      }

      // Build body HTML
      const totalHeight = items.length * ROW_H;
      bodyEl.style.width = totalWidth + 'px';
      bodyEl.style.height = totalHeight + 'px';

      let html = '';

      // Row backgrounds
      items.forEach((_, i) => {
        html += `<div class="gantt-row-bg${i % 2 ? ' alt' : ''}" style="top:${i * ROW_H}px"></div>`;
      });

      // Column lines / weekend fills
      columns.forEach((iso, i) => {
        if (ui.zoom === 'week' && isWeekend(iso)) {
          html += `<div class="gantt-col-weekend" style="left:${i * cw}px; width:${cw}px"></div>`;
        } else {
          html += `<div class="gantt-col-line" style="left:${i * cw}px"></div>`;
        }
      });

      // Today line
      const todayIdx = colIndexForIso(TODAY, columns);
      if (todayIdx >= 0) {
        const lineLeft = ui.zoom === 'week' ? todayIdx * cw : todayIdx * cw + cw / 2;
        html += `<div class="gantt-today-line" id="today-line" style="left:${lineLeft}px"></div>`;
      }

      // Bars & milestones
      items.forEach((it, rowIdx) => {
        const top = rowIdx * ROW_H;
        let startIdx = colIndexForIso(it.start, columns);
        let endIdx = colIndexForIso(it.end, columns);

        if (it.type === 'milestone') {
          const mIdx = startIdx >= 0 ? startIdx : (endIdx >= 0 ? endIdx : -1);
          if (mIdx < 0) return;
          const left = mIdx * cw + cw / 2;
          const msTop = top + (ROW_H - 14) / 2;
          html += `<div class="gantt-milestone${it.done ? ' done' : ''}${it.id === ui.selectedId ? ' selected' : ''}"
        style="left:${left}px; top:${msTop}px; background:${it.color}"
        data-id="${it.id}" onclick="selectAndEdit('${it.id}')"></div>`;
        } else {
          // clamp to visible columns
          if (startIdx < 0 && endIdx < 0) return;
          const s = Math.max(0, startIdx >= 0 ? startIdx : 0);
          const e = Math.min(columns.length - 1, endIdx >= 0 ? endIdx : columns.length - 1);
          if (s > e) return;
          if (startIdx >= columns.length || endIdx < 0) return;

          const left = s * cw + 1;
          const width = (e - s + 1) * cw - 3;
          const barTop = top + (ROW_H - 26) / 2;
          const label = (it.title || '').slice(0, 28);
          html += `<div class="gantt-bar${it.done ? ' done' : ''}${it.id === ui.selectedId ? ' selected' : ''}"
        style="left:${left}px; top:${barTop}px; width:${width}px; background:${it.color}"
        data-id="${it.id}" onclick="selectAndEdit('${it.id}')">${esc(label)}</div>`;
        }
      });

      bodyEl.innerHTML = html;

      // ── Label column (aligned with gantt rows) ──
      const labelBody = document.getElementById('gantt-label-body');
      if (labelBody) {
        if (!items.length) {
          labelBody.innerHTML = '';
        } else {
          labelBody.innerHTML = items.map((it, i) => {
            const msClass = it.type === 'milestone' ? ' ms-shape' : '';
            const altClass = i % 2 ? ' alt' : '';
            const selClass = it.id === ui.selectedId ? ' selected' : '';
            return `<div class="gantt-label-row${altClass}${selClass}" data-id="${it.id}" onclick="selectAndEdit('${it.id}')">
              <div class="gantt-label-dot${msClass}" style="background:${it.color}"></div>
              <div class="gantt-label-name">${esc(it.title || '(untitled)')}</div>
            </div>`;
          }).join('');
        }

        // Sync label body scroll with gantt body scroll
        const gs = document.getElementById('gantt-scroll');
        if (gs && !gs._labelSyncBound) {
          gs._labelSyncBound = true;
          gs.addEventListener('scroll', () => { labelBody.scrollTop = gs.scrollTop; });
        }
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // Calendar
    // ═══════════════════════════════════════════════════════════════
    function renderCalendar() {
      if (ui.calWeekMode) renderCalWeek();
      else renderCalMonth();
    }

    function getMeetingsByDate() {
      let meetingsData = {};
      try { meetingsData = JSON.parse(localStorage.getItem('meetings-hub-v1') || '{}'); } catch { }
      const byDate = {};
      (meetingsData.meetings || []).forEach(m => {
        if (m.recurring) {
          // One pill per occurrence date, sharing the series id (used by drag/resize + click-to-open).
          (m.occurrenceDates || []).forEach(occ => {
            const pillM = { ...m, date: occ.date, time: occ.time, durationMins: occ.durationMins };
            (byDate[occ.date] = byDate[occ.date] || []).push(pillM);
          });
          return;
        }
        if (!m.date) return;
        (byDate[m.date] = byDate[m.date] || []).push(m);
      });
      return byDate;
    }

    function meetingPillHtml(m) {
      const icon = m.recurring ? '🔁' : '▣';
      return `<span class="cal-pill meeting"
        onclick="event.stopPropagation(); parent.postMessage({type:'hub-navigate',tool:'meetings-hub',itemId:'${m.id}'}, window.location.origin||'*')"
        title="${esc(m.title || 'Meeting')}">${icon} ${esc(m.title || 'Meeting')}</span>`;
    }

    function renderCalMonth() {
      const { calYear: year, calMonth: month } = ui;
      document.getElementById('cal-title').textContent = fmtMonth(year, month);
      const items = filteredItems();
      const meetingsByDate = getMeetingsByDate();

      const firstDay = new Date(year, month, 1);
      const firstDow = firstDay.getDay();
      const daysBack = firstDow === 0 ? 6 : firstDow - 1;

      const gridStart = new Date(firstDay);
      gridStart.setDate(gridStart.getDate() - daysBack);

      const lastDay = new Date(year, month + 1, 0);
      const lastDow = lastDay.getDay();
      const daysForward = lastDow === 0 ? 0 : 7 - lastDow;

      const gridEnd = new Date(lastDay);
      gridEnd.setDate(gridEnd.getDate() + daysForward);

      const days = [];
      const cur = new Date(gridStart);
      while (cur <= gridEnd) { days.push(dateToIso(cur)); cur.setDate(cur.getDate() + 1); }

      // Reset week-mode artifacts in case we're switching back from week view
      const header = document.getElementById('cal-week-header');
      header.classList.remove('week-mode');
      document.getElementById('cwl-gutter').style.display = 'none';
      const monthLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      for (let i = 0; i < 7; i++) {
        const lbl = document.getElementById('cwl-' + i);
        lbl.textContent = monthLabels[i];
        lbl.classList.remove('today');
      }
      const grid = document.getElementById('cal-grid');
      grid.classList.remove('week-grid');
      grid.style.removeProperty('--wg-grid-height');
      grid.style.removeProperty('--wg-slot-height');

      grid.style.setProperty('--cal-rows', days.length / 7);

      document.getElementById('cal-grid').innerHTML = days.map(iso => {
        const d = isoToDate(iso);
        const isThisMonth = d.getMonth() === month;
        const isToday = iso === TODAY;
        const isWE = isWeekend(iso);

        const dayMeetings = meetingsByDate[iso] || [];
        const dayItems = items.filter(it => it.start <= iso && iso <= it.end);
        const total = dayMeetings.length + dayItems.length;
        const shownLimit = 4;
        const shownMeetings = dayMeetings.slice(0, shownLimit);
        const meetingPills = shownMeetings.map(meetingPillHtml).join('');
        const remaining = shownLimit - shownMeetings.length;
        const shownItems = remaining > 0 ? dayItems.slice(0, remaining) : [];
        const overflow = total - shownMeetings.length - shownItems.length;

        const pills = shownItems.map(it => {
          const bg = it.color + '28';
          const bd = it.color + '88';
          const cont = it.start !== it.end && it.end > iso ? ' →' : '';
          return `<span class="cal-pill${it.done ? ' done' : ''}"
        style="background:${bg}; border:1px solid ${bd}; color:${it.color}"
        onclick="event.stopPropagation(); selectAndEdit('${it.id}')"
        title="${esc(it.title)}">${esc(it.title || '')}${cont}</span>`;
        }).join('');

        return `<div class="cal-day-cell${isToday ? ' today' : ''}${!isThisMonth ? ' out-of-month' : ''}${isWE ? ' weekend' : ''}"
      onclick="openDrawer(null, '${iso}')">
      <div class="cal-day-num">${d.getDate()}</div>
      ${meetingPills}
      ${pills}
      ${overflow > 0 ? `<span class="cal-more">+${overflow} more</span>` : ''}
    </div>`;
      }).join('');
    }

    function renderCalWeek() {
      const weekStart = getWeekStart(TODAY);
      const days = [];
      for (let i = 0; i < 7; i++) days.push(addDays(weekStart, i));
      const items = filteredItems();
      const meetingsByDate = getMeetingsByDate();

      const d0 = isoToDate(days[0]);
      const d6 = isoToDate(days[6]);
      document.getElementById('cal-title').textContent =
        `${d0.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – ` +
        `${d6.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;

      // Header: switch to week-mode (gutter + dated labels)
      const header = document.getElementById('cal-week-header');
      header.classList.add('week-mode');
      document.getElementById('cwl-gutter').style.display = '';
      for (let i = 0; i < 7; i++) {
        const iso = days[i];
        const d = isoToDate(iso);
        const lbl = document.getElementById('cwl-' + i);
        lbl.textContent = `${DAY_NAMES[i]} ${d.getDate()}`;
        lbl.classList.toggle('today', iso === TODAY);
      }

      const grid = document.getElementById('cal-grid');
      grid.classList.add('week-grid');
      grid.style.removeProperty('--cal-rows');

      const totalMin = WG_END_MIN - WG_START_MIN;
      const gridHeight = totalMin * WG_PX_PER_MIN;
      const slotHeight = WG_SLOT_MIN * WG_PX_PER_MIN;
      grid.style.setProperty('--wg-grid-height', gridHeight + 'px');
      grid.style.setProperty('--wg-slot-height', slotHeight + 'px');

      // ── All-day row: multi-day items, date-only items, untimed meetings ──
      const alldayCols = days.map(iso => {
        const isWE = isWeekend(iso);
        const isToday = iso === TODAY;
        const dayMeetings = (meetingsByDate[iso] || []).filter(m => !m.time);
        const dayItems = items.filter(it => {
          if (it.start > iso || iso > it.end) return false;
          if (it.start === it.end && it.start === iso && it.startTime) return false;
          return true;
        });

        const meetingPills = dayMeetings.map(meetingPillHtml).join('');
        const pills = dayItems.map(it => {
          const bg = it.color + '28';
          const bd = it.color + '88';
          const cont = it.start !== it.end && it.end > iso ? ' →' : '';
          return `<span class="cal-pill${it.done ? ' done' : ''}"
        style="background:${bg}; border:1px solid ${bd}; color:${it.color}"
        onclick="event.stopPropagation(); selectAndEdit('${it.id}')"
        title="${esc(it.title)}">${esc(it.title || '')}${cont}</span>`;
        }).join('');

        return `<div class="wg-allday-col${isWE ? ' weekend' : ''}${isToday ? ' today' : ''}"
      onclick="openDrawer(null, '${iso}')">${meetingPills}${pills}</div>`;
      }).join('');

      // ── Time gutter labels (hourly) ──
      const timeLabels = [];
      for (let m = WG_START_MIN; m <= WG_END_MIN; m += 60) {
        const top = (m - WG_START_MIN) * WG_PX_PER_MIN;
        timeLabels.push(`<div class="wg-time-label" style="top:${top}px">${minutesToTime(m)}</div>`);
      }

      // ── Day columns: working-hours band + timed items/meetings as blocks ──
      const dayCols = days.map(iso => {
        const isWE = isWeekend(iso);
        const isToday = iso === TODAY;

        let bands = '';
        if (!isWE) {
          bands = WORK_PERIODS.map(([s, e]) => {
            const top = (timeToMinutes(s) - WG_START_MIN) * WG_PX_PER_MIN;
            const height = (timeToMinutes(e) - timeToMinutes(s)) * WG_PX_PER_MIN;
            return `<div class="wg-work-band" style="top:${top}px; height:${height}px"></div>`;
          }).join('');
        }

        const blocks = [];
        items.forEach(it => {
          if (it.start === it.end && it.start === iso && it.startTime) {
            blocks.push({
              startMin: timeToMinutes(it.startTime),
              endMin: timeToMinutes(it.endTime || addMinutesToTime(it.startTime, 30)),
              type: 'item', it
            });
          }
        });
        (meetingsByDate[iso] || []).forEach(m => {
          if (m.time) {
            const startMin = timeToMinutes(m.time);
            blocks.push({ startMin, endMin: startMin + (m.durationMins || 30), type: 'meeting', m });
          }
        });

        const laneCount = layoutLanes(blocks);
        const laneW = 100 / laneCount;
        const blockHtml = blocks.map(b => {
          const top = Math.max(0, (b.startMin - WG_START_MIN) * WG_PX_PER_MIN);
          const height = Math.max((b.endMin - b.startMin) * WG_PX_PER_MIN, 16);
          const left = b.lane * laneW;
          if (b.type === 'meeting') {
            const m = b.m;
            return `<div class="wg-block meeting" style="top:${top}px;height:${height}px;left:${left}%;width:${laneW}%"
        data-iso="${iso}"
        onmousedown="wgBlockMouseDown(event, 'meeting', '${m.id}', '${iso}', ${b.startMin}, ${b.endMin})"
        title="${esc(m.title || 'Meeting')}">▣ ${esc(m.title || 'Meeting')}<div class="wg-resize-handle" onmousedown="wgResizeMouseDown(event, 'meeting', '${m.id}', '${iso}', ${b.startMin}, ${b.endMin})"></div></div>`;
          }
          const it = b.it;
          const bg = it.color + '28';
          const bd = it.color + '88';
          return `<div class="wg-block${it.done ? ' done' : ''}" style="top:${top}px;height:${height}px;left:${left}%;width:${laneW}%; background:${bg}; border-color:${bd}; color:${it.color}"
        data-iso="${iso}"
        onmousedown="wgBlockMouseDown(event, 'item', '${it.id}', '${iso}', ${b.startMin}, ${b.endMin})"
        title="${esc(it.title)}">${esc(it.title || '(untitled)')}<div class="wg-resize-handle" onmousedown="wgResizeMouseDown(event, 'item', '${it.id}', '${iso}', ${b.startMin}, ${b.endMin})"></div></div>`;
        }).join('');

        return `<div class="wg-day-col${isWE ? ' weekend' : ''}${isToday ? ' today' : ''}"
      data-iso="${iso}"
      onclick="handleGridClick(event, '${iso}')">${bands}${blockHtml}</div>`;
      }).join('');

      grid.innerHTML = `
    <div class="wg-allday-row">
      <div class="cal-week-gutter"></div>
      ${alldayCols}
    </div>
    <div class="wg-grid-body">
      <div class="wg-time-col">${timeLabels.join('')}</div>
      ${dayCols}
    </div>`;
    }

    function handleGridClick(e, iso) {
      const col = e.currentTarget;
      const rect = col.getBoundingClientRect();
      const offsetY = e.clientY - rect.top;
      const totalMin = WG_END_MIN - WG_START_MIN;
      const gridHeight = totalMin * WG_PX_PER_MIN;
      const frac = Math.max(0, Math.min(1, offsetY / gridHeight));
      let mins = WG_START_MIN + frac * totalMin;
      mins = Math.round(mins / WG_SLOT_MIN) * WG_SLOT_MIN;
      mins = Math.min(mins, WG_END_MIN - WG_SLOT_MIN);
      openDrawer(null, iso, minutesToTime(mins));
    }

    // ═══════════════════════════════════════════════════════════════
    // Week-grid drag & resize
    // ═══════════════════════════════════════════════════════════════
    let _wgDrag = null;

    function wgBlockMouseDown(e, type, id, iso, startMin, endMin) {
      if (e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();
      _wgDrag = {
        mode: 'move',
        type, id,
        origIso: iso,
        origStartMin: startMin,
        origEndMin: endMin,
        duration: endMin - startMin,
        startX: e.clientX,
        startY: e.clientY,
        moved: false,
        blockEl: e.currentTarget,
      };
      document.addEventListener('mousemove', wgDragMove);
      document.addEventListener('mouseup', wgDragEnd);
    }

    function wgResizeMouseDown(e, type, id, iso, startMin, endMin) {
      if (e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();
      _wgDrag = {
        mode: 'resize',
        type, id,
        origIso: iso,
        origStartMin: startMin,
        origEndMin: endMin,
        startX: e.clientX,
        startY: e.clientY,
        moved: false,
        blockEl: e.currentTarget.parentElement,
      };
      document.addEventListener('mousemove', wgDragMove);
      document.addEventListener('mouseup', wgDragEnd);
    }

    function wgDragMove(e) {
      if (!_wgDrag) return;
      const dx = e.clientX - _wgDrag.startX;
      const dy = e.clientY - _wgDrag.startY;
      if (!_wgDrag.moved && Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
      _wgDrag.moved = true;

      const deltaMin = Math.round(dy / WG_PX_PER_MIN / WG_SLOT_MIN) * WG_SLOT_MIN;

      if (_wgDrag.mode === 'resize') {
        let newEndMin = _wgDrag.origEndMin + deltaMin;
        newEndMin = Math.max(_wgDrag.origStartMin + WG_SLOT_MIN, Math.min(WG_END_MIN, newEndMin));
        _wgDrag.previewEndMin = newEndMin;
        const height = Math.max((newEndMin - _wgDrag.origStartMin) * WG_PX_PER_MIN, 16);
        _wgDrag.blockEl.style.height = height + 'px';
        _wgDrag.blockEl.classList.add('dragging');
      } else {
        let newStartMin = _wgDrag.origStartMin + deltaMin;
        newStartMin = Math.max(WG_START_MIN, Math.min(WG_END_MIN - _wgDrag.duration, newStartMin));
        _wgDrag.previewStartMin = newStartMin;

        const el = document.elementFromPoint(e.clientX, e.clientY);
        const col = el ? el.closest('.wg-day-col') : null;
        _wgDrag.previewIso = col ? col.dataset.iso : _wgDrag.origIso;

        const top = Math.max(0, (newStartMin - WG_START_MIN) * WG_PX_PER_MIN);
        _wgDrag.blockEl.style.top = top + 'px';
        _wgDrag.blockEl.style.left = '0%';
        _wgDrag.blockEl.style.width = '100%';
        _wgDrag.blockEl.classList.add('dragging');

        if (col && col !== _wgDrag.blockEl.parentElement) col.appendChild(_wgDrag.blockEl);
      }
    }

    function wgDragEnd(e) {
      document.removeEventListener('mousemove', wgDragMove);
      document.removeEventListener('mouseup', wgDragEnd);
      if (!_wgDrag) return;
      const drag = _wgDrag;
      _wgDrag = null;

      if (!drag.moved) {
        if (drag.type === 'meeting') {
          parent.postMessage({ type: 'hub-navigate', tool: 'meetings-hub', itemId: drag.id }, window.location.origin || '*');
        } else {
          selectAndEdit(drag.id);
        }
        return;
      }

      if (drag.mode === 'resize') {
        const newEndTime = minutesToTime(drag.previewEndMin);
        if (drag.type === 'meeting') resizeMeeting(drag.id, drag.previewEndMin - drag.origStartMin, drag.origIso);
        else resizeItem(drag.id, newEndTime);
      } else {
        const newStartTime = minutesToTime(drag.previewStartMin);
        const newEndTime = minutesToTime(drag.previewStartMin + drag.duration);
        const newIso = drag.previewIso || drag.origIso;
        if (drag.type === 'meeting') moveMeeting(drag.id, newIso, newStartTime, drag.origIso);
        else moveItem(drag.id, newIso, newStartTime, newEndTime);
      }
      renderCalendar();
    }

    function moveItem(id, newIso, newStartTime, newEndTime) {
      const it = state.items.find(x => x.id === id);
      if (!it) return;
      it.start = newIso;
      it.end = newIso;
      it.startTime = newStartTime;
      it.endTime = newEndTime;
      saveState();
      showToast(`Moved to ${fmtDate(newIso)} ${newStartTime}`);
    }

    function resizeItem(id, newEndTime) {
      const it = state.items.find(x => x.id === id);
      if (!it) return;
      it.endTime = newEndTime;
      saveState();
    }

    // For a recurring series, occDate identifies which occurrence a pill represents
    // (the day-column it was dragged from) since m.id is shared across all its pills.
    function seriesAnchorOccurrenceLocal(occurrenceDates, todayStr) {
      if (!occurrenceDates || !occurrenceDates.length) return null;
      const upcoming = occurrenceDates.filter(o => o.date >= todayStr);
      return upcoming.length ? upcoming[0] : occurrenceDates[occurrenceDates.length - 1];
    }

    function moveMeeting(id, newIso, newTime, occDate) {
      let data;
      try { data = JSON.parse(localStorage.getItem('meetings-hub-v1') || '{}'); } catch { data = {}; }
      const m = (data.meetings || []).find(x => x.id === id);
      if (!m) return;
      if (m.recurring && occDate) {
        const occ = (m.occurrenceDates || []).find(o => o.date === occDate);
        if (!occ) return;
        occ.date = newIso;
        occ.time = newTime;
        m.occurrenceDates.sort((a, b) => a.date.localeCompare(b.date));
        const logEntry = (m.log || []).find(l => l.date === occDate);
        if (logEntry) logEntry.date = newIso;
        if (m.log) m.log.sort((a, b) => a.date.localeCompare(b.date));
        const anchor = seriesAnchorOccurrenceLocal(m.occurrenceDates, new Date().toISOString().slice(0, 10));
        if (anchor) { m.date = anchor.date; m.time = anchor.time; m.durationMins = anchor.durationMins; }
      } else {
        m.date = newIso;
        m.time = newTime;
      }
      HubStorage.set('meetings-hub-v1', data);
      showToast(`Moved to ${fmtDate(newIso)} ${newTime}`);
    }

    function resizeMeeting(id, newDurationMins, occDate) {
      let data;
      try { data = JSON.parse(localStorage.getItem('meetings-hub-v1') || '{}'); } catch { data = {}; }
      const m = (data.meetings || []).find(x => x.id === id);
      if (!m) return;
      if (m.recurring && occDate) {
        const occ = (m.occurrenceDates || []).find(o => o.date === occDate);
        if (!occ) return;
        occ.durationMins = newDurationMins;
        const anchor = seriesAnchorOccurrenceLocal(m.occurrenceDates, new Date().toISOString().slice(0, 10));
        if (anchor) { m.date = anchor.date; m.time = anchor.time; m.durationMins = anchor.durationMins; }
      } else {
        m.durationMins = newDurationMins;
      }
      HubStorage.set('meetings-hub-v1', data);
    }

    // ═══════════════════════════════════════════════════════════════
    // Toolbar
    // ═══════════════════════════════════════════════════════════════
    function renderToolbar() {
      const ctrlEl = document.getElementById('toolbar-controls');
      if (ui.activeView === 'timeline') {
        ctrlEl.innerHTML = `
          <button class="sch-filter-btn${ui.filterType === 'all' ? ' active' : ''}" onclick="setFilter('all')">All</button>
          <button class="sch-filter-btn${ui.filterType === 'task' ? ' active' : ''}" onclick="setFilter('task')">Tasks</button>
          <button class="sch-filter-btn${ui.filterType === 'milestone' ? ' active' : ''}" onclick="setFilter('milestone')">Milestones</button>
          <button class="sch-filter-btn${ui.filterType === 'event' ? ' active' : ''}" onclick="setFilter('event')">Events</button>
          <div class="sch-toolbar-sep"></div>
          <button class="sch-toolbar-btn${ui.zoom === 'week' ? ' active' : ''}" onclick="setZoom('week')">Week</button>
          <button class="sch-toolbar-btn${ui.zoom === 'month' ? ' active' : ''}" onclick="setZoom('month')">Month</button>
          <div class="sch-toolbar-sep"></div>
          <button class="sch-toolbar-today" onclick="scrollToToday()">Today</button>`;
      } else {
        ctrlEl.innerHTML = '';
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // Full render
    // ═══════════════════════════════════════════════════════════════
    // ═══════════════════════════════════════════════════════════════
    // Multi-Project Gantt
    // ═══════════════════════════════════════════════════════════════

    const MULTI_LABEL_W = 220;
    const MULTI_COL_W   = 112;

    function getMultiConfig() {
      const isWeek    = ui.multiZoom !== 'month';
      const daysPerCol = isWeek ? 7 : 28;
      const numCols    = isWeek ? 14 : 13;
      const dayPx      = MULTI_COL_W / daysPerCol;
      const totalPx    = numCols * MULTI_COL_W;
      const lookBack   = isWeek ? Math.floor(numCols / 3) * daysPerCol : daysPerCol;
      const startIso   = addDays(TODAY, -lookBack + ui.multiOffset);
      const endIso     = addDays(startIso, numCols * daysPerCol);
      return { isWeek, daysPerCol, numCols, dayPx, totalPx, startIso, endIso };
    }

    function multiDateX(iso, cfg) {
      if (!iso) return null;
      const ms = isoToDate(iso) - isoToDate(cfg.startIso);
      return Math.round(ms / 86400000 * cfg.dayPx);
    }

    function renderMultiView() {
      const scroll = document.getElementById('multi-gantt-scroll');
      if (!scroll) return;

      const cfg = getMultiConfig();

      // Update range label
      const rangeLabel = document.getElementById('multi-range-label');
      if (rangeLabel) {
        const fmt = iso => isoToDate(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: cfg.isWeek ? undefined : '2-digit' });
        rangeLabel.textContent = fmt(cfg.startIso) + ' – ' + fmt(cfg.endIso);
      }

      // Load projects
      let projects = [];
      try { projects = (JSON.parse(localStorage.getItem('project-hub-v1') || '{}').projects || []); } catch {}
      const visible = projects.filter(p => p.status !== 'done');

      if (!visible.length) {
        scroll.innerHTML = `<div class="multi-empty">
          <div class="multi-empty-icon">📅</div>
          <div style="font-weight:600;color:var(--text2)">No active projects yet.</div>
          <div style="font-size:12px">Add projects in Project Hub — they'll appear here automatically.</div>
        </div>`;
        return;
      }

      // Build column headers
      const cols = [];
      for (let i = 0; i < cfg.numCols; i++) {
        const iso = addDays(cfg.startIso, i * cfg.daysPerCol);
        const isToday = iso <= TODAY && addDays(iso, cfg.daysPerCol) > TODAY;
        const label = cfg.isWeek
          ? isoToDate(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
          : isoToDate(iso).toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
        cols.push({ iso, label, isToday, x: i * MULTI_COL_W });
      }

      const todayX = multiDateX(TODAY, cfg);
      const todayVisible = todayX !== null && todayX >= 0 && todayX <= cfg.totalPx;

      // Build gantt background (grid cols + today line) — reused in every gantt cell
      function ganttBg(rowH) {
        const bands = cols.map(c =>
          `<div class="g-col-band" style="left:${c.x}px;width:${MULTI_COL_W}px${c.isToday ? ';background:var(--accent-dim)' : ''}"></div>`
        ).join('');
        const tl = todayVisible ? `<div class="g-today-line" style="left:${todayX}px;height:${rowH}px"></div>` : '';
        return bands + tl;
      }

      // Header row
      const hdrColsHTML = cols.map(c =>
        `<div class="multi-col-hdr${c.isToday ? ' is-today' : ''}" style="width:${MULTI_COL_W}px">${esc(c.label)}</div>`
      ).join('');
      let html = `
        <div class="multi-hdr-row">
          <div class="multi-hdr-corner">Project / Task</div>
          ${hdrColsHTML}
        </div>`;

      // Project rows
      visible.forEach(proj => {
        const color  = proj.color || 'var(--text3)';
        const collapsed = ui.collapsedProjects.has(proj.id);
        const chevron   = collapsed ? '▸' : '▾';
        const tasks      = (proj.tasks || []).filter(t => t.due && !t.done);
        const doneTasks  = (proj.tasks || []).filter(t => t.done).length;
        const noDue      = (proj.tasks || []).filter(t => !t.due && !t.done).length;
        const milestones = (proj.milestones || []);
        const openCount  = (proj.tasks || []).filter(t => !t.done).length;
        const metaParts  = [`${openCount} open`];
        if (noDue) metaParts.push(`${noDue} no date`);

        html += `
          <div class="mrow mrow-proj">
            <div class="mrow-label" onclick="toggleProjectCollapse('${esc(proj.id)}')">
              <span class="proj-chevron">${chevron}</span>
              <span class="proj-color-bar" style="background:${color}"></span>
              <span class="proj-name">${esc(proj.name)}</span>
              <span class="proj-meta">${metaParts.join(' · ')}</span>
            </div>
            <div class="mrow-gantt" style="width:${cfg.totalPx}px;height:36px;background:${color}14">
              ${ganttBg(36)}
            </div>
          </div>`;

        if (!collapsed) {
          // Milestone rows
          milestones.forEach(ms => {
            if (!ms.date) return;
            const x = multiDateX(ms.date, cfg);
            const inRange = x !== null && x > -20 && x < cfg.totalPx + 20;
            const markerHTML = inRange
              ? `<div class="g-diamond${ms.done ? ' is-done' : ''}" style="left:${x}px;background:${color}"></div>`
              : '';
            html += `
              <div class="mrow mrow-item${ms.done ? ' is-done' : ''}">
                <div class="mrow-label">
                  <span class="ms-icon" style="color:${color}">◆</span>
                  <span class="item-label-text">${esc(ms.title || 'Milestone')}</span>
                  <span class="item-due-badge${ms.date < TODAY && !ms.done ? ' overdue' : ''}">${fmtDate(ms.date)}</span>
                </div>
                <div class="mrow-gantt" style="width:${cfg.totalPx}px;height:28px">
                  ${ganttBg(28)}${markerHTML}
                </div>
              </div>`;
          });

          // Task rows (with due dates)
          tasks.forEach(t => {
            const x   = multiDateX(t.due, cfg);
            const inRange = x !== null && x > -50 && x < cfg.totalPx + 20;
            const barW = Math.max(8, Math.round(cfg.dayPx * 5));
            const barL = Math.max(0, (x || 0) - barW);
            const barHTML = inRange
              ? `<div class="g-bar${t.done ? ' is-done' : ''}" style="left:${barL}px;width:${barW}px;background:${color}"></div>`
              : '';
            const overdue = t.due < TODAY && !t.done;
            html += `
              <div class="mrow mrow-item${t.done ? ' is-done' : ''}">
                <div class="mrow-label">
                  <span style="color:var(--text3);font-size:10px;flex-shrink:0">●</span>
                  <span class="item-label-text">${esc(t.title)}</span>
                  <span class="item-due-badge${overdue ? ' overdue' : ''}">${fmtDate(t.due)}</span>
                </div>
                <div class="mrow-gantt" style="width:${cfg.totalPx}px;height:28px">
                  ${ganttBg(28)}${barHTML}
                </div>
              </div>`;
          });
        }
      });

      scroll.innerHTML = html;

      // Scroll so today is roughly 1/3 from the left
      if (todayVisible) {
        setTimeout(() => { scroll.scrollLeft = Math.max(0, todayX - cfg.totalPx * 0.28); }, 30);
      }
    }

    function toggleProjectCollapse(projId) {
      if (ui.collapsedProjects.has(projId)) ui.collapsedProjects.delete(projId);
      else ui.collapsedProjects.add(projId);
      renderMultiView();
    }

    function multiNav(dir) {
      const cfg = getMultiConfig();
      ui.multiOffset += dir * cfg.daysPerCol * 2;
      renderMultiView();
    }

    function multiToday() {
      ui.multiOffset = 0;
      renderMultiView();
    }

    function toggleMultiZoom() {
      ui.multiZoom = ui.multiZoom === 'week' ? 'month' : 'week';
      ui.multiOffset = 0;
      const btn = document.getElementById('multi-zoom-btn');
      if (btn) btn.textContent = ui.multiZoom === 'week' ? 'Month' : 'Week';
      renderMultiView();
    }

    function render() {
      renderToolbar();
      if (ui.activeView === 'timeline') renderTimeline();
      else if (ui.activeView === 'multi') renderMultiView();
      else renderCalendar();
    }

    // ═══════════════════════════════════════════════════════════════
    // View / zoom / filter controls
    // ═══════════════════════════════════════════════════════════════
    function switchView(view) {
      ui.activeView = view;
      document.getElementById('btn-timeline').classList.toggle('active', view === 'timeline');
      document.getElementById('btn-calendar').classList.toggle('active', view === 'calendar');
      document.getElementById('btn-multi').classList.toggle('active', view === 'multi');
      document.getElementById('view-timeline').classList.toggle('view-hidden', view !== 'timeline');
      document.getElementById('view-calendar').classList.toggle('view-hidden', view !== 'calendar');
      document.getElementById('view-multi').classList.toggle('view-hidden', view !== 'multi');
      render();
      if (view === 'timeline') setTimeout(scrollToToday, 60);
    }

    function setZoom(z) {
      ui.zoom = z;
      render();
      setTimeout(scrollToToday, 60);
    }

    function setFilter(type) {
      ui.filterType = type;
      render();
    }

    // ═══════════════════════════════════════════════════════════════
    // Selection
    // ═══════════════════════════════════════════════════════════════
    function selectAndEdit(id) {
      ui.selectedId = id;
      render();
      openDrawer(id);
    }

    // ═══════════════════════════════════════════════════════════════
    // Scroll to today
    // ═══════════════════════════════════════════════════════════════
    function scrollToToday() {
      const line = document.getElementById('today-line');
      const scrollEl = document.getElementById('gantt-scroll');
      if (!line || !scrollEl) return;
      const lineLeft = parseInt(line.style.left, 10);
      scrollEl.scrollLeft = Math.max(0, lineLeft - scrollEl.clientWidth / 3);
    }

    // ═══════════════════════════════════════════════════════════════
    // Calendar navigation
    // ═══════════════════════════════════════════════════════════════
    function calNav(dir) {
      if (ui.calWeekMode) return;
      ui.calMonth += dir;
      if (ui.calMonth < 0) { ui.calMonth = 11; ui.calYear--; }
      if (ui.calMonth > 11) { ui.calMonth = 0; ui.calYear++; }
      renderCalendar();
    }

    function calToday() {
      ui.calYear = new Date().getFullYear();
      ui.calMonth = new Date().getMonth();
      ui.calWeekMode = false;
      document.getElementById('cal-week-toggle').classList.remove('active');
      renderCalendar();
    }

    function toggleCalWeek() {
      ui.calWeekMode = !ui.calWeekMode;
      document.getElementById('cal-week-toggle').classList.toggle('active', ui.calWeekMode);
      renderCalendar();
    }

    // ═══════════════════════════════════════════════════════════════
    // Drawer
    // ═══════════════════════════════════════════════════════════════
    function buildSwatches(selected) {
      document.getElementById('color-swatches').innerHTML = PALETTE.map(c =>
        `<div class="sch-color-swatch${c === selected ? ' selected' : ''}"
      style="background:${c}" onclick="pickColor('${c}')"></div>`
      ).join('');
    }

    function pickColor(c) {
      _drawerColor = c;
      buildSwatches(c);
    }

    function openDrawer(id, prefillDate, prefillTime) {
      ui.drawerItemId = id;
      const item = id ? state.items.find(it => it.id === id) : null;

      document.getElementById('drawer-title').textContent = item ? 'Edit Item' : 'Add Item';
      document.getElementById('drawer-delete-btn').style.display = item ? '' : 'none';
      document.getElementById('drawer-badge').style.display = (item && item.sourceTool) ? '' : 'none';

      const defaultDate = prefillDate || TODAY;
      document.getElementById('f-title').value = item ? (item.title || '') : '';
      document.getElementById('f-type').value = item ? (item.type || 'task') : 'task';
      document.getElementById('f-start').value = item ? (item.start || defaultDate) : defaultDate;
      document.getElementById('f-end').value = item ? (item.end || defaultDate) : defaultDate;
      document.getElementById('f-start-time').value = item ? (item.startTime || '') : (prefillTime || '');
      document.getElementById('f-end-time').value = item ? (item.endTime || '') : '';
      document.getElementById('f-project').value = item ? (item.projectId || '') : '';
      document.getElementById('f-notes').value = item ? (item.notes || '') : '';
      document.getElementById('f-done').checked = item ? !!item.done : false;

      _drawerColor = item ? (item.color || PALETTE[2]) : PALETTE[2];
      buildSwatches(_drawerColor);

      document.getElementById('sch-drawer').classList.add('open');
      setTimeout(() => document.getElementById('f-title').focus(), 180);
    }

    function closeDrawer() {
      document.getElementById('sch-drawer').classList.remove('open');
      ui.drawerItemId = null;
    }

    function saveDrawer() {
      const title = document.getElementById('f-title').value.trim();
      if (!title) { showToast('Please enter a title.'); return; }

      const start = document.getElementById('f-start').value || TODAY;
      let end = document.getElementById('f-end').value || start;
      if (end < start) end = start;

      const startTime = document.getElementById('f-start-time').value;
      let endTime = document.getElementById('f-end-time').value;
      if (startTime && (!endTime || endTime <= startTime)) endTime = addMinutesToTime(startTime, 30);

      const patch = {
        title,
        type: document.getElementById('f-type').value,
        start, end,
        startTime: startTime || null,
        endTime: startTime ? endTime : null,
        color: _drawerColor,
        projectId: document.getElementById('f-project').value || null,
        projectRef: (() => {
          const pid = document.getElementById('f-project').value;
          const proj = pid ? HubData.getProject(pid) : null;
          return proj ? proj.name : null;
        })(),
        notes: document.getElementById('f-notes').value.trim(),
        done: document.getElementById('f-done').checked,
      };

      if (ui.drawerItemId) {
        const idx = state.items.findIndex(it => it.id === ui.drawerItemId);
        if (idx >= 0) Object.assign(state.items[idx], patch);
      } else {
        state.items.push({
          id: uid(), sourceTool: null, sourceId: null,
          createdAt: new Date().toISOString(), ...patch,
        });
      }

      saveState();
      closeDrawer();
      render();
      showToast(ui.drawerItemId ? 'Item updated.' : 'Item added.');
    }

    function deleteCurrentItem() {
      const id = ui.drawerItemId;
      if (!id || !confirm('Delete this item?')) return;
      state.items = state.items.filter(it => it.id !== id);
      if (ui.selectedId === id) ui.selectedId = null;
      saveState();
      closeDrawer();
      render();
      showToast('Item deleted.');
    }

    // ═══════════════════════════════════════════════════════════════
    // Toast
    // ═══════════════════════════════════════════════════════════════
    let _toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('sch-toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
    }

    // ═══════════════════════════════════════════════════════════════
    // Keyboard shortcuts
    // ═══════════════════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (document.getElementById('sch-drawer').classList.contains('open')) {
          closeDrawer();
        } else {
          try { window.parent.postMessage({ type: 'hub-home' }, window.location.origin || '*'); } catch { }
        }
        return;
      }
      if (e.key === 't' && !e.target.closest('input, textarea, select')) {
        scrollToToday();
      }
    });

    // ═══════════════════════════════════════════════════════════════
    // Auto-sync imported Project Hub items
    // ═══════════════════════════════════════════════════════════════
    function syncFromProjectHub() {
      const phData = HubStorage.get('project-hub-v1');
      if (!phData) return;

      const taskMap = {};
      const msMap = {};
      for (const project of (phData.projects || [])) {
        for (const task of (project.tasks || [])) {
          taskMap[task.id] = { task, project };
        }
        for (const ms of (project.milestones || [])) {
          msMap[ms.id] = { ms, project };
        }
      }

      let changed = false;
      state.items.forEach(item => {
        if (item.sourceTool !== 'project-hub') return;
        const entry = taskMap[item.sourceId] || msMap[item.sourceId];
        if (!entry) return;
        const src = entry.task || entry.ms;
        const srcTitle = src.title || src.name || '';
        const srcDate = src.due || src.date || item.start;
        const srcDone = !!src.done;
        if (item.title !== srcTitle || item.start !== srcDate || item.end !== srcDate || item.done !== srcDone) {
          item.title = srcTitle;
          item.start = srcDate;
          item.end = srcDate;
          item.done = srcDone;
          changed = true;
        }
      });

      if (changed) { saveState(); render(); }
    }

    // ═══════════════════════════════════════════════════════════════
    // Project select helpers
    // ═══════════════════════════════════════════════════════════════
    function _populateProjectSelect() {
      const sel = document.getElementById('f-project');
      if (!sel) return;
      const prev = sel.value;
      sel.innerHTML = '<option value="">— none —</option>';
      HubData.getProjectsSorted().forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        sel.appendChild(opt);
      });
      if (prev && sel.querySelector('option[value="' + CSS.escape(prev) + '"]')) sel.value = prev;
    }

    // ═══════════════════════════════════════════════════════════════
    // Init
    // ═══════════════════════════════════════════════════════════════
    state = loadState();
    try {
      _populateProjectSelect();
      HubData.onChange(() => {
        _populateProjectSelect();
        syncFromProjectHub();
        if (ui.activeView === 'multi') renderMultiView();
      });
    } catch { }
    // Initialize view state (sets view-hidden classes + filter section visibility) then render
    switchView(ui.activeView);
    setTimeout(scrollToToday, 160);
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      HubBootstrap.start('schedule');
    });
  </script>
</body>

</html>
