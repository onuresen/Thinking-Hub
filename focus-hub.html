<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.anthropic.com; frame-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Journal</title>
  <script src="hub-storage.js"></script>
  <script src="hub-utils.js"></script>
  <script src="hub-links.js"></script>
  <script src="hub-data.js"></script>
  <script src="hub-toast.js"></script>
  <script src="hub-bootstrap.js"></script>
  <script src="enterprise-config.js"></script>
  <script src="hub-ai.js"></script>
  <link rel="stylesheet" href="styles/fonts.css">
  <link rel="stylesheet" href="theme.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }
    body { display: flex; }

    /* ── Layout ── */
    .sidebar {
      width: 260px; min-width: 260px; height: 100vh;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .sidebar-logo {
      height: 54px; display: flex; align-items: center; gap: 9px;
      padding: 0 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .logo-mark {
      width: 26px; height: 26px; border-radius: 7px; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #111; font-family: var(--font-display);
    }
    .logo-text { font-family: var(--font-display); font-size: 13.5px; font-weight: 800; }
    .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; overflow: hidden; }

    /* ── Timer ring ── */
    .timer-wrap { display: flex; flex-direction: column; align-items: center; gap: 24px; }
    .ring-container { position: relative; width: 220px; height: 220px; }
    .ring-svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 10; }
    .ring-fg { fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 0.5s linear; }
    .ring-fg.urgent { stroke: var(--accent-nope); }
    .ring-center {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
    }
    .timer-display {
      font-family: var(--font-mono); font-size: 42px; font-weight: 500;
      color: var(--text); letter-spacing: 2px; line-height: 1;
    }
    .timer-label { font-size: 11px; color: var(--text3); font-family: var(--font-mono); letter-spacing: 1px; text-transform: uppercase; }

    /* ── Duration selector ── */
    .duration-chips { display: flex; gap: 6px; }
    .dur-chip {
      padding: 5px 14px; border-radius: 999px; border: 1px solid var(--border);
      background: transparent; color: var(--text3); font-size: 12px; font-family: var(--font-body);
      cursor: pointer; transition: all 0.12s;
    }
    .dur-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .dur-chip:not(.active):hover { border-color: var(--border2); color: var(--text); }

    /* ── Task picker ── */
    .task-picker {
      width: 340px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;
    }
    .task-picker-label { font-size: 10px; font-family: var(--font-mono); color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
    .task-picker select {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text); padding: 7px 10px;
      font-family: var(--font-body); font-size: 13px; cursor: pointer;
    }
    .task-picker select:focus { outline: 1px solid var(--accent); }
    .current-task-card {
      width: 340px; background: var(--surface2); border: 1px solid var(--accent-glow);
      border-radius: var(--r); padding: 14px 16px;
    }
    .current-task-label { font-size: 10px; font-family: var(--font-mono); color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .current-task-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .current-task-project { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--font-mono); }

    /* ── Controls ── */
    .timer-controls { display: flex; gap: 10px; align-items: center; }
    .ctrl-btn {
      padding: 10px 24px; border-radius: var(--r-sm); border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); font-family: var(--font-body);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.12s;
    }
    .ctrl-btn:hover { border-color: var(--border2); background: var(--surface3); }
    .ctrl-btn.primary { background: var(--accent); border-color: var(--accent); color: #111; }
    .ctrl-btn.primary:hover { opacity: 0.85; }
    .ctrl-btn.danger { color: var(--accent-nope); }
    .ctrl-btn.danger:hover { border-color: var(--accent-nope); }

    /* ── Session log (sidebar) ── */
    .session-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-list::-webkit-scrollbar { width: 4px; }
    .session-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .session-empty { padding: 20px; text-align: center; color: var(--text3); font-size: 12px; }
    .session-row {
      padding: 9px 10px; border-radius: var(--r-sm); margin-bottom: 4px;
      background: var(--surface2); border: 1px solid transparent;
    }
    .session-row.completed { border-color: var(--accent-glow); }
    .session-task { font-size: 12.5px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-meta { font-size: 10.5px; color: var(--text3); font-family: var(--font-mono); margin-top: 3px; display: flex; gap: 8px; }
    .session-badge {
      font-size: 9.5px; font-family: var(--font-mono); padding: 1px 5px;
      border-radius: 4px; font-weight: 600;
    }
    .session-badge.done { background: var(--accent-dim); color: var(--accent); }
    .session-badge.abandoned { background: rgba(255,80,80,0.1); color: var(--accent-nope); }
    .session-energy-badge, .session-ctx-badge, .session-pom-badge { font-size: 9.5px; padding: 1px 5px; border-radius: 4px; background: var(--surface3); color: var(--text2); }
    .focus-meta-row { display: flex; flex-direction: column; gap: 8px; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 4px; }
    .focus-meta-field { display: flex; flex-direction: column; gap: 4px; }
    .focus-meta-label { font-size: 10px; color: var(--text3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.7px; }
    .focus-meta-hint { font-weight: 400; text-transform: none; letter-spacing: 0; opacity: 0.7; }
    .focus-meta-field select, .focus-meta-field input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); padding: 6px 10px; font-family: var(--font-body); font-size: 12px; }
    .focus-meta-field select:focus, .focus-meta-field input:focus { outline: 1px solid var(--accent); }
    .focus-meta-field input[type="number"] { width: 70px; }

    /* ── Histogram ── */
    .histogram-wrap { padding: 12px 12px 8px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .histogram-label { font-size: 10px; font-family: var(--font-mono); color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .histogram-bars { display: flex; gap: 4px; align-items: flex-end; height: 36px; }
    .hbar { flex: 1; background: var(--accent-dim); border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s; position: relative; }
    .hbar:hover::after {
      content: attr(data-tip); position: absolute; bottom: calc(100% + 4px); left: 50%;
      transform: translateX(-50%); background: var(--surface3); border: 1px solid var(--border2);
      border-radius: 4px; padding: 2px 6px; font-size: 10px; font-family: var(--font-mono);
      color: var(--text); white-space: nowrap; z-index: 10;
    }
    .hbar.today { background: var(--accent); }
    .histogram-days { display: flex; gap: 4px; margin-top: 3px; }
    .hday { flex: 1; text-align: center; font-size: 9px; font-family: var(--font-mono); color: var(--text3); }
    .hday.today { color: var(--accent); }

    /* ── AI Insights ── */
    .insights-wrap { padding: 12px 12px 10px; border-top: 1px solid var(--border); flex-shrink: 0; max-height: 220px; overflow-y: auto; }
    .insights-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .insights-label { font-size: 10px; font-family: var(--font-mono); color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
    .insights-refresh-btn {
      width: 20px; height: 20px; flex-shrink: 0; border: 1px solid var(--border); border-radius: 50%;
      background: transparent; color: var(--text3); font-size: 11px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0;
      transition: border-color 0.15s ease, color 0.15s ease, transform 0.3s ease; font-family: inherit;
    }
    .insights-refresh-btn:hover { border-color: var(--accent); color: var(--accent); transform: rotate(180deg); }
    .insights-refresh-btn.is-loading { animation: insights-spin 0.8s linear infinite; pointer-events: none; opacity: 0.6; }
    @keyframes insights-spin { to { transform: rotate(360deg); } }
    .insights-empty { font-size: 11.5px; color: var(--text3); line-height: 1.5; }
    .insights-empty a { color: var(--accent); }
    .insights-item { font-size: 11.5px; color: var(--text2); line-height: 1.5; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .insights-item:last-child { border-bottom: none; }
    .insights-time { font-size: 9.5px; color: var(--text3); font-family: var(--font-mono); margin-top: 6px; }

    /* ── Done modal ── */
    .done-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .done-overlay.open { opacity: 1; pointer-events: all; }
    .done-modal {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--r); padding: 28px 32px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .done-icon { font-size: 36px; }
    .done-title { font-family: var(--font-display); font-size: 18px; font-weight: 800; }
    .done-sub { font-size: 13px; color: var(--text3); }
    .done-actions { display: flex; gap: 8px; margin-top: 4px; }

    /* ── Mobile drawer ──────────────────────────────────────────── */
    .sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 99; }
    .sidebar-backdrop.open { display: block; }
    .mob-header { display: none; height: 44px; border-bottom: 1px solid var(--border); align-items: center; padding: 0 12px; gap: 8px; flex-shrink: 0; }
    .mob-nav-btn { background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 18px; padding: 6px 8px; border-radius: var(--r-sm); line-height: 1; transition: background 0.1s; }
    .mob-nav-btn:hover { background: var(--surface2); }
    .mob-header-title { font-size: 13px; font-weight: 600; color: var(--text); }

    @media (max-width: 640px) {
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0; height: 100%;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.22s cubic-bezier(.4,0,.2,1);
        box-shadow: 6px 0 32px rgba(0,0,0,0.45);
        width: 240px; min-width: 240px;
      }
      .sidebar.open { transform: translateX(0); }
      .mob-header { display: flex; }
      .main { flex-direction: column; }
    }
    /* ── Time Journal (P100 repurpose) ── */
    .tj-wrap { max-width: 660px; margin: 0 auto; padding: 26px 20px 44px; display: flex; flex-direction: column; gap: 22px; }
    .tj-card-title { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text); }
    .tj-log-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; }
    .tj-form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .tj-field { flex: 1; min-width: 130px; display: flex; flex-direction: column; gap: 4px; }
    .tj-field.wide { flex-basis: 100%; }
    .tj-field-label { font-size: 10.5px; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; }
    .tj-field select, .tj-field input { width: 100%; padding: 7px 9px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--r-sm); color: var(--text); font-family: var(--font-body); font-size: 13px; }
    .tj-dur-chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .tj-dur-chip { padding: 6px 11px; border: 1px solid var(--border2); border-radius: var(--r-chip, 5px); background: var(--surface); color: var(--text2); font-size: 12px; cursor: pointer; }
    .tj-dur-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }
    .tj-dur-custom { width: 62px !important; flex: 0 0 auto; }
    .tj-add-btn { margin-top: 14px; width: 100%; padding: 10px; background: var(--accent); color: #12140b; border: none; border-radius: var(--r-sm); font-family: var(--font-body); font-weight: 600; font-size: 13.5px; cursor: pointer; }
    .tj-add-btn:hover { filter: brightness(1.05); }
    .tj-today-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .tj-today-summary { font-size: 12px; color: var(--text3); font-family: var(--font-mono); }
    .tj-log-row { display: flex; align-items: center; gap: 10px; padding: 9px 2px; border-bottom: 1px dashed var(--border); }
    .tj-log-time { font-family: var(--font-mono); font-size: 11.5px; color: var(--text3); white-space: nowrap; min-width: 44px; }
    .tj-log-body { flex: 1; min-width: 0; }
    .tj-log-task { font-size: 13.5px; color: var(--text); }
    .tj-log-sub { font-size: 11px; color: var(--text3); margin-top: 1px; display: flex; gap: 7px; flex-wrap: wrap; }
    .tj-log-dur { font-family: var(--font-mono); font-size: 12px; color: var(--accent); white-space: nowrap; }
    .tj-log-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 2px 5px; opacity: 0; transition: opacity .12s; }
    .tj-log-row:hover .tj-log-del { opacity: 1; }
    .tj-today-empty { font-size: 12.5px; color: var(--text3); font-style: italic; padding: 8px 0; }
    .tj-timer-details { border: 1px solid var(--border); border-radius: var(--r); background: var(--surface2); }
    .tj-timer-summary { cursor: pointer; padding: 12px 16px; font-size: 13px; color: var(--text2); list-style: none; }
    .tj-timer-summary::-webkit-details-marker { display: none; }
    .tj-timer-details[open] .tj-timer-summary { border-bottom: 1px solid var(--border); color: var(--text); }
    .tj-timer-details .timer-wrap { padding-top: 18px; }
    @media (max-width: 560px) { .tj-wrap { padding: 16px 12px 32px; } }
  </style>
</head>
<body>
  <div class="sidebar-backdrop" id="fh-backdrop" onclick="closeSidebar()"></div>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">📓</div>
      <span class="logo-text">Time Journal</span>
    </div>
    <div class="session-list" id="session-list">
      <div class="session-empty">No sessions yet.<br>Start your first focus block.</div>
    </div>
    <div class="histogram-wrap">
      <div class="histogram-label">This week (min)</div>
      <div class="histogram-bars" id="histogram-bars"></div>
      <div class="histogram-days" id="histogram-days"></div>
    </div>
    <div class="insights-wrap ai-surface">
      <div class="insights-header">
        <span class="insights-label">✦ Energy Insights</span>
        <span class="ai-badge" title="Uses the AI provider selected in the main app">AI</span>
        <button class="insights-refresh-btn" id="insights-refresh" onclick="generateInsights()" title="Find patterns between focus sessions and mood using the selected AI provider" style="margin-left:auto">↻</button>
      </div>
      <div id="insights-content"></div>
    </div>
  </aside>

  <main class="main">
    <div class="mob-header">
      <button class="mob-nav-btn" onclick="toggleSidebar()" aria-label="Open sessions">☰</button>
      <span class="mob-header-title">Time Journal</span>
    </div>

    <div class="tj-wrap">
      <div class="tj-log-card">
        <div class="tj-card-title">Log a work block</div>
        <div id="tj-log-form"></div>
      </div>

      <div class="tj-today">
        <div class="tj-today-head">
          <span class="tj-card-title">Today</span>
          <span class="tj-today-summary" id="tj-today-summary"></span>
        </div>
        <div id="tj-today-list"></div>
      </div>

      <details class="tj-timer-details">
        <summary class="tj-timer-summary">⏱ Prefer to run a live timer? Start a focus countdown</summary>
        <div class="timer-wrap">

      <div class="ring-container">
        <svg class="ring-svg" width="220" height="220" viewBox="0 0 220 220">
          <circle class="ring-bg" cx="110" cy="110" r="100"/>
          <circle class="ring-fg" id="ring-fg" cx="110" cy="110" r="100"
            stroke-dasharray="628.318" stroke-dashoffset="0"/>
        </svg>
        <div class="ring-center">
          <div class="timer-display" id="timer-display">25:00</div>
          <div class="timer-label" id="timer-label">Ready</div>
        </div>
      </div>

      <div class="duration-chips" id="dur-chips">
        <button class="dur-chip active" data-min="25" onclick="setDuration(25,this)">25 min</button>
        <button class="dur-chip" data-min="50" onclick="setDuration(50,this)">50 min</button>
        <button class="dur-chip" data-min="5" onclick="setDuration(5,this)">5 min break</button>
      </div>

      <div id="task-area"></div>

      <div class="timer-controls">
        <button class="ctrl-btn primary" id="start-btn" onclick="startTimer()">Start</button>
        <button class="ctrl-btn" id="pause-btn" onclick="pauseTimer()" style="display:none">Pause</button>
        <button class="ctrl-btn danger" id="stop-btn" onclick="stopTimer()" style="display:none">End Session</button>
      </div>

        </div>
      </details>
    </div>
  </main>

  <!-- Done modal -->
  <div class="done-overlay" id="done-overlay">
    <div class="done-modal">
      <div class="done-icon">🎯</div>
      <div class="done-title">Session complete!</div>
      <div class="done-sub" id="done-sub">25 minutes focused.</div>
      <div class="done-actions">
        <button class="ctrl-btn primary" onclick="markTaskDone()">Mark task done ✓</button>
        <button class="ctrl-btn" onclick="closeDoneModal()">Keep it open</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'focus-hub-v1';
    const CIRCUMFERENCE = 2 * Math.PI * 100; // 628.318

    let data = { sessions: [] };
    let timerState = {
      running: false, paused: false,
      totalSec: 25 * 60, remainSec: 25 * 60,
      duration: 25, intervalId: null,
      taskId: null, taskTitle: null, taskProjectId: null, taskProjectName: null,
      sessionStarted: null,
      energy: '', context: '', pomodoroEst: 1,
    };

    function loadData() {
      try { data = HubStorage.get(STORAGE_KEY) || { sessions: [] }; } catch { data = { sessions: [] }; }
      if (!data.sessions) data.sessions = [];
    }
    function saveData() { HubStorage.set(STORAGE_KEY, data); }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ── Duration ──
    function setDuration(min, btn) {
      if (timerState.running) return;
      timerState.duration = min;
      timerState.totalSec = min * 60;
      timerState.remainSec = min * 60;
      document.querySelectorAll('.dur-chip').forEach(b => b.classList.toggle('active', b === btn));
      updateDisplay();
    }

    // ── Task selection ──
    function renderTaskArea() {
      const area = document.getElementById('task-area');
      if (timerState.running || timerState.paused) {
        if (timerState.taskTitle) {
          area.innerHTML = `<div class="current-task-card">
            <div class="current-task-label">Focusing on</div>
            <div class="current-task-title">${esc(timerState.taskTitle)}</div>
            ${timerState.taskProjectName ? `<div class="current-task-project">${esc(timerState.taskProjectName)}</div>` : ''}
          </div>`;
        } else {
          area.innerHTML = '';
        }
        return;
      }
      const tasks = (() => { try { return HubData.getAllTasks(); } catch { return []; } })();
      const openTasks = tasks.filter(t => !t.done);
      if (!openTasks.length) { area.innerHTML = ''; return; }
      const opts = openTasks.map(t =>
        `<option value="${t.id}" data-project="${esc(t._projectName||'')}" data-pid="${t._projectId||''}">${esc(t.title)} — ${esc(t._projectName||'')}</option>`
      ).join('');
      area.innerHTML = `<div class="task-picker">
        <div class="task-picker-label">Focus on task</div>
        <select id="task-select"><option value="">— No specific task —</option>${opts}</select>
        <div class="focus-meta-row">
          <div class="focus-meta-field">
            <div class="focus-meta-label">Energy level <span class="focus-meta-hint">(GTD context)</span></div>
            <select id="energy-select" onchange="timerState.energy=this.value">
              <option value="">— not set —</option>
              <option value="high">⚡ High — deep work, hard problems</option>
              <option value="medium">🌤 Medium — focused but flexible</option>
              <option value="low">🌙 Low — admin, reviews, reading</option>
            </select>
          </div>
          <div class="focus-meta-field">
            <div class="focus-meta-label">Context tag <span class="focus-meta-hint">(@GTD context)</span></div>
            <input list="context-list" id="context-input" placeholder="@deep-work" value="${esc(timerState.context||'')}" oninput="timerState.context=this.value" />
            <datalist id="context-list">
              <option value="@deep-work">
              <option value="@admin">
              <option value="@calls">
              <option value="@creative">
              <option value="@learning">
              <option value="@errands">
            </datalist>
          </div>
          <div class="focus-meta-field">
            <div class="focus-meta-label">Pomodoro est. <span class="focus-meta-hint">(🍅 sessions)</span></div>
            <input type="number" id="pom-est" min="1" max="20" value="${timerState.pomodoroEst||1}" oninput="timerState.pomodoroEst=Math.max(1,+this.value||1)" />
          </div>
        </div>
      </div>`;
      const sel = document.getElementById('task-select');
      if (timerState.taskId) sel.value = timerState.taskId;
      sel.onchange = () => {
        const opt = sel.options[sel.selectedIndex];
        timerState.taskId = sel.value || null;
        timerState.taskTitle = sel.value ? opt.text.split(' — ')[0] : null;
        timerState.taskProjectName = sel.value ? opt.dataset.project : null;
        timerState.taskProjectId = sel.value ? opt.dataset.pid : null;
      };
      // Restore energy/context selects
      const esel = document.getElementById('energy-select');
      if (esel && timerState.energy) esel.value = timerState.energy;
    }

    // ── Ring ──
    function updateDisplay() {
      const m = Math.floor(timerState.remainSec / 60);
      const s = timerState.remainSec % 60;
      document.getElementById('timer-display').textContent =
        String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      const pct = timerState.remainSec / timerState.totalSec;
      const offset = CIRCUMFERENCE * (1 - pct);
      const ring = document.getElementById('ring-fg');
      ring.style.strokeDashoffset = offset;
      ring.classList.toggle('urgent', timerState.remainSec <= 60 && timerState.running);
      const lbl = document.getElementById('timer-label');
      if (timerState.running) lbl.textContent = 'Focusing…';
      else if (timerState.paused) lbl.textContent = 'Paused';
      else lbl.textContent = 'Ready';
    }

    // ── Mobile sidebar ──
    function toggleSidebar() {
      const s = document.querySelector('.sidebar');
      const b = document.getElementById('fh-backdrop');
      b.classList.toggle('open', s.classList.toggle('open'));
    }
    function closeSidebar() {
      document.querySelector('.sidebar').classList.remove('open');
      document.getElementById('fh-backdrop').classList.remove('open');
    }

    // ── Controls ──
    function startTimer() {
      if (timerState.paused) {
        timerState.paused = false;
        timerState.running = true;
        tick();
        return;
      }
      timerState.running = true;
      timerState.paused = false;
      timerState.remainSec = timerState.totalSec;
      timerState.sessionStarted = new Date().toISOString();
      renderTaskArea();
      showControls('running');
      tick();
    }

    function pauseTimer() {
      clearInterval(timerState.intervalId);
      timerState.running = false;
      timerState.paused = true;
      showControls('paused');
      updateDisplay();
    }

    function stopTimer() {
      clearInterval(timerState.intervalId);
      const elapsed = timerState.totalSec - timerState.remainSec;
      recordSession(false, elapsed);
      resetTimer();
    }

    function resetTimer() {
      clearInterval(timerState.intervalId);
      timerState.running = false;
      timerState.paused = false;
      timerState.remainSec = timerState.totalSec;
      showControls('idle');
      renderTaskArea();
      updateDisplay();
    }

    function tick() {
      clearInterval(timerState.intervalId);
      timerState.intervalId = setInterval(() => {
        timerState.remainSec--;
        updateDisplay();
        if (timerState.remainSec <= 0) {
          clearInterval(timerState.intervalId);
          timerState.running = false;
          recordSession(true, timerState.totalSec);
          resetTimer();
          openDoneModal();
        }
      }, 1000);
    }

    function showControls(mode) {
      document.getElementById('start-btn').style.display  = mode === 'idle' ? '' : (mode === 'paused' ? '' : 'none');
      document.getElementById('start-btn').textContent = mode === 'paused' ? 'Resume' : 'Start';
      document.getElementById('pause-btn').style.display  = mode === 'running' ? '' : 'none';
      document.getElementById('stop-btn').style.display   = (mode === 'running' || mode === 'paused') ? '' : 'none';
      document.querySelectorAll('.dur-chip').forEach(b => b.disabled = mode !== 'idle');
    }

    // ── Session recording ──
    function recordSession(completed, durationSec) {
      data.sessions.unshift({
        id: 's-' + Date.now().toString(36),
        taskId: timerState.taskId, taskTitle: timerState.taskTitle,
        projectName: timerState.taskProjectName, projectId: timerState.taskProjectId,
        durationMin: timerState.duration, elapsedSec: durationSec,
        completed, startedAt: timerState.sessionStarted, endedAt: new Date().toISOString(),
        energy: timerState.energy || '', context: timerState.context || '',
        pomodoroEst: timerState.pomodoroEst || 1,
      });
      data.sessions = data.sessions.slice(0, 100);
      saveData(); showToast(completed ? 'Session complete!' : 'Session logged');
      renderSessionList();
      renderHistogram();
      renderTodayLog();
    }

    // ── Time Journal: retrospective work logging (P100) ──
    let _tjDur = 30;
    function setTjDur(m, btn) {
      _tjDur = m;
      document.querySelectorAll('#tj-dur-chips .tj-dur-chip').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      const c = document.getElementById('tj-dur-custom'); if (c) c.value = '';
    }
    function setTjDurCustom(v) {
      const n = Math.max(1, parseInt(v) || 0);
      if (n) { _tjDur = n; document.querySelectorAll('#tj-dur-chips .tj-dur-chip').forEach(b => b.classList.remove('active')); }
    }
    function renderLogForm() {
      const wrap = document.getElementById('tj-log-form'); if (!wrap) return;
      const tasks = (() => { try { return HubData.getAllTasks(); } catch { return []; } })();
      const openTasks = tasks.filter(t => !t.done);
      const opts = openTasks.map(t => `<option value="${t.id}" data-project="${esc(t._projectName || '')}" data-pid="${t._projectId || ''}">${esc(t.title)}${t._projectName ? ` — ${esc(t._projectName)}` : ''}</option>`).join('');
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0'), mm = String(now.getMinutes()).padStart(2, '0');
      const preset = [15, 30, 45, 60, 90];
      wrap.innerHTML = `
        <div class="tj-form-row">
          <div class="tj-field wide">
            <div class="tj-field-label">What did you work on?</div>
            <select id="tj-task"><option value="">— No specific task —</option>${opts}</select>
          </div>
        </div>
        <div class="tj-form-row">
          <div class="tj-field">
            <div class="tj-field-label">Duration</div>
            <div class="tj-dur-chips" id="tj-dur-chips">
              ${preset.map(m => `<button type="button" class="tj-dur-chip${_tjDur === m ? ' active' : ''}" onclick="setTjDur(${m},this)">${m}m</button>`).join('')}
              <input type="number" class="tj-dur-custom" id="tj-dur-custom" min="1" max="600" placeholder="min" value="${preset.includes(_tjDur) ? '' : (_tjDur || '')}" oninput="setTjDurCustom(this.value)" />
            </div>
          </div>
          <div class="tj-field" style="max-width:110px">
            <div class="tj-field-label">Started</div>
            <input type="time" id="tj-time" value="${hh}:${mm}" />
          </div>
          <div class="tj-field">
            <div class="tj-field-label">Energy</div>
            <select id="tj-energy">
              <option value="">— not set —</option>
              <option value="high">⚡ High</option>
              <option value="medium">🌤 Medium</option>
              <option value="low">🌙 Low</option>
            </select>
          </div>
          <div class="tj-field">
            <div class="tj-field-label">Context</div>
            <input list="tj-context-list" id="tj-context" placeholder="@deep-work" />
            <datalist id="tj-context-list"><option value="@deep-work"><option value="@admin"><option value="@calls"><option value="@creative"><option value="@learning"><option value="@errands"></datalist>
          </div>
        </div>
        <div class="tj-form-row">
          <div class="tj-field wide">
            <div class="tj-field-label">Note (optional)</div>
            <input type="text" id="tj-note" placeholder="what got done…" onkeydown="if(event.key==='Enter')logBlock()" />
          </div>
        </div>
        <button class="tj-add-btn" onclick="logBlock()">+ Add to today's log</button>`;
    }
    function logBlock() {
      const dur = Math.max(1, parseInt(_tjDur) || 0);
      if (!dur) { showToast('Enter a duration first'); return; }
      const taskSel = document.getElementById('tj-task');
      const opt = taskSel && taskSel.selectedIndex >= 0 ? taskSel.options[taskSel.selectedIndex] : null;
      const taskId = taskSel && taskSel.value ? taskSel.value : null;
      const taskTitle = taskId && opt ? opt.text.split(' — ')[0] : null;
      const projectName = taskId && opt ? (opt.dataset.project || '') : '';
      const projectId = taskId && opt ? (opt.dataset.pid || '') : '';
      const timeVal = (document.getElementById('tj-time') || {}).value || '';
      const energy = (document.getElementById('tj-energy') || {}).value || '';
      const context = (document.getElementById('tj-context') || {}).value || '';
      const note = (document.getElementById('tj-note') || {}).value || '';
      const start = new Date();
      if (/^\d{1,2}:\d{2}$/.test(timeVal)) { const [h, m] = timeVal.split(':').map(Number); start.setHours(h, m, 0, 0); }
      const startedAt = start.toISOString();
      const endedAt = new Date(start.getTime() + dur * 60000).toISOString();
      data.sessions.unshift({
        id: 's-' + Date.now().toString(36),
        taskId, taskTitle, projectName, projectId,
        durationMin: dur, elapsedSec: dur * 60,
        completed: true, logged: true,
        startedAt, endedAt,
        energy, context, note, pomodoroEst: 1,
      });
      data.sessions = data.sessions.slice(0, 100);
      saveData();
      showToast('Logged ' + dur + 'm' + (taskTitle ? ' · ' + taskTitle : ''));
      renderLogForm(); renderTodayLog(); renderSessionList(); renderHistogram();
    }
    function renderTodayLog() {
      const list = document.getElementById('tj-today-list');
      const sumEl = document.getElementById('tj-today-summary');
      if (!list) return;
      const todayStr = new Date().toISOString().slice(0, 10);
      const todays = data.sessions.filter(s => (s.startedAt || '').slice(0, 10) === todayStr);
      const totalMin = todays.reduce((sum, x) => sum + (x.durationMin || Math.round((x.elapsedSec || 0) / 60)), 0);
      if (sumEl) sumEl.textContent = todays.length ? `${Math.floor(totalMin / 60)}h ${totalMin % 60}m · ${todays.length} block${todays.length !== 1 ? 's' : ''}` : '';
      if (!todays.length) { list.innerHTML = '<div class="tj-today-empty">No blocks logged today yet. Add one above ↑</div>'; return; }
      const energyMap = { high: '⚡', medium: '🌤', low: '🌙' };
      const rows = todays.slice().sort((a, b) => (a.startedAt || '') < (b.startedAt || '') ? -1 : 1);
      list.innerHTML = rows.map(s => {
        const t = s.startedAt ? new Date(s.startedAt).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }) : '';
        const dur = s.durationMin || Math.round((s.elapsedSec || 0) / 60);
        const sub = [s.energy ? energyMap[s.energy] : '', s.context ? esc(s.context) : '', s.note ? esc(s.note) : ''].filter(Boolean).join(' · ');
        return `<div class="tj-log-row">
          <span class="tj-log-time">${t}</span>
          <span class="tj-log-body"><span class="tj-log-task">${esc(s.taskTitle || '(no task)')}</span>${sub ? `<span class="tj-log-sub">${sub}</span>` : ''}</span>
          <span class="tj-log-dur">${dur}m</span>
          <button class="tj-log-del" title="Delete entry" onclick="deleteLogRow('${s.id}')">✕</button>
        </div>`;
      }).join('');
    }
    function deleteLogRow(id) {
      data.sessions = data.sessions.filter(s => s.id !== id);
      saveData();
      renderTodayLog(); renderSessionList(); renderHistogram();
      showToast('Entry removed');
    }

    // ── Done modal ──
    function openDoneModal() {
      document.getElementById('done-sub').textContent = `${timerState.duration} minutes focused. Nice work!`;
      document.getElementById('done-overlay').classList.add('open');
    }
    function closeDoneModal() { document.getElementById('done-overlay').classList.remove('open'); }
    function markTaskDone() {
      const tid = timerState.taskId;
      if (tid) {
        const phRaw = HubStorage.get('project-hub-v1');
        if (phRaw) {
          try {
            const ph = JSON.parse(phRaw);
            for (const proj of (ph.projects||[])) {
              const t = (proj.tasks||[]).find(t => t.id === tid);
              if (t) { t.done = true; t.status = 'done'; break; }
            }
            HubStorage.set('project-hub-v1', ph);
          } catch {}
        }
      }
      closeDoneModal();
    }

    // ── Session list ──
    function renderSessionList() {
      const el = document.getElementById('session-list');
      if (!data.sessions.length) {
        el.innerHTML = '<div class="session-empty">No sessions yet.<br>Start your first focus block.</div>';
        return;
      }
      el.innerHTML = data.sessions.slice(0, 30).map(s => {
        const badge = s.completed
          ? `<span class="session-badge done">✓ done</span>`
          : `<span class="session-badge abandoned">stopped</span>`;
        const elapsed = s.completed ? `${s.durationMin}m` : `${Math.floor((s.elapsedSec||0)/60)}m`;
        const dateStr = s.startedAt ? new Date(s.startedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
        const energyMap = { high: '⚡', medium: '🌤', low: '🌙' };
        const energyBadge = s.energy ? `<span class="session-energy-badge">${energyMap[s.energy]||''}</span>` : '';
        const ctxBadge = s.context ? `<span class="session-ctx-badge">${esc(s.context)}</span>` : '';
        const pomBadge = s.pomodoroEst > 1 ? `<span class="session-pom-badge">🍅×${s.pomodoroEst} est.</span>` : '';
        return `<div class="session-row${s.completed?' completed':''}">
          <div class="session-task">${esc(s.taskTitle || '(no task)')}</div>
          <div class="session-meta">${badge} <span>${elapsed}</span> ${energyBadge}${ctxBadge}${pomBadge}<span>${dateStr}</span></div>
        </div>`;
      }).join('');
    }

    // ── Histogram ──
    function renderHistogram() {
      const barsEl = document.getElementById('histogram-bars');
      const daysEl = document.getElementById('histogram-days');
      const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const today = new Date(); today.setHours(0,0,0,0);
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        days.push(d);
      }
      const maxMin = 120;
      const minByDay = days.map(d => {
        const iso = d.toISOString().split('T')[0];
        return data.sessions
          .filter(s => s.completed && s.startedAt && s.startedAt.startsWith(iso))
          .reduce((sum, s) => sum + (s.durationMin || 0), 0);
      });
      const peak = Math.max(...minByDay, 1);
      barsEl.innerHTML = minByDay.map((min, i) => {
        const isToday = i === 6;
        const pct = Math.max(4, (min / peak) * 100);
        return `<div class="hbar${isToday?' today':''}" style="height:${pct}%" data-tip="${min}m"></div>`;
      }).join('');
      daysEl.innerHTML = days.map((d, i) => {
        const isToday = i === 6;
        return `<div class="hday${isToday?' today':''}">${DAY_NAMES[d.getDay()].slice(0,1)}</div>`;
      }).join('');
    }

    // ── AI Insights (energy/context vs. daily mood) ──
    let insightsLoading = false;

    function loadInsights() { return data.aiInsights || null; }
    function saveInsights(text) {
      data.aiInsights = { text, generatedAt: new Date().toISOString() };
      saveData();
    }
    function insightsTimeAgo(iso) {
      const mins = Math.round((Date.now() - new Date(iso).getTime()) / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      return Math.round(mins / 60) + 'h ago';
    }

    function renderInsights() {
      const el = document.getElementById('insights-content');
      const ins = loadInsights();
      if (ins && ins.text) {
        const lines = ins.text.split('\n').map(s => s.replace(/^[-•\d.)\s]+/, '').trim()).filter(Boolean);
        el.innerHTML = lines.map(l => `<div class="insights-item">${esc(l)}</div>`).join('')
          + `<div class="insights-time">Generated ${insightsTimeAgo(ins.generatedAt)}</div>`;
      } else {
        const hint = (typeof HubAI !== 'undefined' && HubAI.isConfigured())
          ? 'Click ↻ to find patterns between your focus sessions and daily mood (logged in Journal Hub).'
          : (typeof HubAI !== 'undefined' ? HubAI.getSetupMessage() : 'AI is unavailable.');
        el.innerHTML = `<div class="insights-empty">${hint}</div>`;
      }
    }

    async function generateInsights() {
      if (insightsLoading) return;
      if (typeof HubAI !== 'undefined' && !HubAI.isEnabled()) return;
      if (typeof HubAI === 'undefined' || !HubAI.isConfigured()) { renderInsights(); return; }

      const btn = document.getElementById('insights-refresh');
      insightsLoading = true;
      btn.classList.add('is-loading');
      document.getElementById('insights-content').innerHTML = '<div class="insights-empty">Thinking…</div>';

      let logData = {};
      try { logData = HubStorage.get('log-hub-v1') || {}; } catch {}
      const entries = logData.entries || {};

      const sessionsByDay = {};
      data.sessions.forEach(s => {
        if (!s.startedAt || !s.completed) return;
        const day = s.startedAt.slice(0, 10);
        (sessionsByDay[day] = sessionsByDay[day] || []).push(s);
      });

      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 14);
      const cutoffStr = cutoff.toISOString().slice(0, 10);

      const lines = Object.keys(sessionsByDay).filter(d => d >= cutoffStr).sort().map(day => {
        const entry = entries[day];
        const moodLabel = entry && entry.mood ? `${entry.mood}/5` : 'no mood logged';
        const sessLines = sessionsByDay[day].map(s => {
          const time = new Date(s.startedAt).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
          const energy = s.energy || 'unknown energy';
          const ctx = s.context ? `, ${s.context}` : '';
          const task = s.taskTitle || '(no task)';
          return `${time} ${s.durationMin}m, energy=${energy}${ctx}, task="${task}"`;
        }).join('; ');
        return `${day} (mood ${moodLabel}): ${sessLines}`;
      });

      if (!lines.length) {
        saveInsights('Not enough session/mood data yet. Log focus sessions with energy levels, and rate your daily mood in Journal Hub, to unlock insights.');
        insightsLoading = false;
        btn.classList.remove('is-loading');
        renderInsights();
        return;
      }

      const prompt = lines.join('\n');
      const system = 'You are an analyst inside a personal focus-timer app. The user logs focus sessions (time of day, duration, energy level, GTD context tag, task) and a daily mood rating (1-5, from a separate journal). Given up to 14 days of this data, find 3-5 short, concrete patterns connecting WHEN/HOW the user works to their mood — e.g. which times of day, energy levels, contexts, or tasks correlate with higher mood, or warning signs (overwork, late sessions, low energy stacking) correlating with lower mood. Reply with one short line per insight, no numbering, no markdown, format: "<observation> — <suggestion, max 12 words>". If the data is too sparse for confident patterns, say so in one line instead.';

      try {
        const text = await HubAI.chat(prompt, system);
        saveInsights(text || 'No response from AI.');
      } catch (e) {
        if (HubAI.isHandoffError(e)) {
          insightsLoading = false;
          btn.classList.remove('is-loading');
          document.getElementById('insights-content').innerHTML = `<div class="insights-empty">${esc(e.message)}</div>`;
          return;
        }
        saveInsights('Could not reach AI: ' + (e?.message || 'unknown error'));
      }
      insightsLoading = false;
      btn.classList.remove('is-loading');
      renderInsights();
    }

    // ── Init ──
    loadData();
    updateDisplay();
    renderTaskArea();
    renderLogForm();
    renderTodayLog();
    renderSessionList();
    renderHistogram();
    renderInsights();
    try { HubData.onChange(() => { if (!timerState.running && !timerState.paused) renderTaskArea(); }); } catch {}
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { HubBootstrap.start('focus-hub'); });
    window.addEventListener('message', e => {
      if (e.origin !== window.location.origin) return;
      if (e.data?.type === 'hub-highlight' && e.data.itemId) {
        const el = document.querySelector(`.session-row[data-id="${e.data.itemId}"]`);
        if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.style.outline = '2px solid var(--accent)'; setTimeout(() => el.style.outline = '', 1500); }
      }
    });
  </script>
</body>
</html>
